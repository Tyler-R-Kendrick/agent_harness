name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - skills/**
      - .agents/skills/**
      - .claude/skills/**
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - skills/**
      - .agents/skills/**
      - .claude/skills/**

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    # Keep this high because Copilot sessions have been timing out early when the GitHub backend is slow.
    timeout-minutes: 59
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Verify vendored project skills
        run: |
          set -euo pipefail
          if [ ! -d skills ]; then
            echo "Expected vendored skills/ directory was not found."
            exit 1
          fi

          mapfile -t skill_dirs < <(find skills -mindepth 1 -maxdepth 1 -type d | sort)
          if [ "${#skill_dirs[@]}" -eq 0 ]; then
            echo "Expected at least one vendored skill under skills/."
            exit 1
          fi

          for skill_dir in "${skill_dirs[@]}"; do
            skill_name="$(basename "$skill_dir")"
            for link_root in .agents/skills .claude/skills; do
              link_path="${link_root}/${skill_name}"
              if [ ! -L "$link_path" ]; then
                echo "Expected ${link_path} to be a symlink into ${skill_dir}."
                exit 1
              fi
              if [ "$(readlink "$link_path")" != "../../skills/${skill_name}" ]; then
                echo "Expected ${link_path} to point to ../../skills/${skill_name}."
                exit 1
              fi
            done
          done

      - name: Install requested Copilot plugin marketplace assets
        run: |
          set -euo pipefail
          if ! command -v copilot >/dev/null 2>&1; then
            echo "Note: copilot CLI is not available on this runner; skipping optional Copilot plugin installation."
            exit 0
          fi
          echo "Registering Copilot marketplace: obra/superpowers-marketplace"
          copilot plugin marketplace add obra/superpowers-marketplace
          echo "Installing Copilot plugin: superpowers@superpowers-marketplace"
          copilot plugin install superpowers@superpowers-marketplace
