name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    # Keep this high because Copilot sessions have been timing out early when the GitHub backend is slow.
    timeout-minutes: 59
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            agent-browser/package-lock.json

      - name: Install app dependencies
        working-directory: agent-browser
        run: npm ci

      - name: Install requested agent skills
        run: |
          set -euo pipefail
          # Keep the requested installs strict so setup fails fast if any required skill becomes unavailable.
          # `npx --yes` auto-confirms package download; `skills add -y` auto-confirms the skill installation itself.
          target_agents=(claude-code codex opencode)
          install_skill() {
            local repo_url="$1"
            local skill_name="$2"
            npx --yes skills add "$repo_url" --skill "$skill_name" --copy -y --agent "${target_agents[@]}"
          }

          install_skill https://github.com/vercel-labs/skills find-skills
          install_skill https://github.com/anthropics/skills frontend-design
          install_skill https://github.com/vercel-labs/agent-skills web-design-guidelines
          install_skill https://github.com/anthropics/skills skill-creator
          install_skill https://github.com/nextlevelbuilder/ui-ux-pro-max-skill ui-ux-pro-max
          install_skill https://github.com/shadcn/ui shadcn
          install_skill https://github.com/anthropics/skills webapp-testing
          install_skill https://github.com/pbakaus/impeccable impeccable

      - name: Install requested Copilot plugin marketplace assets
        run: |
          if ! command -v copilot >/dev/null 2>&1; then
            echo "Note: copilot CLI is not available on this runner; skipping optional Copilot plugin installation."
            exit 0
          fi

          copilot plugin marketplace add obra/superpowers-marketplace
          copilot plugin install superpowers@superpowers-marketplace
