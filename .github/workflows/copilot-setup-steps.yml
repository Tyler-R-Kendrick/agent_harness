name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    # Keep this high because Copilot sessions have been timing out early when the GitHub backend is slow.
    timeout-minutes: 59
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            agent-browser/package-lock.json

      - name: Install app dependencies
        working-directory: agent-browser
        run: npm ci

      - name: Install requested agent skills
        run: |
          set -euo pipefail
          skills_cli_version=1.4.9
          # Keep the requested installs strict so setup fails fast if any required skill becomes unavailable.
          # `npx --yes` auto-confirms package download; `skills add -y` auto-confirms the skill installation itself.
          # These names intentionally match the current Skills CLI agent identifiers.
          target_agent_names=(claude-code codex opencode)
          install_skill() {
            local progress_label="$1"
            local repo_url="$2"
            local repo_ref="$3"
            local skill_name="$4"
            local agent_name
            local install_args=()
            local checkout_dir
            # Skills CLI installations may be written under either supported project root.
            local installed_skill_path=".agents/skill/${skill_name}/SKILL.md"
            local installed_skills_path=".agents/skills/${skill_name}/SKILL.md"
            checkout_dir="$(mktemp -d -t skill-checkout.XXXXXX)"
            echo "Installing skill ${progress_label}: ${skill_name} from ${repo_url} @ ${repo_ref}"
            git init -q --initial-branch=main "$checkout_dir"
            git -C "$checkout_dir" remote add origin "$repo_url"
            git -C "$checkout_dir" fetch --depth 1 origin "$repo_ref"
            git -C "$checkout_dir" checkout --detach FETCH_HEAD
            for agent_name in "${target_agent_names[@]}"; do
              install_args+=(--agent "$agent_name")
            done
            npx --yes "skills@${skills_cli_version}" add "$checkout_dir" --skill "$skill_name" --copy -y "${install_args[@]}"
            if [ ! -f "$installed_skill_path" ] && [ ! -f "$installed_skills_path" ]; then
              echo "Expected installed skill file was not found in either supported location:"
              echo "  - $installed_skill_path"
              echo "  - $installed_skills_path"
              exit 1
            fi
            rm -rf "$checkout_dir"
          }

          install_skill 1/8 https://github.com/vercel-labs/skills df0579f85cb8a360473c921e1343359006100d3c find-skills
          install_skill 2/8 https://github.com/anthropics/skills ca1e7dc13c0ab5e2dfaa6de71991cd951b8f1cf2 frontend-design
          install_skill 3/8 https://github.com/vercel-labs/agent-skills 73140fc5b3a214ad3222bcf557b397b3c02d11c1 web-design-guidelines
          install_skill 4/8 https://github.com/anthropics/skills ca1e7dc13c0ab5e2dfaa6de71991cd951b8f1cf2 skill-creator
          install_skill 5/8 https://github.com/nextlevelbuilder/ui-ux-pro-max-skill b7e3af80f6e331f6fb456667b82b12cade7c9d35 ui-ux-pro-max
          install_skill 6/8 https://github.com/shadcn/ui d86c5e59395d994fa9c634d9989b4ae20cf0bbbe shadcn
          install_skill 7/8 https://github.com/anthropics/skills ca1e7dc13c0ab5e2dfaa6de71991cd951b8f1cf2 webapp-testing
          install_skill 8/8 https://github.com/pbakaus/impeccable e7afda2c5505a8893bc4d05267949b3197b4c00f impeccable

      - name: Install requested Copilot plugin marketplace assets
        run: |
          set -euo pipefail
          if ! command -v copilot >/dev/null 2>&1; then
            echo "Note: copilot CLI is not available on this runner; skipping optional Copilot plugin installation."
            exit 0
          fi
          echo "Registering Copilot marketplace: obra/superpowers-marketplace"
          copilot plugin marketplace add obra/superpowers-marketplace
          echo "Installing Copilot plugin: superpowers@superpowers-marketplace"
          copilot plugin install superpowers@superpowers-marketplace
