name: rdf-web-search-agent
version: "1.0"
description: >
  AgentEvals static and deterministic runtime suite for the RDF web search
  chat-agent. The agent must use checked SPARQL/RDF templates, normalize
  Wikidata results, cite open-data entity URLs, keep endpoint failures
  recoverable, and fan into the existing web-search workflow for reranking.
metadata:
  owner: agent-browser
  tags: [rdf, sparql, wikidata, semantic-search, tool-trajectory, fan-in]
execution:
  target: agent-browser-rdf-web-search-agent
  timeout_seconds: 10
assertions:
  - name: semantic-search-tool-first
    type: tool-trajectory
    mode: in_order
    required: true
    expected:
      - tool: webmcp:semantic_search
      - tool: search-fan-in-merger
  - name: safety-and-semantic-rubric
    type: code-grader
    required: true
    command: ["node", "./graders/rdf-search-quality-gate.mjs"]
tests: ./cases.jsonl
