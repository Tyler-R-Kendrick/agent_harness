targets:
  - name: agent-browser-search-fulfillment
    provider: cli
    judge_target: agent-browser-llm-judge
    workers: 10
    timeout_ms: 30
    command: node agent-browser/scripts/search-eval-target.mjs --runtime agent-browser/scripts/search-eval-target-runtime.ts --eval-id {EVAL_ID} --out {OUTPUT_FILE}
    cwd: ../../..

  - name: agent-browser-search-fulfillment-live
    provider: cli
    judge_target: agent-browser-llm-judge
    workers: 5
    timeout_ms: 60
    command: node agent-browser/scripts/search-eval-target.mjs --runtime agent-browser/scripts/search-eval-target-runtime.ts --eval-id {EVAL_ID} --out {OUTPUT_FILE} --live
    cwd: ../../..

  - name: agent-browser-llm-judge
    provider: cli
    timeout_ms: 30
    command: node agent-browser/scripts/search-eval-llm-judge.mjs --prompt-file {PROMPT_FILE} --out {OUTPUT_FILE}
    cwd: ../../..
