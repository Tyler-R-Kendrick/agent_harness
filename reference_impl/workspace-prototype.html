    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#09090b;color:#a1a1aa;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',system-ui,sans-serif;font-size:13px;-webkit-font-smoothing:antialiased;overflow:hidden}
    input,button,textarea{font-family:inherit}button{cursor:pointer}
    ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:3px}
    @keyframes ping{75%,100%{transform:scale(2.2);opacity:0}}
    @keyframes fade-in{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes slide-up{from{opacity:0;transform:translate(-50%,8px)}to{opacity:1;transform:translate(-50%,0)}}
    @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
    @keyframes slide-in-from-right{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
    @keyframes indeterminate{0%{transform:translateX(-100%)}100%{transform:translateX(400%)}}
    @keyframes switch-tree{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
    @keyframes token-in{from{opacity:0}to{opacity:1}}
    @keyframes thinking-pulse{0%,100%{opacity:.4}50%{opacity:.8}}
    @keyframes reasoning-border{0%{border-color:rgba(167,139,250,.15)}50%{border-color:rgba(167,139,250,.35)}100%{border-color:rgba(167,139,250,.15)}}
    .shimmer{background:linear-gradient(90deg,rgba(255,255,255,.03) 25%,rgba(255,255,255,.06) 50%,rgba(255,255,255,.03) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}
    .typing-dot{animation:blink 1.2s infinite}
    .typing-dot:nth-child(2){animation-delay:.2s}
    .typing-dot:nth-child(3){animation-delay:.4s}
    .thinking-indicator{animation:thinking-pulse 1.5s ease-in-out infinite}
    .stream-cursor::after{content:"▌";animation:blink .8s infinite;color:rgba(255,255,255,.4);margin-left:1px}

/* Fetch models from HF Hub with transformers.js tag + optional filters */
async function searchHFModels({task,query,sort,limit}={}){
  const params=new URLSearchParams();
  params.set("library","transformers.js");
  /* Filter for onnx tag — models need ONNX weights for in-browser inference */
  params.set("tags","onnx");
  params.set("limit",String(limit||20));
  if(task)params.set("pipeline_tag",task);
  if(query)params.set("search",query);
  params.set("sort",sort||"downloads");
  params.set("direction","-1");
  try{
    const resp=await fetch(HF_API+"?"+params.toString());
    if(!resp.ok)throw new Error("HF API "+resp.status);
    const data=await resp.json();
    return data.map(m=>({
      id:m.id||m.modelId,
      name:(m.id||m.modelId).split("/").pop(),
      author:(m.id||m.modelId).split("/")[0]||"unknown",
      task:m.pipeline_tag||"unknown",
      downloads:m.downloads||0,
      likes:m.likes||0,
      lastModified:m.lastModified,
      tags:(m.tags||[]).slice(0,8),
      /* Estimate size from model info — fallback to 0 */
      sizeMB:m.safetensors?.total?Math.round(m.safetensors.total/1e6):0,
    }));
  }catch(e){console.warn("HF Hub search error:",e);return[];}
}

/* Transformers.js runtime state — lazy-loaded from CDN
   NOTE: We use new Function() to call import() because Babel standalone
   transforms import() into require() which doesn't exist in browsers.
   See https://github.com/babel/babel/issues/15914 */
/* ═══════════ TJS Web Worker — runs inference off main thread ═══════════ */
const TJS_CDN="https://cdn.jsdelivr.net/npm/@huggingface/transformers@3/dist/transformers.js";
const _dynamicImport=new Function("url","return import(url)");

/* Inline worker source for Blob URL classic worker.
   Uses dynamic import() — Chrome supports this in classic workers.
   Falls back to fetch+Blob URL import for restrictive origins. */
const TJS_WORKER_SRC=`
let lib=null;const pipelines={};
async function loadLib(){
  if(lib)return lib;
  self.postMessage({type:"status",phase:"lib",msg:"Downloading transformers.js library...",pct:null});
  try{lib=await import("${TJS_CDN}")}catch(e1){
    self.postMessage({type:"status",phase:"lib",msg:"Loading library (fallback)...",pct:null});
    const resp=await fetch("${TJS_CDN}");
    if(!resp.ok)throw new Error("HTTP "+resp.status);
    const text=await resp.text();
    const blob=new Blob([text],{type:"application/javascript"});
    const url=URL.createObjectURL(blob);
    lib=await import(url);URL.revokeObjectURL(url);
  }
  return lib;
}
async function getPipeline(task,modelId){
  const key=modelId+":"+task;if(pipelines[key])return pipelines[key];
  await loadLib();
  self.postMessage({type:"status",phase:"model",msg:"Loading model weights...",pct:0});
  const pipe=await lib.pipeline(task,modelId,{progress_callback:(p)=>{
    if(p.status==="progress"&&p.progress!=null)self.postMessage({type:"status",phase:"model",msg:p.file||"Downloading...",pct:Math.round(p.progress)});
    else if(p.status==="download")self.postMessage({type:"status",phase:"model",msg:p.file||"Starting download...",pct:null});
    else if(p.status==="initiate")self.postMessage({type:"status",phase:"model",msg:p.file||"Initializing...",pct:null});
    else if(p.status==="done"||p.status==="ready")self.postMessage({type:"status",phase:"model",msg:p.file||"Finalizing...",pct:100});
  }});
  pipelines[key]=pipe;return pipe;
}
self.onerror=(e)=>{self.postMessage({type:"error",id:"__global",error:"Worker: "+(e.message||e)})};
self.onmessage=async(e)=>{
  const{id,action}=e.data;if(!id)return;
  try{
    if(action==="ping"){self.postMessage({type:"done",id,result:{pong:true}});return}
    if(action==="load"){await getPipeline(e.data.task,e.data.modelId);self.postMessage({type:"done",id,result:{loaded:true}});return}
    if(action==="generate"){
      const{task,modelId,prompt,options}=e.data;
      const pipe=await getPipeline(task,modelId);
      self.postMessage({type:"phase",id,phase:"thinking"});
      if(task==="text-generation"){
        self.postMessage({type:"phase",id,phase:"generating"});
        const streamer=new lib.TextStreamer(pipe.tokenizer,{skip_prompt:true,callback_function:(token)=>{self.postMessage({type:"token",id,token})}});
        const result=await pipe(prompt,{max_new_tokens:options.max_new_tokens||256,temperature:options.temperature||0.7,do_sample:options.do_sample!==false,top_p:options.top_p||0.9,streamer});
        self.postMessage({type:"done",id,result:{text:result[0]?.generated_text||""}});
      }else if(task==="text2text-generation"||task==="translation"||task==="summarization"){
        self.postMessage({type:"phase",id,phase:"generating"});
        const result=await pipe(prompt,{max_new_tokens:options.max_new_tokens||256});
        const text=result[0]?.generated_text||result[0]?.translation_text||result[0]?.summary_text||JSON.stringify(result);
        self.postMessage({type:"token",id,token:text});self.postMessage({type:"done",id,result:{text}});
      }else if(task==="text-classification"||task==="sentiment-analysis"){
        self.postMessage({type:"phase",id,phase:"generating"});
        const result=await pipe(prompt);
        const text=(result||[]).map(r=>r.label+" ("+Math.round(r.score*100)+"%)").join(", ");
        self.postMessage({type:"token",id,token:text});self.postMessage({type:"done",id,result:{text}});
      }else if(task==="question-answering"){
        self.postMessage({type:"phase",id,phase:"generating"});
        const result=await pipe(prompt);const text=result.answer||JSON.stringify(result);
        self.postMessage({type:"token",id,token:text});self.postMessage({type:"done",id,result:{text}});
      }else if(task==="feature-extraction"){
        self.postMessage({type:"phase",id,phase:"generating"});
        const result=await pipe(prompt,{pooling:"mean",normalize:true});
        const dim=result?.data?.length||result?.size||"?";const text="Generated embedding vector ("+dim+" dimensions).";
        self.postMessage({type:"token",id,token:text});self.postMessage({type:"done",id,result:{text}});
      }else{
        self.postMessage({type:"phase",id,phase:"generating"});
        const result=await pipe(prompt);const text=typeof result==="string"?result:JSON.stringify(result,null,2);
        self.postMessage({type:"token",id,token:text});self.postMessage({type:"done",id,result:{text}});
      }
    }
  }catch(err){self.postMessage({type:"error",id,error:err.message||String(err)})}
};
`;
const TJS_WORKER_BLOB=new Blob([TJS_WORKER_SRC],{type:"application/javascript"});
const TJS_WORKER_BLOB_URL=URL.createObjectURL(TJS_WORKER_BLOB);

const TJS={
  worker:null,
  workerFailed:false,/* set true if worker can't start; falls back to main-thread */
  lib:null,/* main-thread fallback: loaded transformers lib */
  pipelines:{},/* main-thread fallback: cached pipelines */
  callbacks:{},/* id -> {onStatus,onPhase,onToken,onDone,onError} */

  _ensureWorker(){
    if(TJS.workerFailed)return null;
    if(TJS.worker)return TJS.worker;
    try{
      /* Try Blob URL classic worker first (works on file://),
         then fall back to file-based module worker (works on http://) */
      try{
        TJS.worker=new Worker(TJS_WORKER_BLOB_URL);
      }catch(e){
        TJS.worker=new Worker("./tjs-worker.js",{type:"module"});
      }
      /* Detect silent worker death — if no message within 10s of first command, fall back */
      TJS.worker._alive=false;
      TJS.worker.onmessage=(e)=>{
        TJS.worker._alive=true;
        const d=e.data;
        const cb=TJS.callbacks[d.id];
        if(d.type==="status"){
          Object.values(TJS.callbacks).forEach(c=>{if(c.onStatus)c.onStatus(d.phase,d.msg,d.pct)});
        }
        if(!cb)return;
        if(d.type==="phase"&&cb.onPhase)cb.onPhase(d.phase);
        if(d.type==="token"&&cb.onToken)cb.onToken(d.token);
        if(d.type==="done"){cb.onDone(d.result);delete TJS.callbacks[d.id]}
        if(d.type==="error"){cb.onError(new Error(d.error));delete TJS.callbacks[d.id]}
      };
      TJS.worker.onerror=(e)=>{
        console.warn("TJS Worker error, falling back to main thread:",e.message);
        TJS.workerFailed=true;TJS.worker=null;
        /* Re-reject any pending callbacks */
        Object.values(TJS.callbacks).forEach(cb=>{if(cb.onError)cb.onError(new Error("Worker failed: "+e.message))});
        TJS.callbacks={};
      };
      return TJS.worker;
    }catch(e){
      console.warn("Cannot create TJS Worker, using main thread:",e.message);
      TJS.workerFailed=true;
      return null;
    }
  },

  /* ── Main-thread fallback (used when worker fails on file:// etc) ── */
  async _loadLibMainThread(onStatus){
    if(TJS.lib)return TJS.lib;
    if(onStatus)onStatus("lib","Downloading transformers.js library...",null);
    TJS.lib=await _dynamicImport(TJS_CDN);
    return TJS.lib;
  },
  async _getPipelineMainThread(task,modelId,onStatus){
    const key=modelId+":"+task;
    if(TJS.pipelines[key])return TJS.pipelines[key];
    const lib=await TJS._loadLibMainThread(onStatus);
    if(onStatus)onStatus("model","Loading model weights...",0);
    const pipe=await lib.pipeline(task,modelId,{
      progress_callback:(p)=>{
        if(!onStatus)return;
        if(p.status==="progress"&&p.progress!=null)onStatus("model",p.file||"Downloading...",Math.round(p.progress));
        else if(p.status==="download")onStatus("model",p.file||"Starting download...",null);
        else if(p.status==="initiate")onStatus("model",p.file||"Initializing...",null);
        else if(p.status==="done"||p.status==="ready")onStatus("model",p.file||"Finalizing...",100);
      },
    });
    TJS.pipelines[key]=pipe;
    return pipe;
  },
  async _generateMainThread({task,modelId,prompt,options},handlers){
    const pipe=await TJS._getPipelineMainThread(task,modelId,handlers.onStatus);
    if(handlers.onPhase)handlers.onPhase("thinking");
    /* Yield to UI before heavy computation */
    await new Promise(r=>setTimeout(r,50));
    if(handlers.onPhase)handlers.onPhase("generating");

    if(task==="text-generation"){
      const lib=TJS.lib;
      const streamer=new lib.TextStreamer(pipe.tokenizer,{
        skip_prompt:true,
        callback_function:(token)=>{if(handlers.onToken)handlers.onToken(token)},
      });
      const result=await pipe(prompt,{
        max_new_tokens:options.max_new_tokens||256,
        temperature:options.temperature||0.7,
        do_sample:options.do_sample!==false,
        top_p:options.top_p||0.9,
        streamer,
      });
      return{text:result[0]?.generated_text||""};
    }else if(task==="text2text-generation"||task==="translation"||task==="summarization"){
      const result=await pipe(prompt,{max_new_tokens:options.max_new_tokens||256});
      const text=result[0]?.generated_text||result[0]?.translation_text||result[0]?.summary_text||JSON.stringify(result);
      if(handlers.onToken)handlers.onToken(text);
      return{text};
    }else if(task==="text-classification"||task==="sentiment-analysis"){
      const result=await pipe(prompt);
      const text=(result||[]).map(r=>r.label+" ("+Math.round(r.score*100)+"%)").join(", ");
      if(handlers.onToken)handlers.onToken(text);
      return{text};
    }else if(task==="question-answering"){
      const result=await pipe(prompt);
      const text=result.answer||JSON.stringify(result);
      if(handlers.onToken)handlers.onToken(text);
      return{text};
    }else if(task==="feature-extraction"){
      const result=await pipe(prompt,{pooling:"mean",normalize:true});
      const dim=result?.data?.length||result?.size||"?";
      const text="Generated embedding vector ("+dim+" dimensions).";
      if(handlers.onToken)handlers.onToken(text);
      return{text};
    }else{
      const result=await pipe(prompt);
      const text=typeof result==="string"?result:JSON.stringify(result,null,2);
      if(handlers.onToken)handlers.onToken(text);
      return{text};
    }
  },

  /* ═══ Public API ═══ */

  /* Load a model pipeline (used by Settings panel) */
  loadModel(task,modelId,onStatus){
    const w=TJS._ensureWorker();
    if(!w){
      /* Main-thread fallback */
      return TJS._getPipelineMainThread(task,modelId,onStatus).then(()=>({loaded:true}));
    }
    return new Promise((resolve,reject)=>{
      const id="load-"+Date.now()+"-"+Math.random().toString(36).slice(2);
      TJS.callbacks[id]={onStatus,onDone:resolve,onError:(err)=>{
        /* If worker fails during load, retry on main thread */
        if(TJS.workerFailed){
          TJS._getPipelineMainThread(task,modelId,onStatus).then(()=>resolve({loaded:true})).catch(reject);
        }else reject(err);
      }};
      w.postMessage({id,action:"load",task,modelId});
      /* Watchdog: if no message received within 10s, worker is dead */
      setTimeout(()=>{
        if(!w._alive&&TJS.callbacks[id]){
          console.warn("TJS Worker unresponsive, falling back to main thread");
          TJS.workerFailed=true;TJS.worker=null;
          delete TJS.callbacks[id];
          TJS._getPipelineMainThread(task,modelId,onStatus).then(()=>resolve({loaded:true})).catch(reject);
        }
      },10000);
    });
  },

  /* Generate with streaming tokens — returns promise, calls onToken/onPhase as it goes */
  generate({task,modelId,prompt,options},handlers){
    const w=TJS._ensureWorker();
    if(!w){
      return TJS._generateMainThread({task,modelId,prompt,options},handlers);
    }
    return new Promise((resolve,reject)=>{
      const id="gen-"+Date.now()+"-"+Math.random().toString(36).slice(2);
      TJS.callbacks[id]={
        onStatus:handlers.onStatus,
        onPhase:handlers.onPhase,
        onToken:handlers.onToken,
        onDone:(result)=>{resolve(result)},
        onError:(err)=>{
          if(TJS.workerFailed){
            TJS._generateMainThread({task,modelId,prompt,options},handlers).then(resolve).catch(reject);
          }else reject(err);
        },
      };
      w.postMessage({id,action:"generate",task,modelId,prompt,options:options||{}});
    });
  },
};

}

function McpVideoPlayer({data}){
  /* Convert YouTube URLs to embeds */
  const src=useMemo(()=>{
    const u=data.url||"";
    const yt=u.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([\w-]+)/);
    if(yt)return"https://www.youtube.com/embed/"+yt[1];
    return u;
  },[data.url]);
  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:"#0a0a0c"}}>
      {data.title&&<div style={{padding:"10px 16px",borderBottom:"1px solid rgba(255,255,255,.06)",fontSize:13,fontWeight:600,color:"#e4e4e7"}}>{data.title}</div>}

}

const API_ENDPOINTS={
  anthropic:{url:"https://api.anthropic.com/v1/messages",header:"x-api-key"},
  openai:{url:"https://api.openai.com/v1/chat/completions",header:"Authorization",prefix:"Bearer "},
  google:{url:"https://generativelanguage.googleapis.com/v1beta/models/{model}:generateContent",header:"x-goog-api-key"},
  openrouter:{url:"https://openrouter.ai/api/v1/chat/completions",header:"Authorization",prefix:"Bearer "},
  ollama:{url:"http://localhost:11434/api/chat",header:null},
};

function buildMcpTools(){
  return Object.entries(MCP_APPS).map(([id,app])=>({
    name:id,description:app.description,input_schema:app.parameters,
  }));
}

async function callLLM(providerId,apiKey,modelId,messages,onChunk){
  const endpoint=API_ENDPOINTS[providerId];
  if(!endpoint)throw new Error("Unknown provider: "+providerId);
  const tools=buildMcpTools();
  const systemMsg="You are a browser workspace assistant. You have access to MCP apps you can invoke as tools to display rich content to the user. Use them when appropriate — for example, use task_tracker for task lists, gallery for image collections, image_viewer for single images, video_player for videos, notes for documents, data_table for structured data. Always respond helpfully and concisely.";

  if(providerId==="anthropic"){
    const headers={"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"};
    const body={model:modelId,max_tokens:1024,system:systemMsg,
      messages:messages.map(m=>({role:m.role==="user"?"user":"assistant",content:m.content})),
      tools:tools};
    const resp=await fetch(endpoint.url,{method:"POST",headers,body:JSON.stringify(body)});
    if(!resp.ok){const err=await resp.text();throw new Error("API error "+resp.status+": "+err)}
    const data=await resp.json();
    const textParts=[];const toolCalls=[];
    (data.content||[]).forEach(block=>{
      if(block.type==="text")textParts.push(block.text);
      if(block.type==="tool_use")toolCalls.push({name:block.name,input:block.input,id:block.id});
    });
    return{text:textParts.join("\n"),toolCalls,stopReason:data.stop_reason};
  }

  if(providerId==="openai"||providerId==="openrouter"){
    const headers={"Content-Type":"application/json","Authorization":"Bearer "+apiKey};
    if(providerId==="openrouter")headers["HTTP-Referer"]="workspace-browser";
    const oaiTools=tools.map(t=>({type:"function",function:{name:t.name,description:t.description,parameters:t.input_schema}}));
    const body={model:modelId,max_tokens:1024,
      messages:[{role:"system",content:systemMsg},...messages.map(m=>({role:m.role,content:m.content}))],
      tools:oaiTools};
    const resp=await fetch(providerId==="openrouter"?endpoint.url:"https://api.openai.com/v1/chat/completions",{method:"POST",headers,body:JSON.stringify(body)});
    if(!resp.ok){const err=await resp.text();throw new Error("API error "+resp.status+": "+err)}
    const data=await resp.json();
    const choice=data.choices?.[0];
    const text=choice?.message?.content||"";
    const toolCalls=(choice?.message?.tool_calls||[]).map(tc=>({name:tc.function.name,input:JSON.parse(tc.function.arguments||"{}"),id:tc.id}));
    return{text,toolCalls,stopReason:choice?.finish_reason};
  }

  throw new Error("Provider "+providerId+" not yet supported for live calls");
}

/* ═══════════ Helpers ═══════════ */
function fmt(mb){if(mb>=1024)return(mb/1024).toFixed(1)+" GB";if(mb>=1)return Math.round(mb)+" MB";return Math.round(mb*1024)+" KB"}
function cntTabs(n){return n.type==="tab"?1:(n.children||[]).reduce((s,c)=>s+cntTabs(c),0)}
function sumMem(n){return n.type==="tab"?(n.memoryMB||0):(n.children||[]).reduce((s,c)=>s+sumMem(c),0)}
function deepUpdate(node,id,fn){if(node.id===id)return fn(node);if(node.children)return{...node,children:node.children.map(c=>deepUpdate(c,id,fn))};return node}
function findNode(node,id){if(node.id===id)return node;if(node.children)for(const c of node.children){const f=findNode(c,id);if(f)return f}return null}
function collectMem(node){const t={hot:0,warm:0,cool:0,cold:0};(function w(n){if(n.type==="tab")t[n.memoryTier]+=(n.memoryMB||0);(n.children||[]).forEach(w)})(node);return t}
/* ── Omnibar intent classifier ── */
const BROWSER_URI_RE=/^(https?:\/\/|ftp:\/\/|file:\/\/|chrome:\/\/|about:|data:|blob:|ws:\/\/|wss:\/\/)\S+/i;
const BARE_DOMAIN_RE=/^[a-z0-9]([a-z0-9-]*[a-z0-9])?(\.[a-z]{2,})+(\:\d+)?(\/\S*)?/i;
const LOCALHOST_RE=/^localhost(:\d+)?(\/\S*)?$/i;
function classifyOmni(raw){
  if(!raw)return{intent:null};
  const s=raw.trimStart();
  if(!s)return{intent:null};
  /* Protocol-based URI */
  const pm=s.match(BROWSER_URI_RE);
  if(pm){
    const uri=pm[0];
    const rest=s.slice(uri.length);
    if(!rest.trim())return{intent:"navigate",url:uri};
    return{intent:"search",query:raw.trim()};
  }
  /* Bare domain (e.g. google.com, foo.co.uk/path) */
  const bm=s.match(BARE_DOMAIN_RE);
  if(bm){
    const uri=s.match(/^\S+/)[0];
    const rest=s.slice(uri.length);
    if(!rest.trim())return{intent:"navigate",url:"https://"+uri};
    return{intent:"search",query:raw.trim()};
  }
  /* localhost with optional port/path */
  const lm=s.match(LOCALHOST_RE);
  if(lm){
    if(!s.slice(lm[0].length).trim())return{intent:"navigate",url:"http://"+lm[0]};
    return{intent:"search",query:raw.trim()};
  }
  /* Plain text → search */
  return{intent:"search",query:raw.trim()};
}
/* Legacy compat wrapper */
function isUrl(s){return classifyOmni(s).intent==="navigate"}
function flattenTabs(node){
  if(node.type==="tab")return[node];
  return(node.children||[]).flatMap(flattenTabs);
}
function getParentPath(root,targetId,path=""){
  if(root.id===targetId)return path;
  for(const c of(root.children||[])){
    const p=getParentPath(c,targetId,path?path+" / "+root.name:root.name);
    if(p!==null)return p;
  }
  return null;
}

function Favicon({url,size=14}){
  const[err,setErr]=useState(false);
  const domain=useMemo(()=>{try{return new URL(url?.startsWith("http")?url:"https://"+url).hostname}catch(e){return null}},[url]);
  if(!domain||err)return<I d={ic.globe} size={size} color="rgba(255,255,255,.3)"/>;
  return<img src={"https://www.google.com/s2/favicons?domain="+domain+"&sz=32"} width={size} height={size}
    onError={()=>setErr(true)} style={{borderRadius:2,flexShrink:0,display:"block"}} alt=""/>;
}

/* ═══════════ Tab row ═══════════ */
function TabRow({tab,depth,active,onOpen,onClose,onUpdateTab,isCursor,isSelected,isMoveSource,onSetCursor,draggable:isDraggable,onDragStart:onDS,onDragOver:onDO,onDrop:onDr}){
  const[hov,setHov]=useState(false);
  const[editing,setEditing]=useState(false);
  const[editVal,setEditVal]=useState("");
  const urlRef=useRef(null);
  const clickTimer=useRef(null);
  const dim=tab.memoryTier==="cold"?.35:tab.memoryTier==="cool"?.5:.85;
  const bgColor=active?"rgba(96,165,250,.1)":isCursor?"rgba(96,165,250,.06)":isSelected?"rgba(52,211,153,.06)":hov?"rgba(255,255,255,.025)":"transparent";

  /* Shortened display URL */
  const shortUrl=useMemo(()=>{
    try{const u=new URL(tab.url?.startsWith("http")?tab.url:"https://"+tab.url);return u.hostname+u.pathname.replace(/\/$/,"")}catch(e){return tab.url||""}
  },[tab.url]);

  const startEditing=useCallback(e=>{
    if(e)e.stopPropagation();
    setEditVal(tab.url||"");
    setEditing(true);
  },[tab.url]);

  useEffect(()=>{
    if(editing&&urlRef.current){urlRef.current.focus();urlRef.current.setSelectionRange(urlRef.current.value.length,urlRef.current.value.length)}
  },[editing]);

  const commitUrl=useCallback(()=>{
    const v=editVal.trim();
    if(v&&v!==tab.url&&onUpdateTab){
      const url=v.startsWith("http")?v:"https://"+v;
      /* Derive new name from hostname */
      let name=tab.name;
      try{name=new URL(url).hostname.replace(/^www\./,"")}catch(e){}
      onUpdateTab(tab.id,{url,name});
    }
    setEditing(false);
  },[editVal,tab.url,tab.name,tab.id,onUpdateTab]);

  const cancelEdit=useCallback(()=>{
    setEditing(false);
    setEditVal("");
  },[]);

  /* Delayed single-click: gives double-click a chance to cancel */
  const handleClick=useCallback(()=>{
    if(editing)return;
    clickTimer.current=setTimeout(()=>{
      onSetCursor&&onSetCursor(tab.id);
      onOpen(tab);
    },200);
  },[editing,tab,onOpen,onSetCursor]);

  const handleDoubleClick=useCallback(e=>{
    clearTimeout(clickTimer.current);
    startEditing(e);
  },[startEditing]);

  /* Cleanup on unmount */
  useEffect(()=>()=>clearTimeout(clickTimer.current),[]);

  return(
    <div onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      onClick={handleClick}
      onDoubleClick={handleDoubleClick}
      draggable={isDraggable} onDragStart={onDS} onDragOver={onDO} onDrop={onDr}
      style={{display:"flex",alignItems:"center",gap:6,padding:"3px 8px 3px "+(depth*16+20)+"px",
        cursor:"pointer",borderRadius:4,transition:"background .1s,opacity .15s",
        background:bgColor,borderLeft:active?"2px solid #60a5fa":isCursor?"2px solid rgba(96,165,250,.5)":"2px solid transparent",
        opacity:isMoveSource?.35:1}}>
      {isSelected&&<I d="M20 6L9 17l-5-5" size={11} color="#34d399"/>}
      <Favicon url={tab.url} size={13}/>
      <div style={{flex:1,minWidth:0,display:"flex",flexDirection:"column",gap:0}}>
        <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",opacity:dim,fontSize:12,letterSpacing:"-.01em",
          color:active?"#e4e4e7":"inherit",fontWeight:active?500:400}}>{tab.name}</span>
        {editing?(
          <input ref={urlRef} value={editVal} onChange={e=>setEditVal(e.target.value)}
            onClick={e=>e.stopPropagation()}
            onKeyDown={e=>{
              if(e.key==="Enter"){e.preventDefault();commitUrl()}
              if(e.key==="Escape"){e.preventDefault();cancelEdit()}
              e.stopPropagation();
            }}
            onBlur={cancelEdit}
            style={{width:"100%",background:"rgba(255,255,255,.06)",border:"1px solid rgba(96,165,250,.3)",borderRadius:3,
              padding:"1px 4px",fontSize:10,color:"#93c5fd",outline:"none",fontFamily:"inherit",letterSpacing:"-.01em"}}/>
        ):(
          <span title={tab.url}
            style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontSize:10,color:"rgba(255,255,255,.15)",
              letterSpacing:"-.01em"}}>
            {shortUrl}
          </span>
        )}
      </div>
      {hov&&!editing&&onClose&&<button onClick={e=>{e.stopPropagation();onClose(tab.id)}} title="Close tab"
        style={{background:"none",border:"none",padding:2,borderRadius:3,display:"flex",color:"rgba(255,255,255,.2)",flexShrink:0,animation:"fade-in .1s ease-out"}}>
        <I d={ic.x} size={12}/>
      </button>}
    </div>
  );
}

/* ═══════════ Workspace folder ═══════════ */
function WsFolder({ws,depth=0,activeTabId,activeSet,onOpen,onClose,onUpdateTab,onToggle,onPin,onToggleMem,
  cursorId,selectedIds,moveSourceIds,onSetCursor,folderIndex,
  onDragStart:onFDS,onDragOver:onFDO,onDrop:onFDr,dropHighlight,
  onTabDragStart,onTabDragOver,onTabDrop,dropTargetId,dropPosition}){
  const[hov,setHov]=useState(false);
  const tabs=cntTabs(ws);const tmp=!ws.persisted;const act=ws.activeMemory;
  const isCursor=cursorId===ws.id;
  const isSelected=selectedIds&&selectedIds.has(ws.id);
  const isMoveSource=moveSourceIds&&moveSourceIds.includes(ws.id);
  const isDropTarget=dropHighlight||(isCursor&&moveSourceIds&&moveSourceIds.length>0&&!isMoveSource);
  const bdrColor=dropHighlight?"#60a5fa":isCursor?"#60a5fa":isDropTarget?"#a78bfa":act?"rgba(52,211,153,.45)":tmp?"rgba(63,63,70,.3)":"rgba(63,63,70,.45)";
  const bdrStyle=isDropTarget?"dashed":tmp&&!act?"dashed":"solid";
  const rowOpac=isMoveSource?.3:(!act&&tmp)?.35:!act?.5:1;
  const bgColor=dropHighlight?"rgba(96,165,250,.1)":isCursor?"rgba(96,165,250,.06)":isSelected?"rgba(52,211,153,.06)":hov?"rgba(255,255,255,.025)":"transparent";
  return(
    <div style={{opacity:rowOpac,transition:"opacity .2s"}}>
      <div onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
        onClick={()=>{onSetCursor&&onSetCursor(ws.id);onToggle(ws.id)}}
        draggable onDragStart={onFDS} onDragOver={onFDO} onDrop={onFDr}
        style={{display:"flex",alignItems:"center",gap:5,padding:"4px 8px 4px "+(depth*16+4)+"px",
          cursor:"pointer",borderRadius:4,borderLeft:"2px "+bdrStyle+" "+bdrColor,
          transition:"background .1s",background:bgColor}}>
        {isSelected&&<I d="M20 6L9 17l-5-5" size={11} color="#34d399"/>}
        <span style={{display:"flex",transition:"transform .12s",transform:ws.expanded?"rotate(90deg)":"rotate(0)"}}>
          <I d={ic.chevron} size={11} color="rgba(255,255,255,.25)"/>
        </span>
        {act&&<Pulse/>}
        <I d={ws.expanded?ic.folderOpen:ic.folder} size={13} color={act?"#34d399":tmp?"rgba(255,255,255,.25)":"rgba(255,255,255,.4)"}/>
        <span style={{flex:1,fontSize:12,fontWeight:550,letterSpacing:"-.01em",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",
          fontStyle:tmp?"italic":"normal",color:act?"#d4d4d8":tmp?"rgba(255,255,255,.45)":"rgba(255,255,255,.6)"}}>{ws.name}</span>
        <span style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
          {typeof folderIndex==="number"&&<span style={{fontSize:9,opacity:.12,fontVariantNumeric:"tabular-nums",fontWeight:500}}>{folderIndex+1}</span>}
          <span style={{fontSize:10,opacity:.15,fontVariantNumeric:"tabular-nums",fontWeight:500}}>{tabs}</span>
          {hov&&(
            <span style={{display:"flex",gap:0,animation:"fade-in .1s ease-out"}}>
              <button onClick={e=>{e.stopPropagation();onPin(ws.id)}} title={ws.persisted?"Remove bookmark":"Bookmark"}
                style={{background:"none",border:"none",padding:3,borderRadius:3,display:"flex",color:ws.persisted?"#fbbf24":"rgba(255,255,255,.2)"}}>
                <I d={ic.bookmarkFill} size={13} fill={ws.persisted?"#fbbf24":"none"} color={ws.persisted?"#fbbf24":"rgba(255,255,255,.2)"}/>
              </button>
              <button onClick={e=>{e.stopPropagation();onToggleMem(ws.id)}} title={ws.activeMemory?"Hibernate":"Activate"}
                style={{background:"none",border:"none",padding:3,borderRadius:3,display:"flex",color:ws.activeMemory?"#34d399":"rgba(255,255,255,.2)"}}>
                {ws.activeMemory?<I d={ic.zap} size={13} color="#34d399" fill="rgba(52,211,153,.12)"/>:<I d={ic.snowflake} size={13} color="rgba(255,255,255,.2)"/>}
              </button>
            </span>
          )}
        </span>
      </div>
      {ws.expanded&&ws.children&&ws.children.map(c=>{
        const isChildDrop=dropTargetId===c.id;
        const childDropLine=isChildDrop&&dropPosition!=="inside"?(
          <div style={{height:2,margin:"0 8px 0 "+(((depth+1)*16)+20)+"px",background:"#60a5fa",borderRadius:1}}/>
        ):null;
        return c.type==="workspace"
          ?<React.Fragment key={c.id}>
            {isChildDrop&&dropPosition==="above"&&childDropLine}
            <WsFolder ws={c} depth={depth+1} activeTabId={activeTabId} activeSet={activeSet} onOpen={onOpen} onClose={onClose} onUpdateTab={onUpdateTab} onToggle={onToggle} onPin={onPin} onToggleMem={onToggleMem}
              cursorId={cursorId} selectedIds={selectedIds} moveSourceIds={moveSourceIds} onSetCursor={onSetCursor}
              dropHighlight={isChildDrop&&dropPosition==="inside"}
              onDragStart={onTabDragStart?e=>onTabDragStart(e,c.id,"folder"):undefined}
              onDragOver={onTabDragOver?e=>onTabDragOver(e,c.id,"folder",depth+1):undefined}
              onDrop={onTabDrop?e=>onTabDrop(e,c.id,"folder"):undefined}
              onTabDragStart={onTabDragStart} onTabDragOver={onTabDragOver} onTabDrop={onTabDrop}
              dropTargetId={dropTargetId} dropPosition={dropPosition}/>
            {isChildDrop&&dropPosition==="below"&&childDropLine}
          </React.Fragment>
          :<React.Fragment key={c.id}>
            {isChildDrop&&dropPosition==="above"&&childDropLine}
            <TabRow tab={c} depth={depth+1} active={activeSet&&activeSet.has(c.id)} onOpen={onOpen} onClose={onClose} onUpdateTab={onUpdateTab}
              isCursor={cursorId===c.id} isSelected={selectedIds&&selectedIds.has(c.id)} isMoveSource={moveSourceIds&&moveSourceIds.includes(c.id)} onSetCursor={onSetCursor}
              draggable onDragStart={onTabDragStart?e=>onTabDragStart(e,c.id,"tab"):undefined}
              onDragOver={onTabDragOver?e=>onTabDragOver(e,c.id,"tab",depth+1):undefined}
              onDrop={onTabDrop?e=>onTabDrop(e,c.id,"tab"):undefined}/>
            {isChildDrop&&dropPosition==="below"&&childDropLine}
          </React.Fragment>;
      })}
    </div>
  );
}

            style={{width:200,display:"flex",flexDirection:"column",gap:8,cursor:"pointer"}}>

              border:"2px dashed rgba(255,255,255,.08)",
              display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:6,
              background:"rgba(255,255,255,.01)",transition:"all .15s"}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor="rgba(255,255,255,.2)";e.currentTarget.style.background="rgba(255,255,255,.03)"}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(255,255,255,.08)";e.currentTarget.style.background="rgba(255,255,255,.01)"}}>
              <I d={ic.plus} size={20} color="rgba(255,255,255,.2)"/>

/* ═══════════ Memory bar ═══════════ */
function MemBar({root}){
  const budget=2048;const t=collectMem(root);const used=t.hot+t.warm+t.cool+t.cold;
  const pct=mb=>Math.max((mb/budget)*100,.3);
  const cs=[["#f87171","Hot",t.hot],["#fbbf24","Warm",t.warm],["#60a5fa","Cool",t.cool],["#52525b","Cold",t.cold]];
  return(
    <div style={{padding:"8px 12px 10px"}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:10,opacity:.25,marginBottom:4,fontWeight:500}}>
        <span>Memory</span><span>{fmt(used)} / {fmt(budget)}</span>
      </div>
      <div style={{display:"flex",height:3,borderRadius:2,overflow:"hidden",background:"rgba(255,255,255,.03)",gap:1}}>
        {cs.map(([c,,v],i)=><div key={i} style={{width:pct(v)+"%",background:c,transition:"width .5s"}}/>)}
      </div>
      <div style={{display:"flex",gap:8,marginTop:5,fontSize:9.5,opacity:.2,fontWeight:500}}>
        {cs.map(([c,l])=><span key={l} style={{display:"flex",alignItems:"center",gap:3}}><span style={{width:5,height:5,borderRadius:"50%",background:c}}/>{l}</span>)}
      </div>
    </div>
  );
}

/* ═══════════ Workspace Panel ═══════════ */
function WorkspacePanel({root,activeTabId,activeTabIds,liveFilter,onOpen,onClose,onUpdateTab,onToggle,onPin,onToggleMem,omniValue,omniMode,onOmniChange,onOmniKeyDown,onOmniClear,inputRef,
  /* overlay controls */
  overlayActive,onBack,onFwd,onRefresh,canGoBack,canGoFwd,
  pickerActive,onTogglePicker,pickedCount,consoleLogs,
  chatOpen,onToggleChat,onCloseOverlay,
  /* keyboard nav */
  cursorId,selectedIds,moveSourceIds,moveMode,treeFilter,onSetCursor,onTreeKeyDown,onShowShortcuts,
  /* workspace switching */
  workspaces,activeWsId,activeWsColor,onSwitchWorkspace,onCreateWorkspace,onDeleteWorkspace,onRenameWorkspace,onToggleWsOverlay,onMoveNodes}){
  const activeSet=useMemo(()=>new Set(activeTabIds||[]),[activeTabIds]);
  const filtered=useMemo(()=>{
    if(!liveFilter)return root.children;
    function filt(nodes){return nodes.reduce((acc,n)=>{
      if(n.name.toLowerCase().includes(liveFilter.toLowerCase()))acc.push({...n,expanded:true});
      else if(n.children){const f=filt(n.children);if(f.length)acc.push({...n,children:f,expanded:true})}
      return acc;
    },[])}
    return filt(root.children);
  },[root,liveFilter]);
  const totalTabs=cntTabs(root);
  const ac=root.children.filter(c=>c.activeMemory).length;
  const sv=root.children.filter(c=>c.persisted).length;
  const omniHint=omniMode==="navigate"?"Enter to navigate":omniMode==="search"?"Enter to search":"Search or enter URL";

  /* ── Drag-and-drop ── */
  const dragRef=useRef({sourceId:null,sourceType:null});
  const[dropTargetId,setDropTargetId]=useState(null);
  const[dropPosition,setDropPosition]=useState(null); // "above"|"inside"|"below"

  const handleDragStart=useCallback((e,nodeId,nodeType)=>{
    dragRef.current={sourceId:nodeId,sourceType:nodeType};
    e.dataTransfer.effectAllowed="move";
    e.dataTransfer.setData("text/plain",nodeId);
    /* Make drag image semi-transparent */
    if(e.target){e.target.style.opacity="0.4";setTimeout(()=>{e.target.style.opacity=""},0)}
  },[]);

  const handleDragOver=useCallback((e,nodeId,nodeType,depth)=>{
    e.preventDefault();e.stopPropagation();
    if(nodeId===dragRef.current.sourceId)return;
    e.dataTransfer.dropEffect="move";
    /* Determine drop position based on mouse Y within the element */
    const rect=e.currentTarget.getBoundingClientRect();
    const y=e.clientY-rect.top;
    const h=rect.height;
    if(nodeType==="folder"){
      if(y<h*0.25)setDropPosition("above");
      else if(y>h*0.75)setDropPosition("below");
      else setDropPosition("inside");
    }else{
      setDropPosition(y<h*0.5?"above":"below");
    }
    setDropTargetId(nodeId);
  },[]);

  const handleDragLeave=useCallback((e)=>{
    /* Only clear if leaving the tree entirely */
    const related=e.relatedTarget;
    if(!related||!e.currentTarget.contains(related)){
      setDropTargetId(null);setDropPosition(null);
    }
  },[]);

  const handleDrop=useCallback((e,targetNodeId,targetNodeType)=>{
    e.preventDefault();e.stopPropagation();
    const sourceId=dragRef.current.sourceId;
    if(!sourceId||sourceId===targetNodeId){setDropTargetId(null);setDropPosition(null);return}

    /* Find parent and index of target to determine insertion point */
    function findParentAndIdx(node,targetId,parent){
      if(node.children){
        for(let i=0;i<node.children.length;i++){
          if(node.children[i].id===targetId)return{parent:node,idx:i};
          if(node.children[i].children){
            const found=findParentAndIdx(node.children[i],targetId,node.children[i]);
            if(found)return found;
          }
        }
      }
      return null;
    }

    if(targetNodeType==="folder"&&dropPosition==="inside"){
      /* Drop into folder */
      onMoveNodes([sourceId],targetNodeId,null);
    }else{
      /* Drop above/below a sibling */
      const info=findParentAndIdx(root,targetNodeId,null);
      if(info){
        const parentId=info.parent.id;
        const insertIdx=dropPosition==="below"?info.idx+1:info.idx;
        onMoveNodes([sourceId],parentId,insertIdx);
      }
    }
    dragRef.current={sourceId:null,sourceType:null};
    setDropTargetId(null);setDropPosition(null);
  },[root,dropPosition,onMoveNodes]);

  const handleTreeDragOver=useCallback(e=>{
    /* Allow dropping at root level (bottom of tree) */
    e.preventDefault();
    if(!dropTargetId){setDropTargetId("__root__");setDropPosition("inside")}
  },[dropTargetId]);

  const handleTreeDrop=useCallback(e=>{
    e.preventDefault();
    const sourceId=dragRef.current.sourceId;
    if(sourceId&&dropTargetId==="__root__"){
      onMoveNodes([sourceId],null,null);
    }
    dragRef.current={sourceId:null,sourceType:null};
    setDropTargetId(null);setDropPosition(null);
  },[dropTargetId,onMoveNodes]);

  const handleDragEnd=useCallback(()=>{
    dragRef.current={sourceId:null,sourceType:null};
    setDropTargetId(null);setDropPosition(null);
  },[]);

  /* toolbar button style helper (reusable for overlay controls in sidebar) */
  const tbBtn=(enabled=true)=>({
    background:"none",border:"none",padding:5,borderRadius:4,display:"flex",alignItems:"center",justifyContent:"center",
    color:enabled?"rgba(255,255,255,.4)":"rgba(255,255,255,.1)",
    cursor:enabled?"pointer":"default",transition:"all .1s",
  });
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      {/* ── Controls row: nav left, context right ── */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 10px 0"}}>
        <div style={{display:"flex",alignItems:"center",gap:2}}>
          <button onClick={onBack} disabled={!canGoBack} title="Back" style={tbBtn(canGoBack)}
            onMouseEnter={e=>{if(canGoBack)e.currentTarget.style.background="rgba(255,255,255,.06)"}}
            onMouseLeave={e=>{e.currentTarget.style.background="none"}}>
            <I d={ic.arrowLeft} size={15}/>
          </button>
          <button onClick={onFwd} disabled={!canGoFwd} title="Forward" style={tbBtn(canGoFwd)}
            onMouseEnter={e=>{if(canGoFwd)e.currentTarget.style.background="rgba(255,255,255,.06)"}}
            onMouseLeave={e=>{e.currentTarget.style.background="none"}}>
            <I d={ic.arrowRight} size={15}/>
          </button>
          <button onClick={onRefresh} title="Refresh" style={tbBtn(true)}
            onMouseEnter={e=>{e.currentTarget.style.background="rgba(255,255,255,.06)"}}
            onMouseLeave={e=>{e.currentTarget.style.background="none"}}>
            <I d={ic.refreshCw} size={14}/>
          </button>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:2}}>
          <button onClick={onTogglePicker} title="Add element to chat"
            style={{...tbBtn(true),color:pickerActive?"#34d399":"rgba(255,255,255,.4)",background:pickerActive?"rgba(52,211,153,.1)":"none",position:"relative"}}
            onMouseEnter={e=>{if(!pickerActive)e.currentTarget.style.background="rgba(255,255,255,.06)"}}
            onMouseLeave={e=>{if(!pickerActive)e.currentTarget.style.background="none"}}>
            <I d={ic.crosshair} size={14} color={pickerActive?"#34d399":"currentColor"}/>
            {pickedCount>0&&<span style={{position:"absolute",top:1,right:1,width:8,height:8,borderRadius:"50%",background:"#34d399",fontSize:7,color:"#000",fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{pickedCount}</span>}
          </button>
          <button onClick={onToggleChat} title={chatOpen?"Close page chat":"Open page chat"}
            style={{...tbBtn(true),color:chatOpen?"#60a5fa":"rgba(255,255,255,.4)",background:chatOpen?"rgba(96,165,250,.1)":"none"}}
            onMouseEnter={e=>{if(!chatOpen)e.currentTarget.style.background="rgba(255,255,255,.06)"}}
            onMouseLeave={e=>{if(!chatOpen)e.currentTarget.style.background="none"}}>
            <I d={ic.panelRight} size={14} color={chatOpen?"#60a5fa":"currentColor"}/>
          </button>
        </div>
      </div>
      {/* Workspace color indicator */}
      <div style={{height:2,background:activeWsColor,opacity:.3,flexShrink:0}}/>
      {/* Omnibar */}
      <div style={{padding:"10px 10px 8px"}}>
        <div style={{position:"relative",display:"flex",alignItems:"center",gap:0}}>
          <span style={{position:"absolute",left:8,top:"50%",transform:"translateY(-50%)",display:"flex",opacity:.25,pointerEvents:"none",zIndex:1}}>
            {omniMode==="navigate"?<I d={ic.globe} size={13}/>:<I d={ic.search} size={13}/>}
          </span>
          <input ref={inputRef} value={omniValue} onChange={onOmniChange} onKeyDown={onOmniKeyDown}
            placeholder={omniHint}
            style={{width:"100%",background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)",borderRadius:6,
              padding:"6px 28px 6px 28px",fontSize:12,color:"#d4d4d8",outline:"none",transition:"border-color .15s,background .15s",letterSpacing:"-.01em"}}
            onFocus={e=>{e.target.style.borderColor="rgba(255,255,255,.12)";e.target.style.background="rgba(255,255,255,.05)"}}
            onBlur={e=>{e.target.style.borderColor="rgba(255,255,255,.06)";e.target.style.background="rgba(255,255,255,.03)"}}
          />
          {omniValue&&<button onClick={onOmniClear}
            style={{position:"absolute",right:6,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",padding:2,color:"rgba(255,255,255,.2)",display:"flex",zIndex:1}}>
            <I d={ic.x} size={11}/>
          </button>}
        </div>
      </div>
      {/* Header row */}
      <div style={{padding:"0 12px 6px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",gap:8,fontSize:10,opacity:.15,fontWeight:500}}>
          <span>{totalTabs} pages</span><span style={{opacity:.4}}>·</span><span>{ac} active</span><span style={{opacity:.4}}>·</span><span>{sv} saved</span>
        </div>
        <div style={{display:"flex",gap:2}}>
          <button onClick={onShowShortcuts} title="Keyboard shortcuts (?)"
            style={{background:"none",border:"none",padding:2,borderRadius:3,color:"rgba(255,255,255,.15)",display:"flex",cursor:"pointer",transition:"color .1s"}}
            onMouseEnter={e=>{e.currentTarget.style.color="rgba(255,255,255,.4)"}}
            onMouseLeave={e=>{e.currentTarget.style.color="rgba(255,255,255,.15)"}}>
            <I d={ic.keyboard} size={12}/>
          </button>
          <button onClick={onToggleWsOverlay} title="Switch workspace" data-action="ws-overlay"
            style={{background:"none",border:"none",padding:2,borderRadius:3,color:"rgba(255,255,255,.15)",display:"flex",cursor:"pointer",transition:"color .1s"}}
            onMouseEnter={e=>{e.currentTarget.style.color="rgba(255,255,255,.4)"}}
            onMouseLeave={e=>{e.currentTarget.style.color="rgba(255,255,255,.15)"}}>
            <I d={ic.desktops} size={12}/>
          </button>
        </div>
      </div>
      <div style={{borderBottom:"1px solid rgba(255,255,255,.04)"}}/>
      {/* Filter overlay */}
      {treeFilter&&(
        <div style={{padding:"5px 10px",background:"rgba(96,165,250,.06)",borderBottom:"1px solid rgba(96,165,250,.15)",display:"flex",alignItems:"center",gap:6}}>
          <I d={ic.search} size={12} color="#60a5fa"/>
          <span style={{fontSize:12,color:"#93c5fd",flex:1}}>{treeFilter}</span>
          <span style={{fontSize:10,color:"#52525b"}}>Esc to clear</span>
        </div>
      )}
      {/* Move mode banner */}
      {moveMode&&moveSourceIds&&moveSourceIds.length>0&&(
        <div style={{padding:"5px 10px",background:"rgba(167,139,250,.08)",borderBottom:"1px solid rgba(167,139,250,.2)",borderLeft:"2px solid #a78bfa",
          fontSize:11,color:"#c4b5fd",display:"flex",alignItems:"center",gap:6}}>
          <span>Moving {moveSourceIds.length} item{moveSourceIds.length!==1?"s":""}</span>
          <span style={{color:"#71717a"}}>· Ctrl+V to drop · Esc to cancel</span>
        </div>
      )}
      {/* Tree */}
      <div role="tree" tabIndex={0} onKeyDown={onTreeKeyDown}
        onDragOver={handleTreeDragOver} onDrop={handleTreeDrop} onDragEnd={handleDragEnd}
        style={{flex:1,overflowY:"auto",padding:"3px 0",outline:"none"}}>
        {filtered.length===0
          ?<div style={{textAlign:"center",padding:32,fontSize:11,opacity:.15}}>{liveFilter?"No matches":"Empty"}</div>
          :filtered.map((node,idx)=>{
            const isDropHere=dropTargetId===node.id;
            const dropLine=isDropHere&&dropPosition!=="inside"?(
              <div style={{height:2,margin:"0 8px",background:"#60a5fa",borderRadius:1,transition:"opacity .1s"}}/>
            ):null;
            const dropHighlight=isDropHere&&dropPosition==="inside";
            return node.type==="tab"?(
              <React.Fragment key={node.id}>
                {isDropHere&&dropPosition==="above"&&dropLine}
                <TabRow tab={node} depth={0} active={activeSet&&activeSet.has(node.id)} onOpen={onOpen} onClose={onClose} onUpdateTab={onUpdateTab}
                  isCursor={cursorId===node.id} isSelected={selectedIds&&selectedIds.has(node.id)} isMoveSource={moveSourceIds&&moveSourceIds.includes(node.id)} onSetCursor={onSetCursor}
                  draggable onDragStart={e=>handleDragStart(e,node.id,"tab")}
                  onDragOver={e=>handleDragOver(e,node.id,"tab",0)} onDrop={e=>handleDrop(e,node.id,"tab")}/>
                {isDropHere&&dropPosition==="below"&&dropLine}
              </React.Fragment>
            ):(
              <React.Fragment key={node.id}>
                {isDropHere&&dropPosition==="above"&&dropLine}
                <WsFolder ws={node} depth={0} activeTabId={activeTabId} activeSet={activeSet} onOpen={onOpen} onClose={onClose} onUpdateTab={onUpdateTab} onToggle={onToggle} onPin={onPin} onToggleMem={onToggleMem}
                  cursorId={cursorId} selectedIds={selectedIds} moveSourceIds={moveSourceIds} onSetCursor={onSetCursor} folderIndex={idx}
                  dropHighlight={dropHighlight}
                  onDragStart={e=>handleDragStart(e,node.id,"folder")}
                  onDragOver={e=>handleDragOver(e,node.id,"folder",0)} onDrop={e=>handleDrop(e,node.id,"folder")}
                  onTabDragStart={handleDragStart} onTabDragOver={handleDragOver} onTabDrop={handleDrop}
                  dropTargetId={dropTargetId} dropPosition={dropPosition}/>
                {isDropHere&&dropPosition==="below"&&dropLine}
              </React.Fragment>
            );
          })
        }
      </div>
      <div style={{borderTop:"1px solid rgba(255,255,255,.04)"}}><MemBar root={root}/></div>
    </div>
  );
}

/* ═══════════ Extensions Panel ═══════════ */
function ExtensionsPanel({extensions,onToggle}){

function ExtRow({ext,onToggle}){

    <div onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{display:"flex",alignItems:"center",gap:8,padding:"6px 12px",cursor:"default",borderRadius:4,

      <button onClick={onToggle} title={ext.enabled?"Disable":"Enable"}
        style={{width:28,height:16,borderRadius:8,border:"none",padding:0,position:"relative",transition:"background .15s",

          left:ext.enabled?14:2,background:ext.enabled?"#34d399":"rgba(255,255,255,.2)"}}/>
      </button>
    </div>
  );
}

function HFModelCard({model,onInstall,onDelete}){
  const[hov,setHov]=useState(false);
  const[downloading,setDownloading]=useState(false);
  const[progress,setProgress]=useState(0);
  const[dlFile,setDlFile]=useState("");
  const intRef=useRef(null);
  const isInstalled=model.status==="installed";
  const isLoading=model.status==="loading";
  const fmtNum=n=>n>=1e6?(n/1e6).toFixed(1)+"M":n>=1e3?(n/1e3).toFixed(1)+"k":String(n);
  const taskLabel=HF_TASK_LABELS[model.task]||model.task||"—";
  const taskColor={"text-generation":"#f59e0b","text-classification":"#10b981","feature-extraction":"#8b5cf6",
    "question-answering":"#3b82f6","summarization":"#06b6d4","translation":"#ec4899","automatic-speech-recognition":"#f97316",
    "object-detection":"#14b8a6","image-classification":"#a78bfa","fill-mask":"#6366f1","zero-shot-classification":"#84cc16",
    "sentence-similarity":"#e879f9","token-classification":"#22d3ee","image-segmentation":"#fb923c","text2text-generation":"#facc15"}[model.task]||"#71717a";

  const[phase,setPhase]=useState("idle");/* idle | lib | model | done */
  const startDL=()=>{
    setDownloading(true);setProgress(-1);setDlFile("Initializing...");setPhase("lib");
    TJS.loadModel(model.task||"feature-extraction",model.id,(phaseId,file,pct)=>{
      setPhase(phaseId);
      setDlFile(file||"");
      setProgress(pct!=null?pct:-1);/* -1 = indeterminate */
    }).then(()=>{
      setPhase("done");setDownloading(false);setProgress(0);onInstall(model.id);
    }).catch(e=>{
      console.warn("Model load failed:",e);
      setDlFile("Error: "+e.message);setPhase("idle");
      setTimeout(()=>{setDownloading(false);setProgress(0)},2000);
    });
  };
  const cancelDL=()=>{setDownloading(false);setProgress(0);setDlFile("");setPhase("idle")};

  return(
    <div onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{background:"rgba(255,255,255,.015)",border:"1px solid rgba(255,255,255,.04)",borderRadius:6,padding:8,marginBottom:5,transition:"border-color .12s",
        ...(hov?{borderColor:"rgba(255,255,255,.08)"}:{})}}>
      <div style={{display:"flex",alignItems:"flex-start",gap:8}}>
        <div style={{width:26,height:26,borderRadius:5,background:isInstalled?"rgba(52,211,153,.08)":"rgba(96,165,250,.06)",
          border:isInstalled?"1px solid rgba(52,211,153,.15)":"1px solid rgba(96,165,250,.1)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          <I d={isInstalled?ic.hardDrive:ic.package} size={12} color={isInstalled?"#34d399":"#60a5fa"}/>
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:2,flexWrap:"wrap"}}>
            <span style={{fontSize:11,fontWeight:600,color:"#e4e4e7",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:160}}>{model.name}</span>
            <span style={{fontSize:8,padding:"1px 4px",borderRadius:3,fontWeight:600,background:taskColor+"18",color:taskColor,border:"1px solid "+taskColor+"25",whiteSpace:"nowrap"}}>{taskLabel}</span>
            {isInstalled&&<span style={{fontSize:8,padding:"1px 4px",borderRadius:3,fontWeight:600,background:"rgba(52,211,153,.08)",color:"#34d399",border:"1px solid rgba(52,211,153,.15)"}}>Ready</span>}
          </div>
          <div style={{fontSize:9.5,opacity:.25,marginBottom:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{model.author}/{model.name}</div>
          <div style={{display:"flex",alignItems:"center",gap:8,fontSize:9,opacity:.3}}>
            <span style={{display:"flex",alignItems:"center",gap:2}}><I d={ic.arrowDown} size={8}/>  {fmtNum(model.downloads||0)}</span>
            <span style={{display:"flex",alignItems:"center",gap:2}}><I d={ic.heart} size={8}/>  {fmtNum(model.likes||0)}</span>
            {model.sizeMB>0&&<span>{model.sizeMB>=1000?(model.sizeMB/1000).toFixed(1)+"GB":model.sizeMB+"MB"}</span>}
          </div>
        </div>
        <div style={{flexShrink:0}}>
          {downloading?
            <button onClick={cancelDL}
              style={{background:"rgba(239,68,68,.08)",border:"1px solid rgba(239,68,68,.15)",color:"#ef4444",padding:"3px 8px",borderRadius:4,fontSize:9.5,fontWeight:600,display:"flex",alignItems:"center",gap:3}}>
              <I d={ic.x} size={9} color="#ef4444"/>Cancel</button>
          :isInstalled?
            <button onClick={()=>onDelete(model.id)} style={{background:"rgba(255,255,255,.02)",border:"1px solid rgba(255,255,255,.05)",color:"rgba(255,255,255,.2)",padding:"3px 8px",borderRadius:4,fontSize:9.5,fontWeight:600,
              opacity:hov?1:0,transition:"opacity .15s",display:"flex",alignItems:"center",gap:3}}>
              <I d={ic.trash} size={9}/>Remove</button>
          :<button onClick={startDL} style={{background:"rgba(96,165,250,.1)",border:"1px solid rgba(96,165,250,.15)",color:"#60a5fa",padding:"3px 8px",borderRadius:4,fontSize:9.5,fontWeight:600,display:"flex",alignItems:"center",gap:3}}>
              <I d={ic.download} size={9} color="#60a5fa"/>Load</button>
          }
        </div>
      </div>
      {downloading&&(
        <div style={{marginTop:6}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:8.5,opacity:.25,marginBottom:2}}>
            <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:160,
              ...(dlFile.startsWith("Error")?{color:"#ef4444",opacity:1}:{})}}>{dlFile||"Initializing..."}</span>
            <span>{progress>=0?progress+"%":phase==="lib"?"loading runtime":"..."}</span>
          </div>
          <div style={{height:3,background:"rgba(255,255,255,.03)",borderRadius:2,overflow:"hidden"}}>
            {progress>=0?(
              <div style={{height:"100%",width:progress+"%",background:"linear-gradient(90deg,#3b82f6,#60a5fa)",borderRadius:2,transition:"width .15s linear"}}/>
            ):(
              <div style={{height:"100%",width:"30%",background:"linear-gradient(90deg,transparent,#3b82f6,transparent)",borderRadius:2,animation:"indeterminate 1.2s ease-in-out infinite"}}/>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

function SettingsPanel({providers,onUpdateProvider,localModels,onInstallModel,onDeleteModel}){
  const[tab,setTab]=useState("providers");
  const[hfSearch,setHfSearch]=useState("");
  const[hfTask,setHfTask]=useState("");
  const[hfResults,setHfResults]=useState([]);
  const[hfLoading,setHfLoading]=useState(false);
  const[hfError,setHfError]=useState(null);
  const[hfSearched,setHfSearched]=useState(false);
  const searchTimer=useRef(null);

  const installed=localModels.filter(m=>m.status==="installed");
  const available=localModels.filter(m=>m.status==="available"&&!installed.some(im=>im.id===m.id));
  const installedIds=new Set(installed.map(m=>m.id));

  /* Debounced HF Hub search */
  const doSearch=useCallback((query,task)=>{
    clearTimeout(searchTimer.current);
    searchTimer.current=setTimeout(async()=>{
      setHfLoading(true);setHfError(null);
      try{
        const results=await searchHFModels({query:query||undefined,task:task||undefined,limit:25});
        setHfResults(results);setHfSearched(true);
      }catch(e){setHfError(e.message);setHfResults([])}
      setHfLoading(false);
    },query?350:50);
  },[]);

  /* Initial load of popular models when switching to local tab */
  useEffect(()=>{
    if(tab==="local"&&!hfSearched&&hfResults.length===0){doSearch("","");}
  },[tab,hfSearched,hfResults.length,doSearch]);

  const onSearchInput=useCallback(e=>{const v=e.target.value;setHfSearch(v);doSearch(v,hfTask)},[hfTask,doSearch]);
  const onTaskFilter=useCallback(t=>{const next=hfTask===t?"":t;setHfTask(next);doSearch(hfSearch,next)},[hfTask,hfSearch,doSearch]);

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>

      {tab==="local"&&(

          <div style={{padding:"8px 8px 4px"}}>
            <div style={{position:"relative"}}>
              <I d={ic.search} size={11} color="rgba(255,255,255,.15)" style={{position:"absolute",left:8,top:"50%",transform:"translateY(-50%)"}}/>

                style={{width:"100%",background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)",borderRadius:5,

          </div>

          <div style={{padding:"2px 8px 6px",display:"flex",gap:3,flexWrap:"wrap"}}>

              const active=hfTask===t;
              const label=HF_TASK_LABELS[t]||t;
              return(<button key={t} onClick={()=>onTaskFilter(t)}
                style={{padding:"2px 6px",borderRadius:3,fontSize:8.5,fontWeight:600,border:active?"1px solid rgba(96,165,250,.3)":"1px solid rgba(255,255,255,.05)",

                {label}</button>);
            })}
          </div>

          <div style={{flex:1,overflowY:"auto",padding:"0 8px 8px"}}>
            {/* Loaded / installed models */}
            {installed.length>0&&(
              <>
                <div style={{fontSize:9,fontWeight:600,opacity:.2,textTransform:"uppercase",letterSpacing:1,marginBottom:4,display:"flex",alignItems:"center",gap:4}}>
                  <I d={ic.hardDrive} size={9}/>Loaded ({installed.length})</div>
                {installed.map(m=><HFModelCard key={m.id} model={m} onInstall={onInstallModel} onDelete={onDeleteModel}/>)}
              </>
            )}

            {/* Recommended seed models (not installed, not duplicated in HF results) */}
            {available.length>0&&!hfSearch&&!hfTask&&(
              <>
                <div style={{fontSize:9,fontWeight:600,opacity:.2,textTransform:"uppercase",letterSpacing:1,marginBottom:4,marginTop:installed.length?8:0,display:"flex",alignItems:"center",gap:4}}>
                  <I d={ic.package} size={9}/>Recommended ({available.length})</div>
                {available.filter(m=>!installedIds.has(m.id)).map(m=>(
                  <HFModelCard key={m.id} model={m} onInstall={onInstallModel} onDelete={onDeleteModel}/>
                ))}
              </>
            )}

            {/* HF Hub results */}
            <div style={{fontSize:9,fontWeight:600,opacity:.2,textTransform:"uppercase",letterSpacing:1,marginBottom:4,marginTop:(installed.length||available.length)?8:0,display:"flex",alignItems:"center",gap:4}}>
              <I d={ic.globe} size={9}/>
              {hfLoading?"Searching...":hfSearch||hfTask?"Results ("+hfResults.filter(r=>!installedIds.has(r.id)&&!available.some(a=>a.id===r.id)).length+")":"Popular on Hugging Face"}
            </div>

            {hfLoading&&(
              <div style={{display:"flex",justifyContent:"center",padding:"16px 0"}}>
                <I d={ic.loader} size={16} color="rgba(255,255,255,.15)" style={{animation:"spin .8s linear infinite"}}/>
              </div>
            )}
            {hfError&&<div style={{fontSize:10,color:"#ef4444",opacity:.6,padding:"8px 4px"}}>{hfError}</div>}
            {!hfLoading&&hfResults.filter(r=>!installedIds.has(r.id)&&!available.some(a=>a.id===r.id)).map(m=>(
              <HFModelCard key={m.id} model={{...m,status:"available"}} onInstall={onInstallModel} onDelete={onDeleteModel}/>
            ))}
            {!hfLoading&&!hfError&&hfResults.length===0&&hfSearched&&(
              <div style={{fontSize:10,opacity:.2,textAlign:"center",padding:"16px 0"}}>No models found. Try a different search.</div>

          <div style={{padding:"6px 10px",borderTop:"1px solid rgba(255,255,255,.04)",background:"rgba(0,0,0,.15)"}}>

          </div>
        </>
      )}
    </div>
  );
}

function HistoryPanel({onContinueSession}){
  const[selectedId,setSelectedId]=useState(null);
  const selected=MOCK_SESSIONS.find(s=>s.id===selectedId);

  const fmtDate=(iso)=>{
    const d=new Date(iso);
    const now=new Date();
    const diff=now-d;
    if(diff<86400000)return"Today";
    if(diff<172800000)return"Yesterday";
    return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
  };

  if(selected){
    return(
      <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
        {/* Detail header */}
        <div style={{padding:"10px 12px",borderBottom:"1px solid rgba(255,255,255,.04)",display:"flex",alignItems:"center",gap:8}}>

          </div>
        </div>
        {/* Event timeline */}
        <div style={{flex:1,overflowY:"auto",padding:"8px 0"}}>
          {selected.events.map((ev,i)=>(
            <div key={i} style={{padding:"6px 12px 6px 20px",position:"relative"}}>
              {/* Timeline line */}
              {i<selected.events.length-1&&<div style={{position:"absolute",left:25,top:22,bottom:-6,width:1,background:"rgba(255,255,255,.06)"}}/>}
              {ev.type==="chat"?(
                <div style={{display:"flex",gap:8,alignItems:"flex-start"}}>
                  <div style={{width:12,height:12,borderRadius:"50%",flexShrink:0,marginTop:2,
                    background:ev.role==="user"?"rgba(255,255,255,.08)":"rgba(96,165,250,.15)",
                    border:ev.role==="user"?"1px solid rgba(255,255,255,.1)":"1px solid rgba(96,165,250,.25)",

                    <I d={ev.role==="user"?ic.user:ic.sparkles} size={7} color={ev.role==="user"?"rgba(255,255,255,.4)":"#60a5fa"}/>

                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:9.5,opacity:.25,marginBottom:2,fontWeight:500}}>{ev.role==="user"?"You":"Assistant"} · {ev.time}</div>
                    <div style={{fontSize:11.5,lineHeight:1.5,color:ev.role==="user"?"#d4d4d8":"#a1a1aa",opacity:.7}}>{ev.content}</div>
                  </div>
                </div>
              ):(
                <div style={{display:"flex",gap:8,alignItems:"flex-start"}}>
                  <div style={{width:12,height:12,borderRadius:"50%",flexShrink:0,marginTop:2,
                    background:"rgba(52,211,153,.1)",border:"1px solid rgba(52,211,153,.2)",

function PageSummaryCard({page,onViewPage}){
  const[text,setText]=useState("");
  const[done,setDone]=useState(false);
  useEffect(()=>{
    setText("");setDone(false);
    const full=`This page contains detailed information about ${page.name}. The content is organized into sections covering key concepts, documentation, and practical examples. The page uses a clean design with navigation and reference materials.\n\nKey sections include: introduction and overview, detailed reference material, code examples, and additional resources. The layout includes navigation menus and quick links for easy access to different topics.`;
    let i=0;
    const iv=setInterval(()=>{
      i+=Math.floor(Math.random()*4)+2;
      if(i>=full.length){setText(full);setDone(true);clearInterval(iv)}
      else setText(full.slice(0,i));
    },12);
    return()=>clearInterval(iv);
  },[page]);
  return(
    <div style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)",borderRadius:10,padding:16,marginBottom:12,animation:"slide-in-from-right .3s ease-out"}}>

          {page.name.charAt(0).toUpperCase()}
        </div>
        <div style={{flex:1,minWidth:0}}>
