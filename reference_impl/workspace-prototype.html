/* ═══════════ Thinking Block Component ═══════════
   Collapsible block showing internal reasoning — like ChatGPT's "Thought for Xs >"
   msg.thinkingContent: raw thinking text (from <think> tags)
   msg.thinkingDuration: seconds spent thinking (null while still thinking)
   msg.isThinking: true while model is in <think> mode
*/
function ThinkingBlock({content,duration,isThinking}){
  const[expanded,setExpanded]=useState(false);
  const hasContent=content&&content.trim().length>0;
  /* Auto-expand while actively thinking */
  const show=isThinking||expanded;

  return(
    <div style={{marginBottom:6}}>
      {/* Toggle bar */}
      <button onClick={()=>{if(!isThinking)setExpanded(e=>!e)}}
        style={{display:"flex",alignItems:"center",gap:6,background:"none",border:"none",
          padding:"4px 0",cursor:isThinking?"default":"pointer",color:"#a78bfa",fontSize:11.5,fontWeight:500,
          opacity:isThinking?.8:.55,transition:"opacity .15s"}}
        onMouseEnter={e=>{if(!isThinking)e.currentTarget.style.opacity="0.85"}}
        onMouseLeave={e=>{if(!isThinking)e.currentTarget.style.opacity="0.55"}}>
        {isThinking?(
          <>
            <I d={ic.loader} size={12} color="#a78bfa" style={{animation:"spin .8s linear infinite"}}/>
            <span className="thinking-indicator">Thinking</span>
          </>
        ):(
          <>
            <I d={ic.sparkles} size={11} color="#a78bfa"/>
            <span>Thought for {duration!=null?duration+"s":"..."}
            </span>
            <I d={ic.chevron} size={10} color="#a78bfa"
              style={{transform:show?"rotate(90deg)":"rotate(0deg)",transition:"transform .15s"}}/>
          </>
        )}
      </button>

      {/* Expandable thinking content */}
      {show&&hasContent&&(
        <div style={{
          borderLeft:"2px solid rgba(167,139,250,.15)",
          marginLeft:6,paddingLeft:12,marginTop:2,marginBottom:4,
          maxHeight:isThinking?"none":expanded?400:0,
          overflow:expanded||isThinking?"auto":"hidden",
          transition:isThinking?"none":"max-height .25s ease",
        }}>
          <div style={{fontSize:11.5,lineHeight:1.55,color:"#8b8b9a",whiteSpace:"pre-wrap",opacity:.6}}>
            {content}
            {isThinking&&<span className="stream-cursor" style={{opacity:.4}}/>}
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════ Chat Message States ═══════════
   msg.status: "thinking" | "reasoning" | "generating" | "complete" | "error"
   msg.isLocal: true for local model responses
   msg.streamedContent: incrementally built text during streaming
   msg.thinkingContent: internal reasoning text (from <think> blocks)
   msg.thinkingDuration: seconds spent thinking
   msg.isThinking: true while inside <think> block
*/
function ChatMessage({msg,onViewPage}){
  const isUser=msg.role==="user";
  const status=msg.status||"complete";
  const isActive=status==="thinking"||status==="reasoning"||status==="generating";
  const displayContent=msg.streamedContent||msg.content||"";
  const hasThinking=msg.thinkingContent&&msg.thinkingContent.trim().length>0;

  return(
    <div style={{display:"flex",justifyContent:isUser?"flex-end":"flex-start",marginBottom:16,animation:"fade-in .2s ease-out"}}>
      <div style={{maxWidth:"78%",display:"flex",flexDirection:"column",gap:4}}>
        {!isUser&&(
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
            <I d={msg.isLocal?ic.cpu:ic.sparkles} size={13}
              color={msg.isLocal?"#34d399":"#a1a1aa"}
              style={{flexShrink:0,...(isActive?{animation:"thinking-pulse 1.5s ease-in-out infinite"}:{})}}/>
            {msg.isLocal&&<span style={{fontSize:8.5,fontWeight:600,color:"#34d399",opacity:.5,textTransform:"uppercase",letterSpacing:.5}}>Local</span>}
            {/* Phase indicator — only show when NOT in thinking block (thinking block has its own) */}
            {status==="generating"&&!msg.isThinking&&(
              <span style={{fontSize:10,color:"#34d399",fontWeight:500,opacity:.7}}>Generating</span>
            )}
          </div>
        )}

        <div style={{display:"flex",flexDirection:"column",gap:0}}>
          {/* Model loading progress — shown during download status callbacks */}
          {msg.loadingStatus&&(status==="thinking"||status==="generating")&&(
            <div style={{background:"rgba(255,255,255,.02)",borderRadius:6,padding:"6px 10px",marginBottom:4,fontSize:10,color:"#71717a"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                <span>{msg.loadingStatus.msg}</span>
                {msg.loadingStatus.pct!=null&&msg.loadingStatus.pct>=0&&<span>{msg.loadingStatus.pct}%</span>}
              </div>
              {msg.loadingStatus.pct!=null&&msg.loadingStatus.pct>=0&&(
                <div style={{height:2,background:"rgba(255,255,255,.06)",borderRadius:1,overflow:"hidden"}}>
                  <div style={{height:"100%",background:"#60a5fa",borderRadius:1,transition:"width .3s ease",width:msg.loadingStatus.pct+"%"}}/>
                </div>
              )}
              {msg.loadingStatus.pct==null&&(
                <div style={{height:2,background:"rgba(255,255,255,.06)",borderRadius:1,overflow:"hidden"}}>
                  <div style={{height:"100%",width:"25%",background:"#60a5fa",borderRadius:1,animation:"indeterminate 1.2s linear infinite"}}/>
                </div>
              )}
            </div>
          )}

          {/* Thinking/reasoning block — collapsible, inspectable */}
          {(hasThinking||msg.isThinking)&&(
            <ThinkingBlock
              content={msg.thinkingContent||""}
              duration={msg.thinkingDuration}
              isThinking={msg.isThinking}/>
          )}

          {/* Initial thinking indicator — shown before any tokens arrive */}
          {(status==="thinking"||status==="reasoning")&&!displayContent&&!hasThinking&&!msg.isThinking&&(
            <div style={{
              background:"rgba(167,139,250,.04)",
              border:"1px solid rgba(167,139,250,.12)",
              borderRadius:8,padding:"8px 12px",
              animation:"reasoning-border 2s ease-in-out infinite",
              display:"flex",alignItems:"center",gap:8
            }}>
              <div style={{display:"flex",gap:3}}>
                <span className="typing-dot" style={{width:4,height:4,borderRadius:"50%",background:"#a78bfa"}}/>
                <span className="typing-dot" style={{width:4,height:4,borderRadius:"50%",background:"#a78bfa"}}/>
                <span className="typing-dot" style={{width:4,height:4,borderRadius:"50%",background:"#a78bfa"}}/>
              </div>
              <span style={{fontSize:11,color:"#a78bfa",opacity:.6}}>
                {msg.statusText||"Processing..."}
              </span>
            </div>
          )}

          {/* Main content — streams in token by token */}
          {displayContent&&(
            <div style={{
              background:isUser?"rgba(255,255,255,.06)":msg.isError?"rgba(248,113,113,.06)":"transparent",
              padding:isUser?"10px 14px":"2px 0",borderRadius:isUser?10:0,
              wordWrap:"break-word",fontSize:13,lineHeight:1.6,
              opacity:isUser?.85:.75,
              color:msg.isError?"#f87171":isUser?"#d4d4d8":"#c4c4cc",
              whiteSpace:"pre-wrap",
            }}>
              <span>{displayContent}</span>
              {status==="generating"&&!msg.isThinking&&<span className="stream-cursor"/>}
            </div>
          )}

          {/* Error state */}
          {msg.isError&&!displayContent&&(
            <div style={{fontSize:12,color:"#f87171",opacity:.7,padding:"4px 0"}}>{msg.content||"An error occurred."}</div>
          )}

          {/* Tool cards */}
          {msg.cards&&msg.cards.map((card,i)=>(
            <div key={i}>
              {card.type==="mcp_tool"&&<McpToolCard card={card}/>}
              {card.type==="page-summary"&&<PageSummaryCard page={card.page} onViewPage={onViewPage}/>}
              {card.type==="task-tracker"&&<MultiTabTaskCard/>}
              {card.type==="image-gallery"&&<ImageGalleryCard/>}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ═══════════ Chat Interface Component ═══════════ */
function ChatInterface({root,onOpenTab,activeModel,onSelectModel,modelProviders,localModels,onOpenMcpApp,pendingSearch}){
  const[messages,setMessages]=useState([
    {id:"m0",role:"assistant",content:"I'm your workspace assistant with access to MCP apps. I can create task boards, show images, play videos, display galleries, render notes, and build data tables. What would you like to do?"},
  ]);
  const[input,setInput]=useState("");
  const messagesEndRef=useRef(null);
  const textareaRef=useRef(null);

  const scrollToBottom=useCallback(()=>{
    messagesEndRef.current?.scrollIntoView({behavior:"smooth"});
  },[]);

  useEffect(()=>{
    scrollToBottom();
  },[messages]);

  const[isLoading,setIsLoading]=useState(false);

  /* Find provider for active model */
  const resolveProvider=useCallback(()=>{
    for(const p of(modelProviders||[])){
      if(p.models.some(m=>m.id===activeModel))return p;
    }
    return null;
  },[modelProviders,activeModel]);

  /* Check if the active model is a local one */
  const isLocalModel=useMemo(()=>{
    return(localModels||[]).some(m=>m.id===activeModel&&m.status==="installed");
  },[localModels,activeModel]);

  const activeLocalModel=useMemo(()=>{
    return(localModels||[]).find(m=>m.id===activeModel&&m.status==="installed")||null;
  },[localModels,activeModel]);

  /* Helper: update a single message by id */
  const updateMsg=useCallback((id,patch)=>{
    setMessages(m=>m.map(msg=>msg.id===id?{...msg,...(typeof patch==="function"?patch(msg):patch)}:msg));
  },[]);

  /* ═══════════ useChat-style send logic (Vercel AI SDK pattern) ═══════════ */
  const doSend=useCallback(async(text,isSearch)=>{
    if(!text.trim())return;
    const label=isSearch?("🔍 "+text):text;
    const userMsg={id:"m"+Date.now(),role:"user",content:label};
    setMessages(m=>[...m,userMsg]);
    const assistId="m"+(Date.now()+1);

    /* ── Local model path: Web Worker + streaming tokens ── */
    if(isLocalModel&&activeLocalModel){
      /* Create assistant message in "thinking" state */
      setMessages(m=>[...m,{
        id:assistId,role:"assistant",content:"",streamedContent:"",
        status:"thinking",isLocal:true,statusText:"Loading model...",loadingStatus:null,
      }]);
      setIsLoading(true);

      /* Accumulate streamed tokens + thinking state */
      let tokenBuf="";
      let thinkingBuf="";
      let inThink=false;
      let thinkStartTime=null;

      try{
        const task=activeLocalModel.task||"text-generation";

        /* Build prompt for text-generation models using chat template if available */
        let prompt=text;
        let promptMarker=null;/* used to find the actual response start in streamed output */
        if(task==="text-generation"){
          /* Use simple chat-style messages array — transformers.js pipelines with
             chat models auto-apply the model's chat template */
          const chatMsgs=[];
          chatMsgs.push({role:"system",content:"You are a helpful browser workspace assistant. Answer questions concisely."});
          messages.filter(m=>m.role==="user"||m.role==="assistant").slice(-6).forEach(m=>{
            chatMsgs.push({role:m.role,content:m.content||""});
          });
          chatMsgs.push({role:"user",content:text});
          prompt=chatMsgs;
          promptMarker=null;/* chat template handles prompt/response boundary */
        }else if(task==="question-answering"){
          const lastCtx=messages.filter(m=>m.role==="assistant"&&m.content).pop();
          prompt={question:text,context:lastCtx?lastCtx.content:"No context provided."};
        }

        await TJS.generate(
          {task,modelId:activeLocalModel.id,prompt,options:{max_new_tokens:256,temperature:0.7,do_sample:true,top_p:0.9}},
          {
            onStatus:(phase,msg,pct)=>{
              updateMsg(assistId,{statusText:msg,loadingStatus:{msg,pct}});
            },
            onPhase:(phase)=>{
              updateMsg(assistId,{status:phase,statusText:phase==="thinking"?"Thinking...":phase==="generating"?"Generating...":"Processing..."});
            },
            onToken:(token)=>{
              tokenBuf+=token;

              /* Parse think blocks for inspectable reasoning */
              if(!inThink&&tokenBuf.includes("<think>")&&!tokenBuf.includes("<\/think>")){
                inThink=true;
                if(!thinkStartTime)thinkStartTime=Date.now();
                const idx=tokenBuf.indexOf("<think>");
                thinkingBuf=tokenBuf.slice(idx+7);
                updateMsg(assistId,{isThinking:true,thinkingContent:thinkingBuf.trim(),status:"thinking",loadingStatus:null,statusText:"Thinking..."});
                return;
              }
              if(inThink){
                if(tokenBuf.includes("<\/think>")){
                  inThink=false;
                  const thinkEnd=tokenBuf.indexOf("<\/think>");
                  const thinkOpen=tokenBuf.indexOf("<think>");
                  thinkingBuf=tokenBuf.slice(thinkOpen+7,thinkEnd);
                  const elapsed=thinkStartTime?Math.round((Date.now()-thinkStartTime)/1000):null;
                  updateMsg(assistId,{isThinking:false,thinkingContent:thinkingBuf.trim(),thinkingDuration:elapsed,status:"generating",statusText:"Generating..."});
                  let display=tokenBuf.slice(thinkEnd+8).trim();
                  for(const marker of["\nUser:","\n<|im_end|>","\n<|endoftext|>","<|im_end|>"]){
                    const mi=display.indexOf(marker);if(mi>0)display=display.slice(0,mi);
                  }
                  if(display)updateMsg(assistId,{streamedContent:display.trim()});
                }else{
                  const thinkOpen=tokenBuf.indexOf("<think>");
                  thinkingBuf=tokenBuf.slice(thinkOpen+7);
                  updateMsg(assistId,{thinkingContent:thinkingBuf.trim(),isThinking:true,status:"thinking",loadingStatus:null});
                }
                return;
              }

              /* Normal content */
              let display=tokenBuf;
              display=display.replace(/<think>[\s\S]*?<\/think>/g,"").trim();
              for(const marker of["\nUser:","\n<|im_end|>","\n<|endoftext|>","<|im_end|>"]){
                const idx=display.indexOf(marker);
                if(idx>0)display=display.slice(0,idx);
              }
              updateMsg(assistId,{streamedContent:display.trim(),status:"generating",loadingStatus:null});
            },
          }
        );

        /* Finalize: clean up streamed content, preserve thinking */
        let final=tokenBuf;
        let finalThinking=thinkingBuf.trim()||"";
        const thinkElapsed=thinkStartTime?Math.round((Date.now()-thinkStartTime)/1000):null;

        final=final.replace(/<think>[\s\S]*?<\/think>/g,"").trim();
        const thinkStartIdx=final.lastIndexOf("<think>");
        if(thinkStartIdx>=0&&final.indexOf("<\/think>",thinkStartIdx)<0)final=final.slice(0,thinkStartIdx).trim();
        for(const marker of["\nUser:","\n<|im_end|>","\n<|endoftext|>","<|im_end|>"]){
          const idx=final.indexOf(marker);
          if(idx>0)final=final.slice(0,idx);
        }
        final=final.trim()||"(empty response)";

        const finalUpdate={content:final,streamedContent:"",status:"complete",loadingStatus:null,statusText:null,isThinking:false};
        if(finalThinking){finalUpdate.thinkingContent=finalThinking;finalUpdate.thinkingDuration=thinkElapsed;}
        updateMsg(assistId,finalUpdate);
      }catch(err){
        updateMsg(assistId,{content:"Error: "+err.message,status:"error",isError:true,loadingStatus:null,statusText:null});
      }finally{
        setIsLoading(false);
      }
      return;
    }

    /* ── Cloud provider path ── */
    const provider=resolveProvider();
    if(!provider||!provider.apiKey){
      setMessages(m=>[...m,{id:assistId,role:"assistant",content:"I need an API key to respond. Open **Settings** in the sidebar, expand a provider, enter your key, and click Save. I support Anthropic, OpenAI, and OpenRouter APIs.",status:"complete"}]);
      return;
    }

    setMessages(m=>[...m,{id:assistId,role:"assistant",content:"",status:"thinking",statusText:"Calling API..."}]);
    setIsLoading(true);

    try{
      /* Build conversation for API */
      const systemCtx=isSearch?"The user submitted a search query from the browser omnibar. Provide a helpful, concise answer. If you can open relevant MCP apps (task tracker, gallery, data table, etc.) to display results, do so.":"";
      const prevMsgs=messages.filter(m=>m.role==="user"||m.role==="assistant").map(m=>({role:m.role,content:m.content||"(tool result)"}));
      const conv=[...prevMsgs,{role:"user",content:(systemCtx?systemCtx+"\n\nQuery: ":"")+text}];

      updateMsg(assistId,{status:"generating",statusText:""});
      const result=await callLLM(provider.id,provider.apiKey,activeModel,conv);

      /* Handle text response */
      const textContent=result.text||"";

      /* Handle tool calls → MCP apps */
      const toolCards=(result.toolCalls||[]).map(tc=>{
        const app=MCP_APPS[tc.name];
        if(app){
          if(onOpenMcpApp)onOpenMcpApp({id:"mcp-"+Date.now()+"-"+tc.name,appId:tc.name,name:app.name,data:tc.input,icon:app.icon});
          return{type:"mcp_tool",appId:tc.name,appName:app.name,data:tc.input,icon:app.icon};
        }
        return{type:"mcp_tool",appId:tc.name,appName:tc.name,data:tc.input,icon:"puzzle"};
      });

      updateMsg(assistId,{content:textContent,status:"complete",cards:toolCards.length?toolCards:undefined});
    }catch(err){
      updateMsg(assistId,{content:"Error: "+err.message,status:"error",isError:true});
    }finally{
      setIsLoading(false);
    }
  },[messages,modelProviders,localModels,activeModel,isLocalModel,activeLocalModel,resolveProvider,onOpenMcpApp,updateMsg]);

  const handleSend=useCallback(async()=>{
    if(!input.trim()||isLoading)return;
    doSend(input,false);
    setInput("");
    if(textareaRef.current)textareaRef.current.style.height="auto";
  },[input,isLoading,doSend]);

  /* Consume omnibar search queries */
  const lastSearchRef=useRef(null);
  useEffect(()=>{
    if(pendingSearch&&pendingSearch.id!==lastSearchRef.current&&!isLoading){
      lastSearchRef.current=pendingSearch.id;
      doSend(pendingSearch.query,true);
    }
  },[pendingSearch,isLoading,doSend]);

  const handleKeyDown=useCallback(e=>{
    if(e.key==="Enter"&&!e.shiftKey){
      e.preventDefault();
      handleSend();
    }
  },[handleSend]);

  const[modelOpen,setModelOpen]=useState(false);
  const modelRef=useRef(null);

  /* Close model dropdown on outside click */
  useEffect(()=>{
    if(!modelOpen)return;
    const handler=e=>{if(modelRef.current&&!modelRef.current.contains(e.target))setModelOpen(false)};
    document.addEventListener("mousedown",handler);
    return()=>document.removeEventListener("mousedown",handler);
  },[modelOpen]);

  /* Build flat list of available models from providers + local */
  const availableModels=useMemo(()=>{
    const cloud=[];
    (modelProviders||[]).forEach(p=>{
      if(p.status!=="connected")return;
      (p.models||[]).forEach(m=>{
        if(m.enabled!==false)cloud.push({id:m.id,name:m.name,provider:p.name,type:"cloud"});
      });
    });
    const local=(localModels||[]).filter(m=>m.status==="installed").map(m=>({id:m.id,name:m.name,provider:"Local ("+( HF_TASK_LABELS[m.task]||"In-Browser")+")",type:"local",task:m.task}));
    return[...cloud,...local];
  },[modelProviders,localModels]);

  const currentModel=availableModels.find(m=>m.id===activeModel)||{name:activeModel||"Select model",type:"cloud"};

  const activeTabCount=5;
  const totalPageCount=9;
  const bookmarkCount=4;

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:"#0c0c0f"}}>
      {/* Messages area */}
      <div style={{flex:1,overflowY:"auto",padding:"20px 24px",display:"flex",flexDirection:"column"}}>
        {messages.map(msg=>(
          <ChatMessage key={msg.id} msg={msg} onViewPage={onOpenTab}/>
        ))}
        <div ref={messagesEndRef}/>
      </div>

      {/* Context badge */}
      <div style={{borderTop:"1px solid rgba(255,255,255,.04)",padding:"10px 24px",background:"rgba(0,0,0,.2)"}}>
        <div style={{fontSize:10.5,opacity:.35,fontWeight:500,display:"flex",gap:6,alignItems:"center",justifyContent:"center"}}>
          <span style={{display:"flex",gap:8,alignItems:"center"}}>
            <span style={{display:"inline-flex",width:6,height:6,borderRadius:"50%",background:"#34d399"}}/>
            Context: {activeTabCount} active directories · {totalPageCount} pages in memory · {bookmarkCount} bookmarked
          </span>
        </div>
      </div>

      {/* Input area */}
      <div style={{padding:"12px 24px 16px",borderTop:"1px solid rgba(255,255,255,.04)",background:"#0c0c0f"}}>
        <textarea
          ref={textareaRef}
          value={input}
          onChange={e=>{
            setInput(e.target.value);
            e.target.style.height="auto";
            e.target.style.height=Math.min(e.target.scrollHeight,72)+"px";
          }}
          onKeyDown={handleKeyDown}
          placeholder="Ask about your workspace, browse the web, or run a task..."
          style={{width:"100%",background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)",borderRadius:8,
            padding:"10px 12px",fontSize:13,color:"#d4d4d8",outline:"none",resize:"none",fontFamily:"inherit",
            maxHeight:72,minHeight:36,transition:"border-color .15s,background .15s",lineHeight:1.4}}
          onFocus={e=>{e.target.style.borderColor="rgba(255,255,255,.12)";e.target.style.background="rgba(255,255,255,.05)"}}
          onBlur={e=>{e.target.style.borderColor="rgba(255,255,255,.06)";e.target.style.background="rgba(255,255,255,.03)"}}
        />
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8}}>
          {/* Model selector pill */}
          <div ref={modelRef} style={{position:"relative"}}>
            <button onClick={()=>setModelOpen(o=>!o)}
              style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",borderRadius:6,padding:"5px 10px",
                fontSize:11,color:"#a1a1aa",cursor:"pointer",display:"flex",alignItems:"center",gap:5,transition:"all .15s"}}
              onMouseEnter={e=>{e.currentTarget.style.background="rgba(255,255,255,.07)";e.currentTarget.style.borderColor="rgba(255,255,255,.14)"}}
              onMouseLeave={e=>{e.currentTarget.style.background="rgba(255,255,255,.04)";e.currentTarget.style.borderColor="rgba(255,255,255,.08)"}}
            >
              <I d={currentModel.type==="local"?ic.cpu:ic.cloud} size={12} color={currentModel.type==="local"?"#a78bfa":"#60a5fa"}/>
              <span style={{maxWidth:140,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{currentModel.name}</span>
              <I d={ic.chevron} size={10} color="#71717a" style={{transform:modelOpen?"rotate(90deg)":"rotate(270deg)",transition:"transform .15s"}}/>
            </button>

            {/* Model dropdown */}
            {modelOpen&&(
              <div style={{position:"absolute",bottom:"100%",left:0,marginBottom:4,background:"#18181b",border:"1px solid rgba(255,255,255,.1)",
                borderRadius:8,width:240,maxHeight:280,overflowY:"auto",boxShadow:"0 8px 32px rgba(0,0,0,.5)",zIndex:100,

                  <div style={{padding:"12px 14px",fontSize:11,color:"#52525b",textAlign:"center"}}>No models configured. Check Settings.</div>

/* ═══════════ Page-Scoped Chat Panel ═══════════ */
function PageChat({tab,consoleLogs,pickedElements,onControlElement,onClose}){
  const[messages,setMessages]=useState([]);
  const[input,setInput]=useState("");
  const endRef=useRef(null);

  useEffect(()=>{
    /* seed from main session chat as subthread context */
    const seed=[
      {id:"pc-0",role:"system",content:"Subthread from workspace chat · Page: "+tab.name},
      {id:"pc-1",role:"assistant",content:"I have this page in context: "+tab.name+" ("+tab.url+"). I can see the page elements and console output. What would you like to do?"},
    ];
    setMessages(seed);
  },[tab.id]);

  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"})},[messages]);

  /* console log summary as context badge */
  const logSummary=useMemo(()=>{
    if(!consoleLogs.length)return null;
    const errs=consoleLogs.filter(l=>l.level==="error").length;
    const warns=consoleLogs.filter(l=>l.level==="warn").length;
    const infos=consoleLogs.filter(l=>l.level==="info").length;
    return{total:consoleLogs.length,errs,warns,infos};
  },[consoleLogs]);

  const handleSend=useCallback(()=>{
    if(!input.trim())return;
    const txt=input.trim();
    const userMsg={id:"pc-u-"+Date.now(),role:"user",content:txt};
    setMessages(m=>[...m,userMsg]);
    setInput("");

    /* Detect element control commands */
    const controlMatch=txt.match(/^(hide|show|highlight|remove|click|toggle)\s+(.+)/i);
    if(controlMatch){
      const[,action,selector]=controlMatch;
      onControlElement(action.toLowerCase(),selector);
      setTimeout(()=>{
        setMessages(m=>[...m,{id:"pc-a-"+Date.now(),role:"assistant",content:"Applied \""+action+"\" to elements matching \""+selector+"\" on the page. The change is reflected in the viewport."}]);
      },300);
      return;
    }

    /* Simulate assistant response */
    setTimeout(()=>{
      let resp="I can see the page content. ";
      if(pickedElements.length)resp+="You've highlighted "+pickedElements.length+" element(s) for context. ";
      if(logSummary&&logSummary.errs>0)resp+="I notice "+logSummary.errs+" console error(s) that may be relevant. ";
      resp+="Let me analyze that for you.";
      setMessages(m=>[...m,{id:"pc-a-"+Date.now(),role:"assistant",content:resp}]);
    },400);
  },[input,pickedElements,logSummary,onControlElement]);

  const handleKeyDown=useCallback(e=>{
    if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();handleSend()}
  },[handleSend]);

  return(
    <div style={{width:340,height:"100%",display:"flex",flexDirection:"column",background:"#0c0c0f",borderLeft:"1px solid rgba(255,255,255,.06)",animation:"slide-in-from-right .2s ease-out"}}>
      {/* Chat header */}
      <div style={{height:40,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 12px",borderBottom:"1px solid rgba(255,255,255,.06)",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <I d={ic.messageSquare} size={13} color="#60a5fa"/>
          <span style={{fontSize:11.5,fontWeight:600,color:"#d4d4d8"}}>Page Chat</span>
          <span style={{fontSize:9.5,opacity:.3,fontWeight:500}}>subthread</span>
        </div>
        <button onClick={onClose} style={{background:"none",border:"none",padding:4,color:"rgba(255,255,255,.25)",display:"flex",cursor:"pointer"}}>
          <I d={ic.x} size={14}/>
        </button>
      </div>

      {/* Console log summary badge */}
      {logSummary&&(
        <div style={{padding:"6px 12px",borderBottom:"1px solid rgba(255,255,255,.04)",display:"flex",alignItems:"center",gap:8,fontSize:10.5,fontWeight:500}}>
          <I d={ic.terminal} size={12} color="rgba(255,255,255,.3)"/>
          <span style={{opacity:.4}}>Console:</span>
          {logSummary.errs>0&&<span style={{color:"#f87171",opacity:.7}}>{logSummary.errs} errors</span>}
          {logSummary.warns>0&&<span style={{color:"#fbbf24",opacity:.7}}>{logSummary.warns} warns</span>}
          {logSummary.infos>0&&<span style={{opacity:.3}}>{logSummary.infos} info</span>}
        </div>
      )}

      {/* Picked elements badge */}
      {pickedElements.length>0&&(
        <div style={{padding:"6px 12px",borderBottom:"1px solid rgba(255,255,255,.04)",display:"flex",alignItems:"center",gap:8,fontSize:10.5,fontWeight:500}}>
          <I d={ic.crosshair} size={12} color="#34d399"/>
          <span style={{opacity:.4}}>{pickedElements.length} element(s) in context</span>
          {pickedElements.map((el,i)=>(
            <span key={i} style={{background:"rgba(52,211,153,.1)",border:"1px solid rgba(52,211,153,.2)",borderRadius:4,padding:"1px 6px",fontSize:9.5,color:"#34d399",fontFamily:"monospace"}}>{el.tag}</span>
          ))}
        </div>
      )}

      {/* Messages */}
      <div style={{flex:1,overflowY:"auto",padding:"12px"}}>
        {messages.map(msg=>{
          if(msg.role==="system")return(
            <div key={msg.id} style={{fontSize:10,opacity:.2,textAlign:"center",padding:"4px 0 12px",borderBottom:"1px solid rgba(255,255,255,.04)",marginBottom:12}}>{msg.content}</div>
          );
          const isU=msg.role==="user";
          return(
            <div key={msg.id} style={{display:"flex",justifyContent:isU?"flex-end":"flex-start",marginBottom:10,animation:"fade-in .15s ease-out"}}>
              <div style={{maxWidth:"90%",background:isU?"rgba(255,255,255,.06)":"rgba(96,165,250,.06)",padding:"8px 11px",borderRadius:8,fontSize:12,lineHeight:1.5,color:isU?"#d4d4d8":"#a1a1aa",border:isU?"none":"1px solid rgba(96,165,250,.1)"}}>
                {msg.content}
              </div>
            </div>
          );
        })}
        <div ref={endRef}/>
      </div>

      {/* Input */}
      <div style={{padding:"8px 12px 12px",borderTop:"1px solid rgba(255,255,255,.04)"}}>
        <div style={{fontSize:9.5,opacity:.2,marginBottom:6,fontWeight:500}}>
          Type a command (e.g. "hide .banner") or ask a question
        </div>
        <div style={{display:"flex",gap:6}}>
          <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={handleKeyDown}
            placeholder="Ask or control elements..."
            style={{flex:1,background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)",borderRadius:6,padding:"7px 10px",fontSize:12,color:"#d4d4d8",outline:"none"}}
            onFocus={e=>{e.target.style.borderColor="rgba(96,165,250,.3)"}}
            onBlur={e=>{e.target.style.borderColor="rgba(255,255,255,.06)"}}
          />
          <button onClick={handleSend} style={{background:"rgba(96,165,250,.15)",border:"1px solid rgba(96,165,250,.25)",color:"#60a5fa",padding:"6px 10px",borderRadius:6,display:"flex",alignItems:"center",cursor:"pointer"}}>
            <I d={ic.send} size={13} color="#60a5fa"/>
          </button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════ Tree Flatten Utility ═══════════ */
function flattenTree(root,filterText){
  const items=[];
  const fl=filterText?filterText.toLowerCase():"";
  function hasMatch(node){
    if(!fl)return true;
    if(node.name.toLowerCase().includes(fl))return true;
    if(node.children)return node.children.some(hasMatch);
    return false;
  }
  function walk(node,depth,parentId){
    if(!node)return;
    if(fl&&!hasMatch(node))return;
    if(node.type==="workspace"){
      items.push({id:node.id,type:"folder",depth,node});
      if(node.expanded&&node.children){
        node.children.forEach(c=>walk(c,depth+1,node.id));
      }
    }else if(node.type==="tab"){
      items.push({id:node.id,type:"tab",depth,parentId,node});
    }
  }
  if(root&&root.children){
    root.children.forEach(c=>walk(c,0,root.id));
  }
  return items;
}

  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",backdropFilter:"blur(4px)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",animation:"fade-in .12s ease-out"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#18181b",border:"1px solid rgba(255,255,255,.1)",borderRadius:10,padding:"20px 24px",maxHeight:"80vh",overflowY:"auto",width:360}}>
        <div style={{fontSize:13,fontWeight:600,color:"#e4e4e7",marginBottom:14}}>Keyboard Shortcuts</div>
        {groups.map((g,i)=>(
          <div key={i} style={{marginBottom:14}}>
            <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:".5px",color:"#52525b",marginBottom:6}}>{g.title}</div>
            {g.items.map(([k,v],j)=>(
              <div key={j} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"3px 0"}}>
                <kbd style={{background:"rgba(255,255,255,.06)",padding:"1px 6px",borderRadius:3,fontSize:11,color:"#a1a1aa"}}>{k}</kbd>
                <span style={{color:"#71717a"}}>{v}</span>
              </div>
            ))}
          </div>
        ))}
        <div style={{fontSize:10,color:"#3f3f46",marginTop:8,textAlign:"center"}}>Press Esc or click outside to close</div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   Main App
   ═══════════════════════════════════════════════════════ */
function App(){
  const[workspaces,setWorkspaces]=useState(INITIAL_WORKSPACES);
  const[activeWsId,setActiveWsId]=useState("ws-1");
  const activeWsIdRef=useRef("ws-1");
  activeWsIdRef.current=activeWsId;
  const wsCounter=useRef(4);
  const[toast,setToast]=useState(null);
  const[activePanel,setActivePanel]=useState("workspaces");
  const[sidebarOpen,setSidebarOpen]=useState(true);
  const[extensions,setExtensions]=useState(EXTENSIONS);
  const[modelProviders,setModelProviders]=useState(MODEL_PROVIDERS);
  const[localModels,setLocalModels]=useState(LOCAL_MODELS_SEED);
  const[activeModel,setActiveModel]=useState("claude-opus-4");
  const[wsOverlayOpen,setWsOverlayOpen]=useState(false);

  /* Derived active workspace and state */
  const activeWs=workspaces.find(w=>w.id===activeWsId)||workspaces[0];
  const updateActiveWs=useCallback((fn)=>{
    setWorkspaces(prev=>prev.map(w=>w.id===activeWsId?fn(w):w));
  },[activeWsId]);

  /* Wrapper setters that scope to active workspace */
  const setRoot=useCallback(fn=>updateActiveWs(ws=>({...ws,root:fn(ws.root)})),[updateActiveWs]);
  const setActiveTabs=useCallback(fn=>updateActiveWs(ws=>({...ws,activeTabs:typeof fn==='function'?fn(ws.activeTabs):fn})),[updateActiveWs]);
  const setFocusedTabId=useCallback(fn=>updateActiveWs(ws=>({...ws,focusedTabId:typeof fn==='function'?fn(ws.focusedTabId):fn})),[updateActiveWs]);
  const setMcpPanes=useCallback(fn=>updateActiveWs(ws=>({...ws,mcpPanes:typeof fn==='function'?fn(ws.mcpPanes):fn})),[updateActiveWs]);
  const setCursorId=useCallback(fn=>updateActiveWs(ws=>({...ws,cursorId:typeof fn==='function'?fn(ws.cursorId):fn})),[updateActiveWs]);
  const setSelectedIds=useCallback(fn=>updateActiveWs(ws=>{const prev=new Set(ws.selectedIds);const next=typeof fn==='function'?fn(prev):fn;return{...ws,selectedIds:[...next]}}),[updateActiveWs]);

  /* Derived state from active workspace */
  const root=activeWs.root;
  const activeTabs=activeWs.activeTabs;
  const focusedTabId=activeWs.focusedTabId;
  const mcpPanes=activeWs.mcpPanes;
  const cursorId=activeWs.cursorId;
  const selectedIds=useMemo(()=>new Set(activeWs.selectedIds),[activeWs.selectedIds]);

  /* Ephemeral interaction state (local, not per-workspace) */
  const[moveMode,setMoveMode]=useState(false);
  const[moveSourceIds,setMoveSourceIds]=useState([]);
  const[treeFilter,setTreeFilter]=useState("");
  const[showShortcuts,setShowShortcuts]=useState(false);

  /* ── Flattened tree for keyboard nav ── */
  const visibleItems=useMemo(()=>flattenTree(root,treeFilter),[root,treeFilter]);

  const treeKeyHandler=useCallback(e=>{
    /* Shortcut overlay intercept */
    if(showShortcuts){if(e.key==="Escape"||e.key==="?")setShowShortcuts(false);e.preventDefault();return}
    if(e.key==="?"){setShowShortcuts(true);e.preventDefault();return}

    /* Type-to-filter: if typing printable char without modifier */
    if(!e.ctrlKey&&!e.metaKey&&!e.altKey&&/^[a-z0-9]$/i.test(e.key)){
      setTreeFilter(f=>f+e.key);e.preventDefault();return;
    }

    const idx=visibleItems.findIndex(i=>i.id===cursorId);
    const cur=idx>=0?visibleItems[idx]:null;

    switch(e.key){
      case"ArrowUp":{
        const ni=e.shiftKey?idx:idx;
        if(idx>0){
          const newId=visibleItems[idx-1].id;
          setCursorId(newId);
          if(e.shiftKey)setSelectedIds(s=>{const ns=new Set(s);ns.has(newId)?ns.delete(cursorId):ns.add(newId);return ns});
        }
        e.preventDefault();break;
      }
      case"ArrowDown":{
        if(idx<visibleItems.length-1){
          const newId=visibleItems[idx+1].id;
          setCursorId(newId);
          if(e.shiftKey)setSelectedIds(s=>{const ns=new Set(s);ns.has(newId)?ns.delete(cursorId):ns.add(newId);return ns});
        }
        e.preventDefault();break;
      }
      case"ArrowRight":{
        if(cur&&cur.type==="folder"){
          const node=cur.node;
          if(!node.expanded)toggle(cur.id);
          else if(node.children&&node.children.length>0)setCursorId(node.children[0].id);
        }
        e.preventDefault();break;
      }
      case"ArrowLeft":{
        if(cur&&cur.type==="tab"&&cur.parentId){
          /* Find the parent workspace id */
          const parent=visibleItems.find(i=>i.node&&i.node.children&&i.node.children.some(c=>c.id===cur.id));
          if(parent)setCursorId(parent.id);
        }else if(cur&&cur.type==="folder"&&cur.node.expanded){
          toggle(cur.id);
        }
        e.preventDefault();break;
      }
      case"Home":if(visibleItems.length)setCursorId(visibleItems[0].id);e.preventDefault();break;
      case"End":if(visibleItems.length)setCursorId(visibleItems[visibleItems.length-1].id);e.preventDefault();break;
      case" ":setSelectedIds(s=>{const ns=new Set(s);ns.has(cursorId)?ns.delete(cursorId):ns.add(cursorId);return ns});e.preventDefault();break;
      case"Enter":{
        if(cur&&cur.type==="folder")bulkToggleFolder(cur.id);
        else if(cur&&cur.type==="tab")toggleTab(cur.node);
        e.preventDefault();break;
      }
      case"Escape":{
        if(moveMode){setMoveMode(false);setMoveSourceIds([])}
        else if(treeFilter)setTreeFilter("");
        else setSelectedIds(new Set());
        e.preventDefault();break;
      }
      default:{
        if((e.ctrlKey||e.metaKey)&&e.key==="x"){
          if(selectedIds.size>0){setMoveMode(true);setMoveSourceIds([...selectedIds])}
          e.preventDefault();
        }else if((e.ctrlKey||e.metaKey)&&e.key==="v"){
          if(moveMode&&moveSourceIds.length>0&&cur&&cur.type==="folder"){
            /* Move tabs into target folder via deep tree update */
            setRoot(r=>{
              function removeIds(node){
                if(!node.children)return node;
                return{...node,children:node.children.filter(c=>!moveSourceIds.includes(c.id)).map(c=>c.type==="workspace"?removeIds(c):c)};
              }
              function addToTarget(node){
                if(node.id===cur.id){
                  const movedNodes=moveSourceIds.map(mid=>{
                    let found=null;
                    function find(n){if(n.id===mid){found=n;return}if(n.children)n.children.forEach(find)}
                    find(r);return found;
                  }).filter(Boolean);
                  return{...node,children:[...(node.children||[]),...movedNodes],expanded:true};
                }
                if(!node.children)return node;
                return{...node,children:node.children.map(c=>c.type==="workspace"?addToTarget(c):c)};
              }
              let nr=removeIds(r);
              nr=addToTarget(nr);
              return nr;
            });
            setMoveMode(false);setMoveSourceIds([]);setSelectedIds(new Set());
          }
          e.preventDefault();
        }else if((e.ctrlKey||e.metaKey)&&e.key==="a"){
          setSelectedIds(new Set(visibleItems.map(i=>i.id)));
          e.preventDefault();
        }else if(e.altKey&&/^[1-9]$/.test(e.key)){
          const n=parseInt(e.key)-1;
          const folders=visibleItems.filter(i=>i.type==="folder"&&i.depth===0);
          if(n<folders.length){setCursorId(folders[n].id);if(!folders[n].node.expanded)toggle(folders[n].id)}
          e.preventDefault();
        }
      }
    }
  },[visibleItems,cursorId,selectedIds,moveMode,moveSourceIds,treeFilter,showShortcuts,toggle,toggleTab,bulkToggleFolder]);

  /* ── Overlay state (lifted from PageOverlay) ── */
  const[chatOpen,setChatOpen]=useState(false);
  const[pickerActive,setPickerActive]=useState(false);
  const[pickedElements,setPickedElements]=useState([]);
  const[navHistory,setNavHistory]=useState([]);
  const[navIdx,setNavIdx]=useState(0);
  const[currentUrl,setCurrentUrl]=useState("");
  const[consoleLogs]=useState([
    {id:"cl-1",level:"info",msg:"[Page] DOMContentLoaded in 342ms"},
    {id:"cl-2",level:"info",msg:"[Page] 12 resources loaded, 2 deferred"},
    {id:"cl-3",level:"warn",msg:"[Page] Mixed content: image loaded over HTTP"},
    {id:"cl-4",level:"error",msg:"[Page] Failed to load resource: net::ERR_BLOCKED_BY_CLIENT (ad script)"},
    {id:"cl-5",level:"info",msg:"[Page] Service Worker registered"},
    {id:"cl-6",level:"warn",msg:"[Page] Deprecated API: document.domain setter used"},
  ]);
  const canGoBack=navIdx>0;
  const canGoFwd=navIdx<navHistory.length-1;

  const handleBack=useCallback(()=>{
    if(navIdx>0){const ni=navIdx-1;setNavIdx(ni);setCurrentUrl(navHistory[ni])}
  },[navIdx,navHistory]);
  const handleFwd=useCallback(()=>{
    if(navIdx<navHistory.length-1){const ni=navIdx+1;setNavIdx(ni);setCurrentUrl(navHistory[ni])}
  },[navIdx,navHistory]);
  const handleRefresh=useCallback(()=>{
    setCurrentUrl("");setTimeout(()=>setCurrentUrl(navHistory[navIdx]),50);
  },[navHistory,navIdx]);
  const handlePickElement=useCallback(el=>{
    setPickedElements(prev=>prev.find(p=>p.id===el.id)?prev:[...prev,el]);
    setPickerActive(false);
    if(!chatOpen)setChatOpen(true);
  },[chatOpen]);
  const handleControlElement=useCallback((action,selector)=>{
    console.log("Element control:",action,selector);
  },[]);

  /* Reset overlay state when focused tab changes */
  const focusedTab=activeTabs.find(t=>t.id===focusedTabId)||activeTabs[activeTabs.length-1]||null;
  useEffect(()=>{
    if(focusedTab){
      setNavHistory([focusedTab.url]);setNavIdx(0);setCurrentUrl(focusedTab.url);
      setChatOpen(false);setPickerActive(false);setPickedElements([]);
    }
  },[focusedTabId]);

  /* Esc to cancel picker */
  useEffect(()=>{
    const h=e=>{if(e.key==="Escape"&&pickerActive)setPickerActive(false)};
    window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);
  },[pickerActive]);

  /* Workspace keyboard shortcuts */
  useEffect(()=>{
    const wsHandler=(e)=>{
      /* Ctrl+1-9: jump to workspace */
      if(e.ctrlKey&&!e.altKey&&!e.shiftKey&&!e.metaKey&&/^[1-9]$/.test(e.key)){
        e.preventDefault();switchWorkspaceByIndex(parseInt(e.key)-1);setWsOverlayOpen(false);return;
      }
      /* Ctrl+Alt+Left/Right: prev/next workspace */
      if(e.ctrlKey&&e.altKey&&e.key==="ArrowLeft"){e.preventDefault();switchPrevWorkspace();setWsOverlayOpen(false);return}
      if(e.ctrlKey&&e.altKey&&e.key==="ArrowRight"){e.preventDefault();switchNextWorkspace();setWsOverlayOpen(false);return}
      /* Ctrl+Alt+N: new workspace */
      if(e.ctrlKey&&e.altKey&&(e.key==="n"||e.key==="N")){e.preventDefault();createWorkspace();setWsOverlayOpen(false);return}
    };
    window.addEventListener("keydown",wsHandler);
    return()=>window.removeEventListener("keydown",wsHandler);
  },[switchWorkspaceByIndex,switchPrevWorkspace,switchNextWorkspace,createWorkspace]);

  const[omniValue,setOmniValue]=useState("");
  const[omniMode,setOmniMode]=useState(null); // "navigate"|"search"|null
  const[pendingSearch,setPendingSearch]=useState(null);
  const inputRef=useRef(null);

  const toastTimer=useRef(null);
  const notify=useCallback(msg=>{clearTimeout(toastTimer.current);setToast(msg);toastTimer.current=setTimeout(()=>setToast(null),1600)},[]);

  /* Workspace switching and CRUD */
  const switchWorkspace=useCallback((id)=>{
    if(id===activeWsIdRef.current)return;
    const ws=workspaces.find(w=>w.id===id);
    if(!ws)return;
    setActiveWsId(id);
    setTreeFilter("");setMoveMode(false);setMoveSourceIds([]);
    notify("Switched to "+ws.name);
  },[workspaces,notify]);

  const switchWorkspaceByIndex=useCallback((idx)=>{
    if(idx>=0&&idx<workspaces.length)switchWorkspace(workspaces[idx].id);
  },[workspaces,switchWorkspace]);

  const switchPrevWorkspace=useCallback(()=>{
    const idx=workspaces.findIndex(w=>w.id===activeWsIdRef.current);
    const prev=(idx-1+workspaces.length)%workspaces.length;
    switchWorkspace(workspaces[prev].id);
  },[workspaces,switchWorkspace]);

  const switchNextWorkspace=useCallback(()=>{
    const idx=workspaces.findIndex(w=>w.id===activeWsIdRef.current);
    const next=(idx+1)%workspaces.length;
    switchWorkspace(workspaces[next].id);
  },[workspaces,switchWorkspace]);

  const createWorkspace=useCallback(()=>{
    const n=wsCounter.current++;
    const colorIdx=workspaces.length%WORKSPACE_COLORS.length;
    const ws={id:"ws-"+n,name:"Workspace "+n,color:WORKSPACE_COLORS[colorIdx],
      root:{id:"wsroot-"+n,name:"Workspace "+n,type:"workspace",persisted:true,activeMemory:true,expanded:true,children:[]},
      activeTabs:[],mcpPanes:[],focusedTabId:null,cursorId:null,selectedIds:[],scrollTop:0};
    setWorkspaces(prev=>[...prev,ws]);
    setActiveWsId(ws.id);
    setTreeFilter("");setMoveMode(false);setMoveSourceIds([]);
    notify("Created "+ws.name);
  },[workspaces.length,notify]);

  const deleteWorkspace=useCallback((id)=>{
    if(workspaces.length<=1)return;
    const idx=workspaces.findIndex(w=>w.id===id);
    const name=workspaces[idx]?.name||"Workspace";
    setWorkspaces(prev=>prev.filter(w=>w.id!==id));
    if(id===activeWsId){
      const remaining=workspaces.filter(w=>w.id!==id);
      const nextIdx=Math.min(idx,remaining.length-1);
      if(remaining[nextIdx])setActiveWsId(remaining[nextIdx].id);
    }
    notify("Deleted "+name);
  },[workspaces,activeWsId,notify]);

  const renameWorkspace=useCallback((id,name)=>{
    setWorkspaces(prev=>prev.map(w=>w.id===id?{...w,name}:w));
    notify("Renamed to "+name);
  },[notify]);

  const toggle=useCallback(id=>{setRoot(r=>deepUpdate(r,id,n=>({...n,expanded:!n.expanded})))},[]);
  const pin=useCallback(id=>{setRoot(r=>deepUpdate(r,id,n=>({...n,persisted:!n.persisted})));notify("Bookmark toggled")},[notify]);
  const toggleMem=useCallback(id=>{
    setRoot(r=>deepUpdate(r,id,n=>{
      const a=!n.activeMemory;
      const ch=(n.children||[]).map(c=>{if(c.type!=="tab")return c;if(a)return{...c,memoryTier:"warm",memoryMB:c.memoryMB<10?25:c.memoryMB};return{...c,memoryTier:"cold",memoryMB:0.1}});
      return{...n,activeMemory:a,children:ch};
    }));notify("Memory state changed");
  },[notify]);

  /* Move node(s) to a target folder or root. targetId=null means root level, insertIdx for position */
  const moveNodes=useCallback((sourceIds,targetId,insertIdx)=>{
    setRoot(r=>{
      /* Collect source nodes from tree before removal */
      const collected=[];
      function findAll(n){if(sourceIds.includes(n.id))collected.push(n);if(n.children)n.children.forEach(findAll)}
      findAll(r);
      if(!collected.length)return r;
      /* Remove sources from everywhere */
      function removeIds(node){
        if(!node.children)return node;
        return{...node,children:node.children.filter(c=>!sourceIds.includes(c.id)).map(c=>c.type==="workspace"?removeIds(c):c)};
      }
      let nr=removeIds(r);
      /* Insert into target */
      if(!targetId||targetId===r.id){
        /* Drop at root level */
        const ch=[...(nr.children||[])];
        const idx=insertIdx!=null?Math.min(insertIdx,ch.length):ch.length;
        ch.splice(idx,0,...collected);
        return{...nr,children:ch};
      }
      function addToTarget(node){
        if(node.id===targetId){
          const ch=[...(node.children||[])];
          const idx=insertIdx!=null?Math.min(insertIdx,ch.length):ch.length;
          ch.splice(idx,0,...collected);
          return{...node,children:ch,expanded:true};
        }
        if(!node.children)return node;
        return{...node,children:node.children.map(c=>c.type==="workspace"?addToTarget(c):c)};
      }
      return addToTarget(nr);
    });
  },[]);

  /* Bulk toggle: activate all tabs in a folder, or deactivate all if all are already active */
  const bulkToggleFolder=useCallback((folderId)=>{
    const folder=findNode(root,folderId);
    if(!folder||!folder.children)return;
    const childTabs=folder.children.filter(c=>c.type==="tab");
    if(!childTabs.length)return;
    /* Use single updateActiveWs call to set both activeTabs and focusedTabId atomically */
    updateActiveWs(ws=>{
      const prev=ws.activeTabs;
      const activeSet=new Set(prev.map(t=>t.id));
      const allActive=childTabs.every(t=>activeSet.has(t.id));
      if(allActive){
        const removeIds=new Set(childTabs.map(t=>t.id));
        const next=prev.filter(t=>!removeIds.has(t.id));
        return{...ws,activeTabs:next,focusedTabId:next.length?next[next.length-1].id:null};
      }else{
        const existing=new Set(prev.map(t=>t.id));
        const toAdd=childTabs.filter(t=>!existing.has(t.id));
        const newFocused=toAdd.length?toAdd[toAdd.length-1].id:ws.focusedTabId;
        return{...ws,activeTabs:[...prev,...toAdd],focusedTabId:newFocused};
      }
    });
  },[root,updateActiveWs]);

  const toggleTab=useCallback(tab=>{
    setActiveTabs(prev=>{
      const exists=prev.find(t=>t.id===tab.id);
      if(exists){
        const next=prev.filter(t=>t.id!==tab.id);
        if(focusedTabId===tab.id)setFocusedTabId(next.length?next[next.length-1].id:null);
        return next;
      }
      setFocusedTabId(tab.id);
      return[...prev,tab];
    });
  },[focusedTabId]);

  const openMcpApp=useCallback(pane=>{
    setMcpPanes(prev=>[...prev.filter(p=>p.appId!==pane.appId||p.id!==pane.id),pane]);
  },[]);
  const closeMcpPane=useCallback(id=>{
    setMcpPanes(prev=>prev.filter(p=>p.id!==id));
  },[]);

  const updateTab=useCallback((tabId,updates)=>{
    /* Update in tree */
    setRoot(r=>deepUpdate(r,tabId,n=>({...n,...updates})));
    /* Update in activeTabs so pane re-renders */
    setActiveTabs(prev=>prev.map(t=>t.id===tabId?{...t,...updates}:t));
    /* If this is the focused tab, update current URL for the overlay */
    if(tabId===focusedTabId&&updates.url){
      setNavHistory(h=>[...h,updates.url]);setNavIdx(i=>i+1);setCurrentUrl(updates.url);
    }
  },[focusedTabId]);

  const closeTabFromTree=useCallback(tabId=>{
    function removeNode(node){
      if(!node.children)return node;
      const newCh=node.children.filter(c=>c.id!==tabId).map(removeNode);
      return{...node,children:newCh};
    }
    setRoot(r=>removeNode(r));
    setActiveTabs(prev=>prev.filter(t=>t.id!==tabId));
    notify("Tab closed");
  },[notify]);

  const toggleExt=useCallback(id=>{setExtensions(ex=>ex.map(e=>e.id===id?{...e,enabled:!e.enabled}:e))},[]);

  const liveFilter=omniValue&&omniMode!=="navigate"?omniValue:"";

  const handleOmniChange=useCallback(e=>{
    const v=e.target.value;
    setOmniValue(v);
    if(!v){setOmniMode(null);return}
    const{intent}=classifyOmni(v);
    setOmniMode(intent); // "navigate"|"search"|null
  },[]);

  const handleOmniKeyDown=useCallback(e=>{
    if(e.key==="Enter"&&omniValue.trim()){
      const{intent,url,query}=classifyOmni(omniValue);
      if(intent==="navigate"&&url){
        let hostname=url;
        try{hostname=new URL(url.startsWith("http")?url:("https://"+url)).hostname.replace(/^www\./,"")}catch(ex){}
        const tab={id:"nav-"+Date.now(),name:hostname,url,type:"tab",memoryTier:"hot",memoryMB:50};
        setRoot(r=>({...r,children:[tab,...(r.children||[])]}));
        toggleTab(tab);
        setCursorId(tab.id);
        setSelectedIds(new Set([tab.id]));
      }else if(intent==="search"&&query){
        setPendingSearch({id:Date.now(),query});
      }
      setOmniValue("");setOmniMode(null);
      e.target.blur();
    }
    if(e.key==="Escape"){setOmniValue("");setOmniMode(null);e.target.blur()}
  },[omniValue]);

  const panelWidth=sidebarOpen?260:0;

  return(
    <div style={{display:"flex",height:"100vh",overflow:"hidden"}}>
      {/* Activity Bar */}
      <ActivityBar activePanel={activePanel} onSelect={setActivePanel} sidebarOpen={sidebarOpen} onToggleSidebar={()=>setSidebarOpen(s=>!s)}/>

      {/* Sidebar Panel */}
      <div style={{width:panelWidth,overflow:"hidden",transition:"width .15s ease",borderRight:sidebarOpen?"1px solid rgba(255,255,255,.04)":"none",background:"#09090b",flexShrink:0}}>
        {sidebarOpen&&(
          <div style={{width:260,height:"100%"}}>
            {activePanel==="workspaces"&&<WorkspacePanel root={root} activeTabId={focusedTabId} activeTabIds={activeTabs.map(t=>t.id)} liveFilter={liveFilter} onOpen={toggleTab} onClose={closeTabFromTree} onUpdateTab={updateTab} onToggle={toggle} onPin={pin} onToggleMem={toggleMem}
              omniValue={omniValue} omniMode={omniMode} onOmniChange={handleOmniChange} onOmniKeyDown={handleOmniKeyDown} onOmniClear={()=>{setOmniValue("");setOmniMode(null)}} inputRef={inputRef}
              overlayActive={activeTabs.length>0} onBack={handleBack} onFwd={handleFwd} onRefresh={handleRefresh} canGoBack={canGoBack} canGoFwd={canGoFwd}
              pickerActive={pickerActive} onTogglePicker={()=>setPickerActive(p=>!p)} pickedCount={pickedElements.length} consoleLogs={consoleLogs}
              chatOpen={chatOpen} onToggleChat={()=>setChatOpen(c=>!c)} onCloseOverlay={()=>{setActiveTabs([]);setFocusedTabId(null)}}
              cursorId={cursorId} selectedIds={selectedIds} moveSourceIds={moveSourceIds} moveMode={moveMode} treeFilter={treeFilter} onSetCursor={setCursorId} onTreeKeyDown={treeKeyHandler} onShowShortcuts={()=>setShowShortcuts(true)}
              workspaces={workspaces} activeWsId={activeWsId} activeWsColor={activeWs.color} onSwitchWorkspace={switchWorkspace} onCreateWorkspace={createWorkspace} onDeleteWorkspace={deleteWorkspace} onRenameWorkspace={renameWorkspace}
              onToggleWsOverlay={()=>setWsOverlayOpen(o=>!o)} onMoveNodes={moveNodes}/>}
            {activePanel==="history"&&<HistoryPanel onContinueSession={s=>{notify("Continuing: "+s.title)}}/>}
            {activePanel==="extensions"&&<ExtensionsPanel extensions={extensions} onToggle={toggleExt}/>}
            {activePanel==="account"&&<AccountPanel/>}
            {activePanel==="settings"&&<SettingsPanel providers={modelProviders} onUpdateProvider={p=>setModelProviders(ps=>ps.map(pp=>pp.id===p.id?p:pp))}
              localModels={localModels}
              onInstallModel={id=>setLocalModels(ms=>{
                const exists=ms.find(m=>m.id===id);
                if(exists)return ms.map(m=>m.id===id?{...m,status:"installed"}:m);
                /* Model from HF search — add it to local list as installed */
                return[...ms,{id,name:id.split("/").pop(),author:id.split("/")[0]||"unknown",task:"unknown",downloads:0,likes:0,tags:[],sizeMB:0,status:"installed"}];
              })}
              onDeleteModel={id=>{
                /* Remove cached pipeline */
                Object.keys(TJS.pipelines).forEach(k=>{if(k.startsWith(id+":"))delete TJS.pipelines[k]});
                setLocalModels(ms=>ms.map(m=>m.id===id?{...m,status:"available"}:m));
              }}/>}
          </div>
        )}
      </div>

      {/* Main Content */}
      <div style={{flex:1,minWidth:0,background:"#0c0c0f",position:"relative"}}>
        {/* Chat — always full-width, the base layer */}
        <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column"}}>
          <ChatInterface root={root} onOpenTab={toggleTab} activeModel={activeModel} onSelectModel={setActiveModel} modelProviders={modelProviders} localModels={localModels} onOpenMcpApp={openMcpApp} pendingSearch={pendingSearch}/>
        </div>

        {/* Pane overlay — browser tabs + MCP apps layered on top of chat */}
        {(activeTabs.length>0||mcpPanes.length>0)&&(
          <div style={{position:"absolute",inset:0,display:"flex",overflow:"hidden",background:"#0c0c0f",zIndex:1}}>
            {/* Browser tab panes */}
            {activeTabs.map((tab,i)=>(
              <div key={tab.id} onClick={()=>setFocusedTabId(tab.id)}
                style={{flex:1,display:"flex",flexDirection:"column",minWidth:0,
                  borderRight:(i<activeTabs.length-1||mcpPanes.length>0)?"1px solid rgba(255,255,255,.06)":"none"}}>
                <div style={{display:"flex",alignItems:"center",gap:6,padding:"5px 10px",background:focusedTabId===tab.id?"rgba(96,165,250,.06)":"rgba(255,255,255,.02)",
                  borderBottom:"1px solid rgba(255,255,255,.06)",flexShrink:0,cursor:"pointer"}}>
                  <Favicon url={tab.url} size={13}/>
                  <span style={{flex:1,fontSize:11,fontWeight:500,color:focusedTabId===tab.id?"#d4d4d8":"#71717a",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{tab.name}</span>
                  <button onClick={e=>{e.stopPropagation();toggleTab(tab)}} title="Close pane"
                    style={{background:"none",border:"none",padding:2,borderRadius:3,display:"flex",color:"rgba(255,255,255,.2)",cursor:"pointer"}}
                    onMouseEnter={e=>{e.currentTarget.style.color="rgba(255,255,255,.5)"}}
                    onMouseLeave={e=>{e.currentTarget.style.color="rgba(255,255,255,.2)"}}>
                    <I d={ic.x} size={12}/>
                  </button>
                </div>
                <PageOverlay tab={tab} onClose={()=>toggleTab(tab)}
                  currentUrl={focusedTabId===tab.id?currentUrl:tab.url}
                  chatOpen={focusedTabId===tab.id&&chatOpen} onCloseChat={()=>setChatOpen(false)}
                  pickerActive={focusedTabId===tab.id&&pickerActive} onPickElement={handlePickElement} pickedElements={focusedTabId===tab.id?pickedElements:[]}
                  consoleLogs={consoleLogs} onControlElement={handleControlElement}/>
              </div>
            ))}

            {/* MCP app panes */}
            {mcpPanes.map((pane,i)=>{
              const Renderer=MCP_RENDERERS[pane.appId];
              return(
                <div key={pane.id} style={{flex:1,display:"flex",flexDirection:"column",minWidth:0,
                  borderRight:i<mcpPanes.length-1?"1px solid rgba(255,255,255,.06)":"none"}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,padding:"5px 10px",background:"rgba(139,92,246,.06)",
                    borderBottom:"1px solid rgba(255,255,255,.06)",flexShrink:0}}>
                    <I d={ic[pane.icon]||ic.puzzle} size={13} color="#a78bfa"/>
                    <span style={{flex:1,fontSize:11,fontWeight:500,color:"#c4b5fd",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{pane.name}</span>
                    <span style={{fontSize:9,color:"#6d28d9",background:"rgba(139,92,246,.15)",padding:"1px 5px",borderRadius:3,fontWeight:500}}>MCP</span>
                    <button onClick={()=>closeMcpPane(pane.id)} title="Close app"
                      style={{background:"none",border:"none",padding:2,borderRadius:3,display:"flex",color:"rgba(255,255,255,.2)",cursor:"pointer"}}
                      onMouseEnter={e=>{e.currentTarget.style.color="rgba(255,255,255,.5)"}}
                      onMouseLeave={e=>{e.currentTarget.style.color="rgba(255,255,255,.2)"}}>
                      <I d={ic.x} size={12}/>
                    </button>
                  </div>
                  <div style={{flex:1,overflow:"auto"}}>
                    {Renderer?<Renderer data={pane.data}/>:<div style={{padding:16,color:"#71717a",fontSize:12}}>Unknown app: {pane.appId}</div>}
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* Extensions marketplace overlay — shown when extensions panel is active */}
        {activePanel==="extensions"&&sidebarOpen&&(
          <ExtensionsMarketplace extensions={extensions} onToggle={toggleExt}
            onInstall={(id)=>{notify("Installed extension")}}
            onClose={()=>setActivePanel("workspaces")}/>
        )}
      </div>

      {/* Shortcut overlay */}
      {showShortcuts&&<ShortcutOverlay onClose={()=>setShowShortcuts(false)}/>}

      {/* Workspace Task View overlay */}
      {wsOverlayOpen&&(
        <WorkspaceOverlay workspaces={workspaces} activeId={activeWsId}
          onSwitch={switchWorkspace} onCreate={createWorkspace} onDelete={deleteWorkspace} onRename={renameWorkspace}
          onClose={()=>setWsOverlayOpen(false)}/>
      )}
      {/* Toast */}
      {toast&&(
        <div style={{position:"fixed",bottom:12,left:"50%",transform:"translateX(-50%)",background:"rgba(12,12,15,.92)",backdropFilter:"blur(12px)",
          color:"#a1a1aa",padding:"6px 16px",borderRadius:7,fontSize:11.5,fontWeight:500,border:"1px solid rgba(255,255,255,.05)",zIndex:9999,animation:"slide-up .18s ease-out"}}>
          {toast}
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
