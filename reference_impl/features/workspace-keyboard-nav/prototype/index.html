<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Workspace Tree Keyboard Navigation Prototype</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #09090b;
      color: #a1a1aa;
      height: 100%;
    }
    #root {
      height: 100vh;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useCallback, useMemo } = React;

    // SVG Icons as React component
    const I = ({ name, size = 16 }) => {
      const icons = {
        folder: (
          <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
          </svg>
        ),
        tab: (
          <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
            <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z" />
          </svg>
        ),
        check: (
          <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3">
            <polyline points="20 6 9 17 4 12" />
          </svg>
        ),
        chevronDown: (
          <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
            <polyline points="6 9 12 15 18 9" />
          </svg>
        ),
        chevronRight: (
          <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
            <polyline points="9 18 15 12 9 6" />
          </svg>
        ),
      };
      return icons[name] || null;
    };

    const WorkspaceTree = () => {
      const [tree, setTree] = useState({
        "daily-driver": { name: "Daily Driver", type: "folder", expanded: true, children: ["gmail", "calendar", "slack"] },
        "gmail": { name: "Gmail", type: "tab", parent: "daily-driver" },
        "calendar": { name: "Google Calendar", type: "tab", parent: "daily-driver" },
        "slack": { name: "Slack", type: "tab", parent: "daily-driver" },
        "research": { name: "Research", type: "folder", expanded: false, children: ["hackernews", "arxiv", "chromium"] },
        "hackernews": { name: "Hacker News", type: "tab", parent: "research" },
        "arxiv": { name: "ArXiv", type: "tab", parent: "research" },
        "chromium": { name: "Chromium Source", type: "tab", parent: "research" },
        "shopping": { name: "Shopping", type: "folder", expanded: false, children: ["amazon", "rtings"] },
        "amazon": { name: "Amazon", type: "tab", parent: "shopping" },
        "rtings": { name: "RTINGS", type: "tab", parent: "shopping" },
        "ungrouped": { name: "Ungrouped", type: "ungrouped", children: ["github"] },
        "github": { name: "GitHub", type: "tab", parent: "ungrouped" },
      });

      const [cursorId, setCursorId] = useState("daily-driver");
      const [selected, setSelected] = useState(new Set());
      const [moveMode, setMoveMode] = useState(false);
      const [moveItems, setMoveItems] = useState(new Set());
      const [filter, setFilter] = useState("");
      const [showShortcuts, setShowShortcuts] = useState(false);
      const [navUrl, setNavUrl] = useState("");
      const treeRef = useRef(null);

      // Build visible items list
      const visibleItems = useMemo(() => {
        const root = ["daily-driver", "research", "shopping", "ungrouped"];
        const items = [];

        const addItem = (id) => {
          const item = tree[id];
          if (!item) return;

          const matchesFilter = !filter || item.name.toLowerCase().includes(filter.toLowerCase());
          if (matchesFilter) items.push(id);

          if (item.type === "folder" && item.expanded && item.children) {
            item.children.forEach(childId => addItem(childId));
          }
        };

        root.forEach(id => addItem(id));
        return items;
      }, [tree, filter]);

      const handleKeyDown = useCallback((e) => {
        if (showShortcuts && e.key !== "?") {
          setShowShortcuts(false);
          return;
        }

        if (e.key === "?") {
          setShowShortcuts(!showShortcuts);
          e.preventDefault();
          return;
        }

        if (filter && e.key !== "Escape" && /^[a-z0-9]$/i.test(e.key)) {
          setFilter(filter + e.key);
          e.preventDefault();
          return;
        }

        const idx = visibleItems.indexOf(cursorId);
        const item = tree[cursorId];

        switch (e.key) {
          case "ArrowUp":
            if (idx > 0) setCursorId(visibleItems[idx - 1]);
            e.preventDefault();
            break;
          case "ArrowDown":
            if (idx < visibleItems.length - 1) setCursorId(visibleItems[idx + 1]);
            e.preventDefault();
            break;
          case "ArrowRight":
            if (item?.type === "folder") {
              if (!item.expanded) {
                setTree(t => ({ ...t, [cursorId]: { ...item, expanded: true } }));
              } else if (item.children?.length > 0) {
                setCursorId(item.children[0]);
              }
            }
            e.preventDefault();
            break;
          case "ArrowLeft":
            if (item?.type === "tab" && item.parent) {
              setCursorId(item.parent);
            } else if (item?.type === "folder" && item.expanded) {
              setTree(t => ({ ...t, [cursorId]: { ...item, expanded: false } }));
            }
            e.preventDefault();
            break;
          case "Home":
            if (visibleItems.length > 0) setCursorId(visibleItems[0]);
            e.preventDefault();
            break;
          case "End":
            if (visibleItems.length > 0) setCursorId(visibleItems[visibleItems.length - 1]);
            e.preventDefault();
            break;
          case " ":
            setSelected(s => {
              const ns = new Set(s);
              ns.has(cursorId) ? ns.delete(cursorId) : ns.add(cursorId);
              return ns;
            });
            e.preventDefault();
            break;
          case "Shift":
            break;
          case "Control":
            break;
          case "Escape":
            if (moveMode) {
              setMoveMode(false);
              setMoveItems(new Set());
            } else if (filter) {
              setFilter("");
            } else {
              setSelected(new Set());
            }
            e.preventDefault();
            break;
          case "Enter":
            if (item?.type === "folder") {
              setTree(t => ({ ...t, [cursorId]: { ...item, expanded: !item.expanded } }));
            }
            e.preventDefault();
            break;
          default:
            if (e.ctrlKey || e.metaKey) {
              if (e.key === "x") {
                if (selected.size > 0) {
                  setMoveMode(true);
                  setMoveItems(new Set(selected));
                }
                e.preventDefault();
              } else if (e.key === "v") {
                if (moveMode && moveItems.size > 0 && item?.type === "folder") {
                  setTree(t => {
                    const nt = { ...t };
                    moveItems.forEach(moveId => {
                      const moveItem = nt[moveId];
                      if (moveItem?.parent) {
                        const oldParent = nt[moveItem.parent];
                        if (oldParent?.children) {
                          oldParent.children = oldParent.children.filter(c => c !== moveId);
                        }
                      }
                      nt[moveId] = { ...moveItem, parent: cursorId };
                      const folder = nt[cursorId];
                      if (folder?.children) {
                        if (!folder.children.includes(moveId)) {
                          folder.children = [...folder.children, moveId];
                        }
                      } else {
                        nt[cursorId] = { ...folder, children: [moveId] };
                      }
                    });
                    return nt;
                  });
                  setMoveMode(false);
                  setMoveItems(new Set());
                  setSelected(new Set());
                }
                e.preventDefault();
              } else if (e.key === "a") {
                setSelected(new Set(visibleItems));
                e.preventDefault();
              } else if (/^[1-9]$/.test(e.key)) {
                const num = parseInt(e.key);
                const folders = ["daily-driver", "research", "shopping"];
                if (num <= folders.length) {
                  const folderId = folders[num - 1];
                  setCursorId(folderId);
                  setTree(t => {
                    const f = t[folderId];
                    return { ...t, [folderId]: { ...f, expanded: true } };
                  });
                }
                e.preventDefault();
              }
            } else if (!moveMode && /^[a-z0-9]$/i.test(e.key)) {
              setFilter(e.key);
              e.preventDefault();
            }
        }
      }, [cursorId, selected, moveMode, moveItems, filter, visibleItems, tree, showShortcuts]);

      if (e.shiftKey) return;

      const handleAddTab = () => {
        if (!navUrl.trim()) return;
        const tabId = navUrl.toLowerCase().replace(/\s+/g, "-");
        setTree(t => ({
          ...t,
          [tabId]: { name: navUrl, type: "tab", parent: "ungrouped" },
          "ungrouped": { ...t.ungrouped, children: [...t.ungrouped.children, tabId] }
        }));
        setNavUrl("");
      };

      const draggedRef = useRef(null);
      const handleDragStart = (id) => {
        draggedRef.current = id;
      };
      const handleDragOver = (e) => {
        e.preventDefault();
      };
      const handleDrop = (targetId) => {
        if (!draggedRef.current) return;
        const draggedItem = tree[draggedRef.current];
        if (!draggedItem || !tree[targetId] || tree[targetId].type !== "folder") return;

        setTree(t => {
          const nt = { ...t };
          if (draggedItem.parent) {
            const oldParent = nt[draggedItem.parent];
            if (oldParent?.children) {
              oldParent.children = oldParent.children.filter(c => c !== draggedRef.current);
            }
          }
          nt[draggedRef.current] = { ...draggedItem, parent: targetId };
          const folder = nt[targetId];
          if (!folder.children.includes(draggedRef.current)) {
            folder.children = [...folder.children, draggedRef.current];
          }
          return nt;
        });
        draggedRef.current = null;
      };

      const renderTreeItem = (id) => {
        const item = tree[id];
        if (!item) return null;

        const depth = item.parent ? (tree[item.parent] ? 1 : 0) : 0;
        const isCursor = id === cursorId;
        const isSelected = selected.has(id);
        const isMoving = moveItems.has(id);

        const rowStyle = {
          display: "flex",
          alignItems: "center",
          height: "30px",
          paddingLeft: `${8 + depth * 20}px`,
          paddingRight: "8px",
          cursor: "pointer",
          backgroundColor: isCursor ? "rgba(96,165,250,.06)" : isSelected ? "rgba(52,211,153,.06)" : "transparent",
          borderLeft: isCursor ? "2px solid #60a5fa" : "none",
          opacity: isMoving ? 0.4 : 1,
          borderStyle: isMoving ? "dashed" : "none",
          borderColor: isMoving ? "rgba(96,165,250,.3)" : "transparent",
          transition: "all 0.15s ease",
          userSelect: "none",
        };

        return (
          <div
            key={id}
            style={rowStyle}
            onClick={() => setCursorId(id)}
            onDragStart={() => handleDragStart(id)}
            onDragOver={handleDragOver}
            onDrop={() => handleDrop(id)}
            draggable={item.type !== "ungrouped"}
            role="option"
            aria-selected={isSelected}
          >
            {item.type === "folder" && (
              <div style={{ display: "flex", alignItems: "center", marginRight: "6px", width: "16px" }}>
                <I name={item.expanded ? "chevronDown" : "chevronRight"} size={14} />
              </div>
            )}
            {item.type === "tab" && <div style={{ marginRight: "6px", width: "16px" }} />}
            {isSelected && <I name="check" size={14} style={{ marginRight: "6px", color: "#34d399" }} />}
            <div style={{ width: "16px", marginRight: "6px", opacity: 0.6 }}>
              <I name={item.type === "folder" || item.type === "ungrouped" ? "folder" : "tab"} size={14} />
            </div>
            <span style={{ flex: 1, fontSize: "13px" }}>{item.name}</span>
            {item.type === "folder" && depth === 0 && (
              <div style={{ fontSize: "9px", opacity: 0.15, marginLeft: "8px" }}>
                {["daily-driver", "research", "shopping"].indexOf(id) + 1}
              </div>
            )}
          </div>
        );
      };

      return (
        <div
          style={{
            display: "flex",
            height: "100vh",
            backgroundColor: "#09090b",
            color: "#a1a1aa",
            fontFamily: "inherit",
          }}
        >
          {/* Sidebar */}
          <div
            ref={treeRef}
            onKeyDown={handleKeyDown}
            style={{
              width: "280px",
              backgroundColor: "#09090b",
              borderRight: "1px solid rgba(255,255,255,.05)",
              overflowY: "auto",
              outline: "none",
              position: "relative",
            }}
            tabIndex={0}
            role="listbox"
          >
            {filter && (
              <div style={{
                padding: "8px",
                borderBottom: "1px solid rgba(255,255,255,.05)",
                backgroundColor: "rgba(96,165,250,.06)",
              }}>
                <input
                  type="text"
                  value={filter}
                  onChange={(e) => setFilter(e.target.value)}
                  placeholder="Filter..."
                  style={{
                    width: "100%",
                    backgroundColor: "transparent",
                    border: "none",
                    color: "#a1a1aa",
                    fontSize: "13px",
                    padding: "4px 0",
                    outline: "none",
                  }}
                  autoFocus
                />
              </div>
            )}

            {moveMode && (
              <div style={{
                padding: "8px 12px",
                backgroundColor: "rgba(96,165,250,.1)",
                borderBottom: "1px solid rgba(96,165,250,.3)",
                fontSize: "12px",
                borderLeft: "2px solid #60a5fa",
              }}>
                Moving {moveItems.size} item{moveItems.size !== 1 ? "s" : ""} — Ctrl+V to drop, Esc to cancel
              </div>
            )}

            {visibleItems.map(id => renderTreeItem(id))}

            {/* Ungrouped divider */}
            {visibleItems.includes("ungrouped") && (
              <div style={{
                padding: "12px 8px 8px",
                fontSize: "9px",
                textTransform: "uppercase",
                opacity: 0.15,
                marginTop: "8px",
                borderTop: "1px solid rgba(255,255,255,.05)",
              }}>
                Ungrouped
              </div>
            )}
          </div>

          {/* Right Panel */}
          <div style={{ flex: 1, padding: "24px", display: "flex", flexDirection: "column" }}>
            <h1 style={{ fontSize: "20px", marginBottom: "16px", color: "#ffffff" }}>
              Workspace Tree Navigator
            </h1>

            {tree[cursorId] && (
              <div style={{
                backgroundColor: "rgba(96,165,250,.06)",
                padding: "12px",
                borderRadius: "4px",
                marginBottom: "16px",
                borderLeft: "2px solid #60a5fa",
              }}>
                <p style={{ fontSize: "12px", opacity: 0.6, marginBottom: "4px" }}>Current Item</p>
                <p style={{ fontSize: "14px", color: "#ffffff" }}>{tree[cursorId].name}</p>
                <p style={{ fontSize: "12px", opacity: 0.5, marginTop: "4px" }}>Type: {tree[cursorId].type}</p>
              </div>
            )}

            {selected.size > 0 && (
              <div style={{
                backgroundColor: "rgba(52,211,153,.06)",
                padding: "12px",
                borderRadius: "4px",
                marginBottom: "16px",
                borderLeft: "2px solid #34d399",
              }}>
                <p style={{ fontSize: "12px", opacity: 0.6, marginBottom: "4px" }}>Selection</p>
                <p style={{ fontSize: "14px", color: "#ffffff" }}>{selected.size} item{selected.size !== 1 ? "s" : ""} selected</p>
              </div>
            )}

            <div style={{ marginBottom: "16px" }}>
              <label style={{ display: "block", marginBottom: "8px", fontSize: "13px" }}>
                Navigate to URL
              </label>
              <div style={{ display: "flex", gap: "8px" }}>
                <input
                  type="text"
                  value={navUrl}
                  onChange={(e) => setNavUrl(e.target.value)}
                  onKeyPress={(e) => e.key === "Enter" && handleAddTab()}
                  placeholder="e.g., MDN Docs"
                  style={{
                    flex: 1,
                    padding: "8px 12px",
                    backgroundColor: "rgba(255,255,255,.05)",
                    border: "1px solid rgba(255,255,255,.1)",
                    color: "#a1a1aa",
                    borderRadius: "4px",
                    fontSize: "13px",
                  }}
                />
                <button
                  onClick={handleAddTab}
                  style={{
                    padding: "8px 16px",
                    backgroundColor: "#60a5fa",
                    border: "none",
                    color: "#ffffff",
                    borderRadius: "4px",
                    cursor: "pointer",
                    fontSize: "13px",
                  }}
                >
                  Add Tab
                </button>
              </div>
            </div>

            <div style={{ marginBottom: "16px", fontSize: "12px", opacity: 0.6 }}>
              <p>Press <kbd style={{ backgroundColor: "rgba(255,255,255,.1)", padding: "2px 6px", borderRadius: "2px" }}>?</kbd> for shortcuts</p>
            </div>

            {showShortcuts && (
              <div style={{
                position: "fixed",
                top: "50%",
                left: "50%",
                transform: "translate(-50%, -50%)",
                backgroundColor: "rgba(9,9,11,.95)",
                border: "1px solid rgba(255,255,255,.1)",
                borderRadius: "8px",
                padding: "24px",
                maxHeight: "80vh",
                overflowY: "auto",
                zIndex: 1000,
                minWidth: "400px",
                backdropFilter: "blur(4px)",
              }}>
                <h2 style={{ marginBottom: "16px", color: "#ffffff", fontSize: "16px" }}>Keyboard Shortcuts</h2>
                {[
                  { title: "Navigation", items: [
                    ["↑/↓", "Move cursor"],
                    ["→/←", "Expand/collapse folder or move"],
                    ["Home/End", "Jump to first/last item"],
                  ]},
                  { title: "Selection", items: [
                    ["Space", "Toggle selection"],
                    ["Shift+↑/↓", "Extend selection"],
                    ["Ctrl+A", "Select all visible items"],
                  ]},
                  { title: "Operations", items: [
                    ["Enter", "Toggle folder / Open tab"],
                    ["Ctrl+X", "Cut selected items"],
                    ["Ctrl+V", "Paste into folder"],
                    ["Esc", "Clear selection / Cancel"],
                  ]},
                  { title: "Quick Access", items: [
                    ["Alt+1-3", "Jump to root folder"],
                    ["Type to filter", "Search items"],
                  ]},
                ].map((group, i) => (
                  <div key={i} style={{ marginBottom: "16px" }}>
                    <h3 style={{ fontSize: "12px", opacity: 0.6, marginBottom: "8px", textTransform: "uppercase" }}>
                      {group.title}
                    </h3>
                    {group.items.map((item, j) => (
                      <div key={j} style={{ display: "flex", justifyContent: "space-between", fontSize: "13px", marginBottom: "4px" }}>
                        <span style={{ opacity: 0.8 }}>{item[0]}</span>
                        <span style={{ opacity: 0.5 }}>{item[1]}</span>
                      </div>
                    ))}
                  </div>
                ))}
                <p style={{ fontSize: "12px", opacity: 0.4, marginTop: "16px" }}>Press any key to close</p>
              </div>
            )}
          </div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<WorkspaceTree />);
  </script>
</body>
</html>
