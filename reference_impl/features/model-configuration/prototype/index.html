/* ═══════════ Provider Card ═══════════ */
function ProviderCard({provider,onUpdate}){
  const[expanded,setExpanded]=useState(false);
  const[showKey,setShowKey]=useState(false);
  const[apiKey,setApiKey]=useState(provider.status==="connected"?"sk-****************************":"");
  const[hov,setHov]=useState(false);
  const connected=provider.status==="connected";
  const enabledCount=provider.models.filter(m=>m.enabled).length;

  const handleSave=()=>{
    if(apiKey.trim())onUpdate({...provider,status:"connected"});
  };

  return(
    <div style={{background:"rgba(255,255,255,.02)",border:"1px solid rgba(255,255,255,.05)",borderRadius:8,overflow:"hidden",
      transition:"all .15s",marginBottom:8}} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}>
      {/* Header */}
      <div onClick={()=>setExpanded(!expanded)} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",cursor:"pointer",
        background:hov&&!expanded?"rgba(255,255,255,.01)":"transparent",transition:"background .1s"}}>
        <div style={{width:28,height:28,borderRadius:6,background:provider.color+"20",border:"1px solid "+provider.color+"40",
          display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          <span style={{fontSize:13,fontWeight:700,color:provider.color}}>{provider.name.charAt(0)}</span>
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:12.5,fontWeight:600,color:"#e4e4e7"}}>{provider.name}</div>
          <div style={{fontSize:10.5,opacity:.35,marginTop:1}}>
            {connected?enabledCount+" model"+(enabledCount!==1?"s":"")+" enabled":"Not configured"}
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {connected&&<span style={{width:7,height:7,borderRadius:"50%",background:"#34d399"}}/>}
          <I d={ic.chevronDown} size={14} color="rgba(255,255,255,.2)" style={{transform:expanded?"rotate(180deg)":"none",transition:"transform .15s"}}/>
        </div>
      </div>

      {/* Expanded config */}
      {expanded&&(
        <div style={{padding:"0 12px 12px",animation:"fade-in .15s ease-out"}}>
          <div style={{borderTop:"1px solid rgba(255,255,255,.04)",paddingTop:10}}>
            {/* API Key */}
            <label style={{fontSize:10.5,fontWeight:600,opacity:.4,display:"block",marginBottom:4}}>API Key</label>
            <div style={{display:"flex",gap:6,marginBottom:10}}>
              <div style={{flex:1,position:"relative"}}>
                <input type={showKey?"text":"password"} value={apiKey} onChange={e=>setApiKey(e.target.value)}
                  placeholder="Enter API key..."
                  style={{width:"100%",background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)",borderRadius:5,
                    padding:"6px 32px 6px 8px",fontSize:11.5,color:"#d4d4d8",outline:"none"}}
                  onFocus={e=>{e.target.style.borderColor="rgba(255,255,255,.15)"}}
                  onBlur={e=>{e.target.style.borderColor="rgba(255,255,255,.06)"}}/>
                <button onClick={()=>setShowKey(!showKey)} style={{position:"absolute",right:6,top:"50%",transform:"translateY(-50%)",
                  background:"none",border:"none",padding:2,color:"rgba(255,255,255,.2)",display:"flex"}}>
                  <I d={showKey?ic.eyeOff:ic.eye} size={12}/>
                </button>
              </div>
              <button onClick={handleSave} style={{background:apiKey.trim()?"rgba(52,211,153,.15)":"rgba(255,255,255,.03)",
                border:apiKey.trim()?"1px solid rgba(52,211,153,.25)":"1px solid rgba(255,255,255,.06)",
                color:apiKey.trim()?"#34d399":"rgba(255,255,255,.2)",
                padding:"5px 12px",borderRadius:5,fontSize:11,fontWeight:600,transition:"all .15s"}}>
                Save
              </button>
            </div>

            {/* Base URL */}
            <label style={{fontSize:10.5,fontWeight:600,opacity:.4,display:"block",marginBottom:4}}>Base URL</label>
            <input value={"https://api."+provider.id+".com/v1"} readOnly
              style={{width:"100%",background:"rgba(255,255,255,.02)",border:"1px solid rgba(255,255,255,.04)",borderRadius:5,
                padding:"6px 8px",fontSize:11,color:"rgba(255,255,255,.3)",outline:"none",marginBottom:12}}/>

            {/* Models */}
            <label style={{fontSize:10.5,fontWeight:600,opacity:.4,display:"block",marginBottom:6}}>Models</label>
            {provider.models.map(m=>(
              <div key={m.id} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0"}}>
                <div onClick={()=>{
                  const updated={...provider,models:provider.models.map(mo=>mo.id===m.id?{...mo,enabled:!mo.enabled}:mo)};
                  onUpdate(updated);
                }}
                  style={{width:16,height:16,borderRadius:3,border:m.enabled?"1px solid rgba(52,211,153,.4)":"1px solid rgba(255,255,255,.1)",
                    background:m.enabled?"rgba(52,211,153,.15)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",transition:"all .1s"}}>
                  {m.enabled&&<I d={ic.check} size={10} color="#34d399" sw={2.5}/>}
                </div>
                <span style={{fontSize:12,color:m.enabled?"#d4d4d8":"rgba(255,255,255,.25)",transition:"color .1s"}}>{m.name}</span>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════ Local Model Card ═══════════ */
function LocalModelCard({model,onInstall,onDelete}){
  const[hov,setHov]=useState(false);
  const[downloading,setDownloading]=useState(false);
  const[progress,setProgress]=useState(0);
  const[speed,setSpeed]=useState(0);
  const intervalRef=useRef(null);

  const isInstalled=model.status==="installed";
  const sizeFmt=model.sizeMB>=1000?(model.sizeMB/1000).toFixed(1)+"GB":model.sizeMB+"MB";

  const startDownload=()=>{
    setDownloading(true);setProgress(0);
    let p=0;
    intervalRef.current=setInterval(()=>{
      const inc=Math.random()*4+1;
      p=Math.min(p+inc,100);
      setProgress(p);
      setSpeed(Math.floor(Math.random()*30+10));
      if(p>=100){
        clearInterval(intervalRef.current);
        setTimeout(()=>{setDownloading(false);onInstall(model.id)},300);
      }
    },150);
  };

  const cancelDownload=()=>{
    clearInterval(intervalRef.current);
    setDownloading(false);setProgress(0);
  };

  useEffect(()=>()=>{if(intervalRef.current)clearInterval(intervalRef.current)},[]);

  const speedBars=[];
  for(let i=0;i<5;i++)speedBars.push(i<model.speedRating);

  return(
    <div onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{background:hov?"rgba(255,255,255,.025)":"rgba(255,255,255,.01)",border:"1px solid rgba(255,255,255,.05)",
        borderRadius:8,padding:12,marginBottom:8,transition:"all .15s",animation:"fade-in .2s ease-out"}}>
      <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
        <div style={{width:32,height:32,borderRadius:6,
          background:isInstalled?"rgba(52,211,153,.1)":"rgba(96,165,250,.08)",
          border:isInstalled?"1px solid rgba(52,211,153,.2)":"1px solid rgba(96,165,250,.15)",
          display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          <I d={isInstalled?ic.hardDrive:ic.download} size={15} color={isInstalled?"#34d399":"#60a5fa"}/>
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
            <span style={{fontSize:12.5,fontWeight:600,color:"#e4e4e7"}}>{model.name}</span>
            <span style={{fontSize:9.5,padding:"1px 5px",borderRadius:3,fontWeight:600,fontFamily:"monospace",
              background:"rgba(255,255,255,.05)",color:"rgba(255,255,255,.3)"}}>{model.quant}</span>
            {isInstalled&&<span style={{fontSize:9,padding:"1px 5px",borderRadius:3,fontWeight:600,
              background:"rgba(52,211,153,.1)",color:"#34d399"}}>Ready</span>}
          </div>
          <div style={{fontSize:11,opacity:.35,marginBottom:4}}>{model.desc}</div>
          <div style={{display:"flex",alignItems:"center",gap:12,fontSize:10,opacity:.3}}>
            <span>{model.params} params</span>
            <span>{sizeFmt}</span>
            <span style={{display:"flex",alignItems:"center",gap:2}}>
              Speed:
              {speedBars.map((on,i)=><span key={i} style={{width:3,height:on?8+i*2:6,borderRadius:1,
                background:on?"rgba(52,211,153,.5)":"rgba(255,255,255,.1)",transition:"all .15s"}}/>)}
            </span>
          </div>
        </div>
        <div style={{flexShrink:0}}>
          {downloading?(
            <button onClick={cancelDownload} style={{background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.2)",
              color:"#ef4444",padding:"5px 10px",borderRadius:5,fontSize:10.5,fontWeight:600,display:"flex",alignItems:"center",gap:4}}>
              <I d={ic.x} size={11} color="#ef4444"/>Cancel
            </button>
          ):isInstalled?(
            <button onClick={()=>onDelete(model.id)} style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)",
              color:"rgba(255,255,255,.3)",padding:"5px 10px",borderRadius:5,fontSize:10.5,fontWeight:600,display:"flex",alignItems:"center",gap:4,
              opacity:hov?1:0,transition:"opacity .15s"}}>
              <I d={ic.trash} size={11} color="rgba(255,255,255,.3)"/>Delete
            </button>
          ):(
            <button onClick={startDownload} style={{background:"rgba(96,165,250,.12)",border:"1px solid rgba(96,165,250,.2)",
              color:"#60a5fa",padding:"5px 10px",borderRadius:5,fontSize:10.5,fontWeight:600,display:"flex",alignItems:"center",gap:4,
              transition:"all .15s"}}
              onMouseEnter={e=>{e.currentTarget.style.background="rgba(96,165,250,.2)"}}
              onMouseLeave={e=>{e.currentTarget.style.background="rgba(96,165,250,.12)"}}>
              <I d={ic.download} size={11} color="#60a5fa"/>Install
            </button>
          )}
        </div>
      </div>

      {/* Download progress */}
      {downloading&&(
        <div style={{marginTop:10,animation:"fade-in .15s ease-out"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,fontSize:10,opacity:.4}}>
            <span>Downloading... {Math.floor(progress)}%</span>
            <span>{speed} MB/s · {Math.max(1,Math.ceil((100-progress)/20))}s remaining</span>
          </div>
          <div style={{height:4,background:"rgba(255,255,255,.04)",borderRadius:2,overflow:"hidden"}}>
            <div style={{height:"100%",width:progress+"%",borderRadius:2,transition:"width .15s linear",
              background:"linear-gradient(90deg,#3b82f6,#60a5fa)",
              backgroundSize:"20px 4px"}}/>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════ Storage Bar ═══════════ */
function StorageBar({models}){
  const installed=models.filter(m=>m.status==="installed");
  const usedMB=installed.reduce((s,m)=>s+m.sizeMB,0);
  const quotaMB=5000;
  const pct=Math.min((usedMB/quotaMB)*100,100);
  return(
    <div style={{padding:"10px 14px",borderTop:"1px solid rgba(255,255,255,.04)",background:"rgba(0,0,0,.2)"}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:10,opacity:.3,marginBottom:4}}>
        <span>Cache: {(usedMB/1000).toFixed(1)} GB used</span>
        <span>{(quotaMB/1000).toFixed(0)} GB quota</span>
      </div>
      <div style={{height:3,background:"rgba(255,255,255,.04)",borderRadius:2,overflow:"hidden"}}>
        <div style={{height:"100%",width:pct+"%",background:pct>80?"#ef4444":"#60a5fa",borderRadius:2,transition:"width .3s"}}/>
      </div>
    </div>
  );
}

/* ═══════════ Model Selector Dropdown ═══════════ */
function ModelSelector({providers,localModels,activeModel,onSelect,onClose}){
  const cloudModels=[];
  providers.filter(p=>p.status==="connected").forEach(p=>{
    p.models.filter(m=>m.enabled).forEach(m=>{cloudModels.push({...m,provider:p.name,providerColor:p.color})});
  });
  const installed=localModels.filter(m=>m.status==="installed");

  return(
    <div style={{position:"absolute",bottom:"100%",left:0,right:0,marginBottom:6,background:"#18181b",border:"1px solid rgba(255,255,255,.08)",
      borderRadius:8,overflow:"hidden",animation:"fade-in .1s ease-out",zIndex:50,maxHeight:280,overflowY:"auto"}}>
      {cloudModels.length>0&&(
        <>
          <div style={{padding:"8px 12px 4px",fontSize:10,fontWeight:600,opacity:.25,textTransform:"uppercase",letterSpacing:1}}>
            <span style={{display:"flex",alignItems:"center",gap:5}}><I d={ic.cloud} size={10}/>Cloud Models</span>
          </div>
          {cloudModels.map(m=>(
            <ModelOption key={m.id} name={m.name} sub={m.provider} color={m.providerColor} active={activeModel===m.id}
              icon={ic.sparkles} onClick={()=>{onSelect(m.id);onClose()}}/>
          ))}
        </>
      )}
      {installed.length>0&&(
        <>
          <div style={{padding:"8px 12px 4px",fontSize:10,fontWeight:600,opacity:.25,textTransform:"uppercase",letterSpacing:1,
            borderTop:cloudModels.length?"1px solid rgba(255,255,255,.04)":"none"}}>
            <span style={{display:"flex",alignItems:"center",gap:5}}><I d={ic.cpu} size={10}/>Local Models</span>
          </div>
          {installed.map(m=>(
            <ModelOption key={m.id} name={m.name} sub={m.params+" · "+m.quant} color="#34d399" active={activeModel===m.id}
              icon={ic.hardDrive} onClick={()=>{onSelect(m.id);onClose()}}/>
          ))}
        </>
      )}
      {cloudModels.length===0&&installed.length===0&&(
        <div style={{padding:16,textAlign:"center",fontSize:11,opacity:.2}}>No models configured. Add a provider or install a local model.</div>
      )}
    </div>
  );
}

function ModelOption({name,sub,color,active,icon,onClick}){
  const[hov,setHov]=useState(false);
  return(
    <div onClick={onClick} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{display:"flex",alignItems:"center",gap:8,padding:"7px 12px",cursor:"pointer",
        background:hov?"rgba(255,255,255,.04)":active?"rgba(255,255,255,.03)":"transparent",transition:"background .1s"}}>
      <I d={icon} size={13} color={color} style={{opacity:.6}}/>
      <div style={{flex:1,minWidth:0}}>
        <span style={{fontSize:12,fontWeight:active?600:500,color:active?"#e4e4e7":"#a1a1aa"}}>{name}</span>
        <span style={{fontSize:10,opacity:.3,marginLeft:6}}>{sub}</span>
      </div>
      {active&&<I d={ic.check} size={13} color="#34d399"/>}
    </div>
  );
}

/* ═══════════ Main App ═══════════ */
function App(){
  const[tab,setTab]=useState("providers");
  const[providers,setProviders]=useState(PROVIDERS);
  const[localModels,setLocalModels]=useState(LOCAL_MODELS);
  const[activeModel,setActiveModel]=useState("claude-opus-4");
  const[selectorOpen,setSelectorOpen]=useState(false);
  const[searchLocal,setSearchLocal]=useState("");

  const updateProvider=useCallback((updated)=>{
    setProviders(ps=>ps.map(p=>p.id===updated.id?updated:p));
  },[]);

  const installModel=useCallback((id)=>{
    setLocalModels(ms=>ms.map(m=>m.id===id?{...m,status:"installed"}:m));
  },[]);

  const deleteModel=useCallback((id)=>{
    setLocalModels(ms=>ms.map(m=>m.id===id?{...m,status:"available"}:m));
  },[]);

  const filteredLocal=useMemo(()=>{
    if(!searchLocal)return localModels;
    return localModels.filter(m=>m.name.toLowerCase().includes(searchLocal.toLowerCase())||m.desc.toLowerCase().includes(searchLocal.toLowerCase()));
  },[localModels,searchLocal]);

  const installed=filteredLocal.filter(m=>m.status==="installed");
  const available=filteredLocal.filter(m=>m.status==="available");

  /* Find active model display name */
  const activeModelName=useMemo(()=>{
    for(const p of providers){
      const m=p.models.find(m=>m.id===activeModel);
      if(m)return m.name;
    }
    const lm=localModels.find(m=>m.id===activeModel);
    if(lm)return lm.name;
    return activeModel;
  },[activeModel,providers,localModels]);

  return(
    <div style={{display:"flex",height:"100vh",overflow:"hidden"}}>
      {/* Simplified sidebar showing just settings with models */}
      <div style={{width:320,display:"flex",flexDirection:"column",borderRight:"1px solid rgba(255,255,255,.04)",background:"#09090b",flexShrink:0}}>
        {/* Settings header */}
        <div style={{padding:"12px 14px 10px",borderBottom:"1px solid rgba(255,255,255,.04)",display:"flex",alignItems:"center",gap:8}}>
          <I d={ic.settings} size={15} color="rgba(255,255,255,.3)"/>
          <span style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1.2,opacity:.25}}>Settings</span>
          <span style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1.2,opacity:.15,marginLeft:2}}>/</span>
          <span style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1.2,opacity:.45,color:"#e4e4e7"}}>Models</span>
        </div>

        {/* Tab bar */}
        <div style={{display:"flex",borderBottom:"1px solid rgba(255,255,255,.04)"}}>
          {[{id:"providers",label:"Providers",icon:ic.cloud},{id:"local",label:"Local Models",icon:ic.cpu}].map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)}
              style={{flex:1,padding:"9px 0",background:"none",border:"none",borderBottom:tab===t.id?"2px solid #e4e4e7":"2px solid transparent",
                color:tab===t.id?"#e4e4e7":"rgba(255,255,255,.25)",fontSize:11.5,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:5,
                transition:"all .12s",cursor:"pointer"}}>
              <I d={t.icon} size={13} color={tab===t.id?"#e4e4e7":"rgba(255,255,255,.2)"}/>
              {t.label}
            </button>
          ))}
        </div>

        {/* Panel content */}
        <div style={{flex:1,overflowY:"auto",padding:"10px 10px"}}>
          {tab==="providers"&&(
            <div>
              {providers.map(p=><ProviderCard key={p.id} provider={p} onUpdate={updateProvider}/>)}
            </div>
          )}
          {tab==="local"&&(
            <div>
              {/* Search */}
              <div style={{position:"relative",marginBottom:10}}>
                <span style={{position:"absolute",left:8,top:"50%",transform:"translateY(-50%)",display:"flex",opacity:.2}}>
                  <I d={ic.search} size={12}/>
                </span>
                <input value={searchLocal} onChange={e=>setSearchLocal(e.target.value)} placeholder="Search models..."
                  style={{width:"100%",background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)",borderRadius:6,
                    padding:"6px 8px 6px 28px",fontSize:11.5,color:"#d4d4d8",outline:"none"}}
                  onFocus={e=>{e.target.style.borderColor="rgba(255,255,255,.12)"}}
                  onBlur={e=>{e.target.style.borderColor="rgba(255,255,255,.06)"}}/>
              </div>

              {/* Installed */}
              {installed.length>0&&(
                <>
                  <div style={{fontSize:10,fontWeight:600,opacity:.25,textTransform:"uppercase",letterSpacing:1,marginBottom:6,display:"flex",alignItems:"center",gap:5}}>
                    <I d={ic.hardDrive} size={10}/>Installed ({installed.length})
                  </div>
                  {installed.map(m=><LocalModelCard key={m.id} model={m} onInstall={installModel} onDelete={deleteModel}/>)}
                </>
              )}

              {/* Available */}
              {available.length>0&&(
                <>
                  <div style={{fontSize:10,fontWeight:600,opacity:.25,textTransform:"uppercase",letterSpacing:1,marginBottom:6,marginTop:installed.length?12:0,display:"flex",alignItems:"center",gap:5}}>
                    <I d={ic.globe} size={10}/>Available ({available.length})
                  </div>
                  {available.map(m=><LocalModelCard key={m.id} model={m} onInstall={installModel} onDelete={deleteModel}/>)}
                </>
              )}
            </div>
          )}
        </div>

        {/* Storage bar (local tab only) */}
        {tab==="local"&&<StorageBar models={localModels}/>}
      </div>

      {/* Main content area - simulated chat */}
      <div style={{flex:1,display:"flex",flexDirection:"column",background:"#0c0c0f"}}>
        <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",opacity:.08,fontSize:14}}>
          Chat interface
        </div>

        {/* Model selector at bottom */}
        <div style={{padding:"12px 24px 16px",borderTop:"1px solid rgba(255,255,255,.04)",position:"relative"}}>
          {selectorOpen&&<ModelSelector providers={providers} localModels={localModels} activeModel={activeModel}
            onSelect={setActiveModel} onClose={()=>setSelectorOpen(false)}/>}
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            {/* Model pill */}
            <button onClick={()=>setSelectorOpen(!selectorOpen)}
              style={{background:selectorOpen?"rgba(255,255,255,.06)":"rgba(255,255,255,.03)",
                border:"1px solid "+(selectorOpen?"rgba(255,255,255,.1)":"rgba(255,255,255,.05)"),
                borderRadius:6,padding:"5px 10px",display:"flex",alignItems:"center",gap:6,cursor:"pointer",transition:"all .12s"}}
              onMouseEnter={e=>{if(!selectorOpen)e.currentTarget.style.background="rgba(255,255,255,.05)"}}
              onMouseLeave={e=>{if(!selectorOpen)e.currentTarget.style.background=selectorOpen?"rgba(255,255,255,.06)":"rgba(255,255,255,.03)"}}>
              <I d={ic.sparkles} size={12} color="#60a5fa"/>
              <span style={{fontSize:11.5,fontWeight:600,color:"#d4d4d8"}}>{activeModelName}</span>
              <I d={ic.chevronDown} size={11} color="rgba(255,255,255,.2)" style={{transform:selectorOpen?"rotate(180deg)":"none",transition:"transform .15s"}}/>
            </button>

            {/* Chat input placeholder */}
            <div style={{flex:1,background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.05)",borderRadius:6,
              padding:"7px 12px",fontSize:12,color:"rgba(255,255,255,.15)"}}>
              Ask about your workspace, browse the web, or run a task...
            </div>
          </div>
        </div>
      </div>

      {/* Click outside to close selector */}
      {selectorOpen&&<div onClick={()=>setSelectorOpen(false)} style={{position:"fixed",inset:0,zIndex:40}}/>}
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
