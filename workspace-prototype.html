// ── TJS Web Worker System ───────────────────────────────────────────────────

// Babel won't transform code inside new Function strings
const _dynamicImport=new Function("url","return import(url)");

const WORKER_SRC=`
const _imp=new Function("url","return import(url)");
let pipelines={};
self.onmessage=async function(e){
  const {type,id,task,modelId,prompt,options}=e.data;
  if(type==='ping'){self.postMessage({type:'pong',id});return;}
  if(type==='load'){
    try{
      self.postMessage({type:'status',id,msg:'Loading transformers.js...'});
      const {pipeline,TextStreamer}=await _imp('https://cdn.jsdelivr.net/npm/@huggingface/transformers@3');
      const key=task+'::'+modelId;
      if(!pipelines[key]){
        self.postMessage({type:'phase',id,phase:'Downloading model...'});
        pipelines[key]=await pipeline(task,modelId,{dtype:'q4',device:'wasm'});
      }
      self.postMessage({type:'status',id,msg:'ready'});
    }catch(err){self.postMessage({type:'error',id,msg:err.message});}
    return;
  }
  if(type==='generate'){
    try{
      const {pipeline,TextStreamer}=await _imp('https://cdn.jsdelivr.net/npm/@huggingface/transformers@3');
      const key=task+'::'+modelId;
      if(!pipelines[key]){
        self.postMessage({type:'phase',id,phase:'Loading model...'});
        pipelines[key]=await pipeline(task,modelId,{dtype:'q4',device:'wasm'});
      }
      const streamer=new TextStreamer(pipelines[key].tokenizer,{
        skip_prompt:true,
        callback_function:(token)=>self.postMessage({type:'token',id,token})
      });
      const opts={...{max_new_tokens:256,temperature:0.7,do_sample:true,top_p:0.9},...(options||{}),streamer};
      const result=await pipelines[key](prompt,opts);
      self.postMessage({type:'done',id,result});
    }catch(err){self.postMessage({type:'error',id,msg:err.message});}
  }
};
`;

let _worker=null;
let _workerReady=false;
const _pendingCbs={};
let _msgId=0;

function _getWorker(){
  if(_worker)return Promise.resolve(_worker);
  return new Promise((resolve,reject)=>{
    try{
      const blob=new Blob([WORKER_SRC],{type:'application/javascript'});
      const url=URL.createObjectURL(blob);
      const w=new Worker(url);
      const tid=setTimeout(()=>{w.terminate();reject(new Error('Worker timeout'));},10000);
      w.onmessage=(e)=>{
        if(e.data.type==='pong'){clearTimeout(tid);_worker=w;_workerReady=true;resolve(w);}
        const cb=_pendingCbs[e.data.id];
        if(cb)cb(e.data);
      };
      w.onerror=(e)=>{clearTimeout(tid);reject(e);};
      w.postMessage({type:'ping',id:'init'});
    }catch(e){reject(e);}
  });
}

const TJS={
  async loadModel(task,modelId,onStatus){
    try{
      const w=await _getWorker();
      const id='load_'+(++_msgId);
      return new Promise((res,rej)=>{
        _pendingCbs[id]=(msg)=>{
          if(msg.type==='status'){onStatus&&onStatus(msg.msg);if(msg.msg==='ready'){delete _pendingCbs[id];res();}}
          else if(msg.type==='phase'){onStatus&&onStatus(msg.phase);}
          else if(msg.type==='error'){delete _pendingCbs[id];rej(new Error(msg.msg));}
        };
        w.postMessage({type:'load',id,task,modelId});
      });
    }catch(e){
      onStatus&&onStatus('Worker unavailable, using main thread');
      const {pipeline}=await _dynamicImport('https://cdn.jsdelivr.net/npm/@huggingface/transformers@3');
      if(!TJS._pipes)TJS._pipes={};
      const key=task+'::'+modelId;
      if(!TJS._pipes[key]){onStatus&&onStatus('Downloading model...');TJS._pipes[key]=await pipeline(task,modelId,{dtype:'q4'});}
      onStatus&&onStatus('ready');
    }
  },
  async generate({task,modelId,prompt,options},{onStatus,onPhase,onToken,onDone,onError}){
    try{
      const w=await _getWorker();
      const id='gen_'+(++_msgId);
      _pendingCbs[id]=(msg)=>{
        if(msg.type==='status')onStatus&&onStatus(msg.msg);
        else if(msg.type==='phase')onPhase&&onPhase(msg.phase);
        else if(msg.type==='token')onToken&&onToken(msg.token);
        else if(msg.type==='done'){delete _pendingCbs[id];onDone&&onDone(msg.result);}
        else if(msg.type==='error'){delete _pendingCbs[id];onError&&onError(new Error(msg.msg));}
      };
      w.postMessage({type:'generate',id,task,modelId,prompt,options});
    }catch(e){
      onError&&onError(e);
    }
  }
};

// ── Tree Helper Functions ───────────────────────────────────────────────────

function deepUpdate(node,id,fn){
  if(node.id===id)return fn(node);
  if(!node.children)return node;
  return {...node,children:node.children.map(c=>deepUpdate(c,id,fn))};
}
function findNode(node,id){
  if(node.id===id)return node;
  if(!node.children)return null;
  for(const c of node.children){const r=findNode(c,id);if(r)return r;}
  return null;
}
function cntTabs(node){
  if(node.type==='tab')return 1;
  return(node.children||[]).reduce((a,c)=>a+cntTabs(c),0);
}
function sumMem(node){
  if(node.type==='tab')return node.memoryMB||0;
  return(node.children||[]).reduce((a,c)=>a+sumMem(c),0);
}
function flattenTabs(node){
  if(node.type==='tab')return[node];
  return(node.children||[]).flatMap(flattenTabs);
}
function getParentPath(root,id,path=[]){
  if(root.id===id)return path;
  for(const c of root.children||[]){
    const r=getParentPath(c,id,[...path,root]);
    if(r)return r;
  }
  return null;
}
function flattenTree(root,filter=''){
  const items=[];
  function walk(node,depth){
    if(filter&&!node.name.toLowerCase().includes(filter.toLowerCase())){}
    else items.push({node,depth});
    if(node.expanded&&node.children)node.children.forEach(c=>walk(c,depth+1));
  }
  (root.children||[]).forEach(c=>walk(c,0));
  return items;
}

  task_tracker:{name:"Task Tracker",icon:"checkCircle",description:"Manage tasks in kanban board",
    parameters:{type:"object",properties:{tasks:{type:"array",items:{type:"object",properties:{title:{type:"string"},status:{type:"string",enum:["todo","in_progress","done"]},priority:{type:"string",enum:["low","medium","high"]}},required:["title","status"]}}},required:["tasks"]}},
  image_viewer:{name:"Image Viewer",icon:"image",description:"Display an image with caption",
    parameters:{type:"object",properties:{url:{type:"string"},caption:{type:"string"}},required:["url"]}},
  gallery:{name:"Gallery",icon:"image",description:"Display multiple images",
    parameters:{type:"object",properties:{images:{type:"array",items:{type:"object",properties:{url:{type:"string"},caption:{type:"string"}}}}},required:["images"]}},
  video_player:{name:"Video Player",icon:"play",description:"Embed a video",
    parameters:{type:"object",properties:{url:{type:"string"},title:{type:"string"}},required:["url"]}},
  notes:{name:"Notes",icon:"fileText",description:"Markdown notes viewer",
    parameters:{type:"object",properties:{content:{type:"string"},title:{type:"string"}},required:["content"]}},
  data_table:{name:"Data Table",icon:"layers",description:"Display tabular data",
    parameters:{type:"object",properties:{columns:{type:"array",items:{type:"string"}},rows:{type:"array",items:{type:"array"}}},required:["columns","rows"]}},
};

function buildMcpTools(format='anthropic'){
  return Object.entries(MCP_APPS).map(([id,app])=>
    format==='anthropic'
      ?{name:id,description:app.description,input_schema:app.parameters}
      :{name:id,description:app.description,parameters:app.parameters}
  );
}

async function callLLM(provider,apiKey,model,messages){
  const ep=API_ENDPOINTS[provider.id];
  if(!ep)throw new Error('Unknown provider');
  const headers={'Content-Type':'application/json'};
  if(ep.header)headers[ep.header]=ep.prefix+apiKey;
  let body;
  if(provider.id==='anthropic'){
    body={model,max_tokens:1024,messages,tools:buildMcpTools('anthropic')};
  } else {
    body={model,messages,functions:buildMcpTools('openai'),function_call:'auto'};
  }
  const r=await fetch(ep.url,{method:'POST',headers,body:JSON.stringify(body)});
  if(!r.ok)throw new Error(`API error ${r.status}`);
  return r.json();
}

// ── Memory Tier Helpers ─────────────────────────────────────────────────────

const TIERS={hot:{color:"#f87171",label:"Hot"},warm:{color:"#fbbf24",label:"Warm"},cool:{color:"#60a5fa",label:"Cool"},cold:{color:"#52525b",label:"Cold"}};

function MemBar({root}){
  const tabs=flattenTabs(root);
  const total=Math.max(1,tabs.reduce((a,t)=>a+(t.memoryMB||0),0));
  const buckets=Object.keys(TIERS).map(k=>({
    tier:k,mb:tabs.filter(t=>t.memoryTier===k).reduce((a,t)=>a+(t.memoryMB||0),0),
    color:TIERS[k].color
  }));
  return <div style={{display:'flex',height:4,borderRadius:2,overflow:'hidden',gap:1,background:'rgba(255,255,255,.06)'}}>
    {buckets.map(b=>b.mb>0&&<div key={b.tier} style={{width:`${(b.mb/total)*100}%`,background:b.color,transition:'width .3s'}}/>)}
  </div>;
}

// ── Omnibar Classification ──────────────────────────────────────────────────

function classifyOmni(raw){
  const s=raw.trim();
  if(/^[a-zA-Z][a-zA-Z0-9+\-.]*:\/\//.test(s))return{intent:'navigate',url:s,query:''};
  if(/^localhost(:\d+)?(\/.*)?$/.test(s))return{intent:'navigate',url:'http://'+s,query:''};
  if(/^([a-zA-Z0-9-]+\.)+[a-zA-Z]{2,}(\/.*)?$/.test(s))return{intent:'navigate',url:'https://'+s,query:''};
  return{intent:'search',url:'',query:s};
}

// ── ThinkingBlock ───────────────────────────────────────────────────────────

function ThinkingBlock({content,duration,isThinking}){
  const [open,setOpen]=useState(isThinking);
  useEffect(()=>{if(isThinking)setOpen(true);},[isThinking]);
  const s={border:'1px solid',borderRadius:6,marginBottom:8,overflow:'hidden'};
  if(isThinking)return<div style={{...s,borderColor:'rgba(167,139,250,.4)',background:'rgba(167,139,250,.05)'}}>
    <div style={{display:'flex',alignItems:'center',gap:6,padding:'6px 10px'}}>
      <I d={ic.loader} size={13} color="#a78bfa" style={{animation:'spin 1s linear infinite'}}/>
      <span style={{fontSize:11,color:'#a78bfa',fontWeight:500}} className="thinking-indicator">Thinking</span>
    </div>
    {content&&<div style={{padding:'0 10px 8px',fontSize:11.5,color:'#a1a1aa',lineHeight:1.5,maxHeight:300,overflowY:'auto',borderTop:'1px solid rgba(167,139,250,.2)',paddingTop:6}}>
      <span>{content}</span><span className="stream-cursor"/>
    </div>}
  </div>;
  if(!content)return null;
  return<div style={{...s,borderColor:'rgba(167,139,250,.2)',background:'rgba(167,139,250,.03)'}}>
    <div onClick={()=>setOpen(o=>!o)} style={{display:'flex',alignItems:'center',gap:6,padding:'6px 10px',cursor:'pointer',userSelect:'none'}}>
      <I d={ic.sparkles} size={13} color="#a78bfa"/>
      <span style={{fontSize:11,color:'#a78bfa',flex:1}}>Thought for {duration||0}s</span>
      <I d={ic.chevron} size={12} color="#a78bfa" style={{transform:open?'rotate(90deg)':'rotate(0deg)',transition:'transform .2s'}}/>
    </div>
    {open&&<div style={{padding:'0 10px 8px',fontSize:11.5,color:'#a1a1aa',lineHeight:1.6,maxHeight:400,overflowY:'auto',borderTop:'1px solid rgba(167,139,250,.15)',paddingTop:6}}>
      {content}
    </div>}
  </div>;
}

function McpVideoPlayer({url,title}){
  const embedUrl=url.includes('youtube.com/watch?v=')?url.replace('watch?v=','embed/'):url.includes('youtu.be/')?url.replace('youtu.be/','youtube.com/embed/'):url;

    <iframe src={embedUrl} style={{width:'100%',height:200,border:'none',borderRadius:6}} allowFullScreen/>
  </div>;

function McpNotes({content,title}){
  function renderMd(text){
    return text.split('\n').map((line,i)=>{
      if(line.startsWith('## '))return<h3 key={i} style={{fontSize:13,fontWeight:600,color:'#e4e4e7',margin:'8px 0 4px'}}>{line.slice(3)}</h3>;
      if(line.startsWith('# '))return<h2 key={i} style={{fontSize:14,fontWeight:700,color:'#e4e4e7',margin:'8px 0 4px'}}>{line.slice(2)}</h2>;
      if(line.startsWith('- '))return<div key={i} style={{display:'flex',gap:6,marginBottom:3}}><span style={{color:'#60a5fa'}}>•</span><span style={{fontSize:12,color:'#d4d4d8'}}>{line.slice(2)}</span></div>;
      if(!line.trim())return<div key={i} style={{height:8}}/>;
      return<p key={i} style={{fontSize:12,color:'#d4d4d8',marginBottom:4,lineHeight:1.5}}>{line}</p>;
    });
  }
  return<div style={{padding:12}}>
    {title&&<div style={{fontSize:13,fontWeight:600,color:'#e4e4e7',marginBottom:10,borderBottom:'1px solid rgba(255,255,255,.08)',paddingBottom:8}}>{title}</div>}
    <div style={{maxHeight:300,overflowY:'auto'}}>{renderMd(content)}</div>
  </div>;
}
function McpDataTable({columns=[],rows=[]}){
  return<div style={{padding:12,overflowX:'auto'}}>
    <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
      <thead><tr>{columns.map((c,i)=><th key={i} style={{textAlign:'left',padding:'4px 8px',color:'#a1a1aa',fontWeight:500,borderBottom:'1px solid rgba(255,255,255,.1)'}}>{c}</th>)}</tr></thead>
      <tbody>{rows.map((row,i)=><tr key={i} style={{background:i%2?'rgba(255,255,255,.02)':'transparent'}}>{row.map((cell,j)=><td key={j} style={{padding:'4px 8px',color:'#d4d4d8',borderBottom:'1px solid rgba(255,255,255,.06)'}}>{cell}</td>)}</tr>)}</tbody>
    </table>
  </div>;
}
const MCP_RENDERS={task_tracker:McpTaskTracker,image_viewer:McpImageViewer,gallery:McpGallery,video_player:McpVideoPlayer,notes:McpNotes,data_table:McpDataTable};

// ── ChatMessage ─────────────────────────────────────────────────────────────

function ChatMessage({msg}){
  const isUser=msg.role==='user';
  const isSys=msg.role==='system';
  const bubbleStyle={
    maxWidth:'80%',padding:'8px 12px',borderRadius:8,fontSize:13,lineHeight:1.6,
    background:isUser?'#1e3a5f':isSys?'rgba(255,255,255,.04)':'rgba(255,255,255,.05)',
    color:isUser?'#93c5fd':isSys?'#6b7280':'#d4d4d8',
    alignSelf:isUser?'flex-end':'flex-start',
    border:isUser?'1px solid rgba(96,165,250,.2)':'1px solid rgba(255,255,255,.06)',
    animation:'fade-in .2s ease-out',
  };
  const content=msg.streamedContent||msg.content||'';
  return<div style={{display:'flex',flexDirection:'column',alignItems:isUser?'flex-end':'flex-start',marginBottom:12,gap:4}}>
    {msg.isThinking||msg.thinkingContent?<ThinkingBlock content={msg.thinkingContent} duration={msg.thinkingDuration} isThinking={msg.isThinking}/>:null}
    {msg.status==='thinking'&&!msg.thinkingContent&&!msg.isThinking&&<div style={{display:'flex',gap:4,padding:'8px 12px',background:'rgba(255,255,255,.04)',borderRadius:8,alignSelf:'flex-start'}}>
      <span className="typing-dot"/><span className="typing-dot"/><span className="typing-dot"/>
    </div>}
    {content&&<div style={bubbleStyle}>
      {content}
      {msg.status==='streaming'&&!msg.isThinking&&<span className="stream-cursor"/>}
    </div>}
    {msg.statusText&&<div style={{fontSize:10,color:'#6b7280',alignSelf:'flex-start',paddingLeft:2}}>{msg.statusText}</div>}
    {msg.loadingStatus&&<div style={{fontSize:10,color:'#a78bfa',alignSelf:'flex-start',display:'flex',alignItems:'center',gap:4}}>
      <I d={ic.loader} size={10} color="#a78bfa" style={{animation:'spin 1s linear infinite'}}/>
      {msg.loadingStatus}
    </div>}
    {msg.cards&&msg.cards.map((card,i)=>{
      const Comp=MCP_RENDERS[card.app];
      return Comp?<div key={i} style={{background:'rgba(255,255,255,.04)',borderRadius:8,border:'1px solid rgba(255,255,255,.08)',width:'min(90%,400px)',alignSelf:'flex-start',overflow:'hidden',marginTop:4}}>

          <span style={{fontSize:9,background:'rgba(96,165,250,.15)',color:'#60a5fa',borderRadius:3,padding:'1px 4px',marginLeft:'auto'}}>MCP</span>
        </div>
        <Comp {...card.args}/>
      </div>:null;
    })}
  </div>;
}

// ── ChatInterface ───────────────────────────────────────────────────────────

function ChatInterface({ws,providers,onTabCreate}){
  const [msgs,setMsgs]=useState([{id:'s1',role:'system',content:'Agent browser ready. Ask me anything or navigate to a URL.'}]);
  const [input,setInput]=useState('');
  const [selProv,setSelProv]=useState('local');
  const [selModel,setSelModel]=useState(SEED_MODELS[0]?.id||'');
  const bottomRef=useRef(null);
  const taRef=useRef(null);

  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:'smooth'});},[msgs]);

  function updateMsg(id,patch){
    setMsgs(m=>m.map(msg=>msg.id===id?{...msg,...patch}:msg));
  }

  async function doSend(text,isSearch=false){
    if(!text.trim())return;
    const userMsg={id:mkId(),role:'user',content:isSearch?`Search: ${text}`:text};
    const asstId=mkId();
    setMsgs(m=>[...m,userMsg,{id:asstId,role:'assistant',content:'',status:'thinking',streamedContent:''}]);
    setInput('');

    if(selProv==='local'){
      let tokenBuf='',thinkingBuf='',inThink=false,thinkStart=0;
      const chatMsgs=[
        {role:'system',content:'You are a helpful AI assistant in an agent-first browser. Be concise and helpful.'},
        ...msgs.filter(m=>m.role!=='system').slice(-6).map(m=>({role:m.role,content:m.content||m.streamedContent||''})),
        {role:'user',content:text}
      ];
      try{
        await TJS.generate({task:'text-generation',modelId:selModel,prompt:chatMsgs,options:{max_new_tokens:256}},{
          onStatus:(s)=>updateMsg(asstId,{loadingStatus:s}),
          onPhase:(p)=>updateMsg(asstId,{statusText:p}),
          onToken:(token)=>{
            if(!inThink&&token.includes('<think>')){
              inThink=true;thinkStart=Date.now();
              const after=token.split('<think>')[1]||'';
              thinkingBuf+=after;
              updateMsg(asstId,{isThinking:true,thinkingContent:thinkingBuf,status:'streaming'});
            } else if(inThink){
              const closeTag="<\/think>";
              if(token.includes(closeTag)){
                const parts=token.split(closeTag);
                thinkingBuf+=parts[0];
                inThink=false;
                const dur=Math.round((Date.now()-thinkStart)/1000);
                tokenBuf+=parts.slice(1).join('');
                updateMsg(asstId,{isThinking:false,thinkingDuration:dur,thinkingContent:thinkingBuf,streamedContent:tokenBuf.replace(/<think>[\s\S]*?<\/think>/g,'').replace(/\nUser:|<\|im_end\|>|<\|endoftext\|>/g,'').trim()});
              } else {
                thinkingBuf+=token;
                updateMsg(asstId,{thinkingContent:thinkingBuf});
              }
            } else {
              tokenBuf+=token;
              updateMsg(asstId,{streamedContent:tokenBuf.replace(/<think>[\s\S]*?<\/think>/g,'').replace(/\nUser:|<\|im_end\|>|<\|endoftext\|>/g,'').trim(),status:'streaming'});
            }
          },
          onDone:()=>{
            const final=tokenBuf.replace(/<think>[\s\S]*?<\/think>/g,'').replace(/\nUser:|<\|im_end\|>|<\|endoftext\|>/g,'').trim();
            updateMsg(asstId,{streamedContent:final,status:'complete',loadingStatus:null,statusText:null});
          },
          onError:(e)=>updateMsg(asstId,{content:'Error: '+e.message,status:'error',streamedContent:''})
        });
      }catch(e){updateMsg(asstId,{content:'Error: '+e.message,status:'error',streamedContent:''});}
    } else {
      const prov=providers.find(p=>p.id===selProv);
      if(!prov?.apiKey){updateMsg(asstId,{content:'Please configure API key in Settings.',status:'error',streamedContent:''});return;}
      const model=prov.models.find(m=>m.enabled)?.id||prov.models[0]?.id||'';
      const chatMsgs=[
        {role:'user',content:text}
      ];
      try{
        updateMsg(asstId,{loadingStatus:'Calling API...'});
        const resp=await callLLM(prov,prov.apiKey,model,chatMsgs);
        let content='',cards=[];
        if(prov.id==='anthropic'){
          for(const blk of resp.content||[]){
            if(blk.type==='text')content+=blk.text;
            else if(blk.type==='tool_use'&&MCP_RENDERS[blk.name]){cards.push({app:blk.name,args:blk.input});}
          }
        } else {
          const choice=resp.choices?.[0];
          content=choice?.message?.content||'';
          if(choice?.message?.function_call){
            try{const args=JSON.parse(choice.message.function_call.arguments||'{}');cards.push({app:choice.message.function_call.name,args});}catch(e){}
          }
        }
        updateMsg(asstId,{streamedContent:content,status:'complete',cards,loadingStatus:null});
      }catch(e){updateMsg(asstId,{content:'API Error: '+e.message,status:'error',streamedContent:''});}
    }
  }

  function handleKey(e){
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend(input);}
  }
  function autoResize(e){
    e.target.style.height='auto';
    e.target.style.height=Math.min(e.target.scrollHeight,120)+'px';
  }

  const enabledProvs=providers.filter(p=>p.status==='connected');
  return<div style={{display:'flex',flexDirection:'column',height:'100%',background:'#09090b'}}>
    {/* Header */}
    <div style={{display:'flex',alignItems:'center',gap:8,padding:'10px 16px',borderBottom:'1px solid rgba(255,255,255,.06)',flexShrink:0}}>
      <I d={ic.messageSquare} size={14} color="#60a5fa"/>
      <span style={{fontSize:12,fontWeight:600,color:'#e4e4e7',flex:1}}>Chat</span>
      <select value={selProv} onChange={e=>setSelProv(e.target.value)} style={{background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.1)',borderRadius:4,color:'#d4d4d8',fontSize:11,padding:'2px 6px',cursor:'pointer'}}>
        <option value="local">🤖 Local</option>
        {enabledProvs.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
      </select>
      {selProv==='local'&&<select value={selModel} onChange={e=>setSelModel(e.target.value)} style={{background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.1)',borderRadius:4,color:'#d4d4d8',fontSize:11,padding:'2px 6px',cursor:'pointer',maxWidth:160}}>
        {SEED_MODELS.filter(m=>m.status==='installed').concat(SEED_MODELS).map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
      </select>}
    </div>
    {/* Messages */}
    <div style={{flex:1,overflowY:'auto',padding:'16px',display:'flex',flexDirection:'column'}}>
      {msgs.map(m=><ChatMessage key={m.id} msg={m}/>)}
      <div ref={bottomRef}/>
    </div>
    {/* Input */}
    <div style={{padding:'12px 16px',borderTop:'1px solid rgba(255,255,255,.06)',display:'flex',gap:8,alignItems:'flex-end',flexShrink:0}}>
      <textarea ref={taRef} value={input} onChange={e=>{setInput(e.target.value);autoResize(e);}} onKeyDown={handleKey}
        placeholder="Message or navigate to URL..." rows={1}
        style={{flex:1,background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.1)',borderRadius:6,color:'#d4d4d8',fontSize:13,padding:'7px 10px',resize:'none',outline:'none',fontFamily:'inherit',lineHeight:1.5}}/>
      <button onClick={()=>doSend(input)} style={{background:'#1d4ed8',border:'none',borderRadius:6,color:'white',padding:'7px 12px',cursor:'pointer',display:'flex',alignItems:'center',gap:4,fontSize:12,flexShrink:0}}>
        <I d={ic.send} size={13} color="white"/>
      </button>
    </div>
  </div>;
}

// ── TabRow ──────────────────────────────────────────────────────────────────

function TabRow({tab,depth=0,isActive,isCursor,isSelected,onClick,onClose,onDragStart,onDragOver,onDrop}){
  const tier=TIERS[tab.memoryTier]||TIERS.cold;
  return<div
    draggable
    onDragStart={e=>onDragStart&&onDragStart(e,tab.id)}
    onDragOver={e=>{e.preventDefault();onDragOver&&onDragOver(e,tab.id);}}
    onDrop={e=>onDrop&&onDrop(e,tab.id)}
    onClick={()=>onClick&&onClick(tab)}
    style={{
      display:'flex',alignItems:'center',gap:6,padding:`4px 8px 4px ${8+depth*16}px`,
      cursor:'pointer',borderRadius:4,
      background:isCursor?'rgba(96,165,250,.15)':isActive?'rgba(255,255,255,.08)':isSelected?'rgba(96,165,250,.08)':'transparent',
      border:isCursor?'1px solid rgba(96,165,250,.3)':'1px solid transparent',
      userSelect:'none',position:'relative',
    }}>
    <div style={{width:6,height:6,borderRadius:'50%',background:tier.color,flexShrink:0,boxShadow:`0 0 4px ${tier.color}60`}}/>
    <span style={{fontSize:11,color:'#a1a1aa',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{tab.name}</span>
    {tab.memoryMB&&<span style={{fontSize:9,color:'#52525b',flexShrink:0}}>{tab.memoryMB}MB</span>}
    <button onClick={e=>{e.stopPropagation();onClose&&onClose(tab.id);}} style={{background:'none',border:'none',padding:2,cursor:'pointer',color:'#52525b',display:'flex',opacity:.5,flexShrink:0}}>
      <I d={ic.x} size={10} color="#a1a1aa"/>
    </button>
  </div>;
}

function WsFolder({node,depth=0,cursorId,activeTabIds,selectedIds,onToggle,onTabClick,onTabClose,onDragStart,onDragOver,onDrop}){
  const tabCount=cntTabs(node);
  const memMB=sumMem(node);

function HFModelCard({model,onInstall,onDelete}){
  const [loading,setLoading]=useState(false);

    setLoading(true);
    try{await TJS.loadModel(model.task,model.id,(s)=>setStatus(s));}

    finally{setLoading(false);setStatus('installed');}

  return<div style={{background:'rgba(255,255,255,.04)',borderRadius:6,padding:10,border:'1px solid rgba(255,255,255,.08)',marginBottom:6}}>

        style={{background:status==='installed'?'rgba(248,113,113,.15)':'rgba(96,165,250,.15)',border:'none',borderRadius:4,color:status==='installed'?'#f87171':'#60a5fa',fontSize:10,padding:'3px 8px',cursor:'pointer',flexShrink:0,display:'flex',alignItems:'center',gap:3}}>

function Toast({toast,onDismiss}){
  useEffect(()=>{
    if(!toast)return;
    const t=setTimeout(onDismiss,3000);
    return()=>clearTimeout(t);
  },[toast]);
  if(!toast)return null;
  const colors={success:'#34d399',error:'#f87171',info:'#60a5fa',warning:'#fbbf24'};
  return<div style={{position:'fixed',bottom:20,left:'50%',transform:'translateX(-50%)',background:'rgba(12,12,15,.95)',backdropFilter:'blur(12px)',border:`1px solid ${colors[toast.type]||colors.info}40`,borderRadius:8,padding:'10px 16px',color:colors[toast.type]||colors.info,fontSize:12,zIndex:200,animation:'slide-up .2s ease-out',display:'flex',alignItems:'center',gap:8,boxShadow:'0 4px 20px rgba(0,0,0,.4)'}}>
    <I d={ic.checkCircle} size={13} color={colors[toast.type]||colors.info}/>
    {toast.msg}
  </div>;
}

// ── ActivityBar ─────────────────────────────────────────────────────────────

function ActivityBar({activePanel,setActivePanel,collapsed,setCollapsed}){
  const items=[
    {id:'workspaces',icon:'layers',label:'Workspaces'},
    {id:'chat',icon:'messageSquare',label:'Chat'},
    {id:'history',icon:'clock',label:'History'},
    {id:'extensions',icon:'puzzle',label:'Extensions'},
    {id:'settings',icon:'settings',label:'Settings'},
    {id:'account',icon:'user',label:'Account'},
  ];
  return<div style={{width:48,display:'flex',flexDirection:'column',alignItems:'center',padding:'8px 0',background:'#0c0c0f',borderRight:'1px solid rgba(255,255,255,.06)',gap:2,flexShrink:0}}>
    {items.map(item=><button key={item.id} title={item.label} onClick={()=>{setActivePanel(item.id);if(collapsed)setCollapsed(false);}}
      style={{width:36,height:36,border:'none',borderRadius:6,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',
        background:activePanel===item.id?'rgba(96,165,250,.15)':'transparent',
        borderLeft:activePanel===item.id?'2px solid #60a5fa':'2px solid transparent',
        color:activePanel===item.id?'#60a5fa':'#52525b',
        transition:'all .15s'}}>
      <I d={ic[item.icon]} size={16} color={activePanel===item.id?'#60a5fa':'#52525b'}/>
    </button>)}
    <div style={{flex:1}}/>
    <button title={collapsed?"Expand":"Collapse"} onClick={()=>setCollapsed(c=>!c)}
      style={{width:36,height:36,border:'none',borderRadius:6,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',background:'transparent',color:'#52525b'}}>
      <I d={ic.panelRight} size={16} color="#52525b" style={{transform:collapsed?'scaleX(-1)':'none',transition:'transform .2s'}}/>
    </button>
  </div>;
}

// ── App ─────────────────────────────────────────────────────────────────────

function App(){
  const [workspaces,setWorkspaces]=useState([
    {id:'ws1',name:'Research',color:'#60a5fa',expanded:true,type:'workspace',children:INIT_TREE.children[0].children},
    {id:'ws2',name:'Dev',color:'#34d399',expanded:false,type:'workspace',children:INIT_TREE.children[1].children},
  ]);
  const [activeWsId,setActiveWsId]=useState('ws1');
  const [root,setRoot]=useState(INIT_TREE);
  const [activeTabs,setActiveTabs]=useState([]);
  const [focusedTabId,setFocusedTabId]=useState(null);
  const [cursorId,setCursorId]=useState(null);
  const [selectedIds,setSelectedIds]=useState([]);
  const [mcpPanes,setMcpPanes]=useState([]);

  const [activePanel,setActivePanel]=useState('workspaces');
  const [collapsed,setCollapsed]=useState(false);
  const [providers,setProviders]=useState(MODEL_PROVIDERS);
  const [toast,setToast]=useState(null);
  const [showWsOverlay,setShowWsOverlay]=useState(false);
  const [showShortcuts,setShowShortcuts]=useState(false);
  const [omnibar,setOmnibar]=useState('');
  const [pendingSearch,setPendingSearch]=useState('');
  const omniRef=useRef(null);

  const activeTab=focusedTabId?findNode(root,focusedTabId):null;

  useEffect(()=>{
    function handleKey(e){
      if(e.key==='?'){setShowShortcuts(s=>!s);return;}
      if(e.key==='Escape'){setShowShortcuts(false);setCursorId(null);setSelectedIds([]);}
    }
    window.addEventListener('keydown',handleKey);
    return()=>window.removeEventListener('keydown',handleKey);
  },[]);

  function handleOmniSubmit(e){
    e.preventDefault();
    const {intent,url,query}=classifyOmni(omnibar);
    if(intent==='navigate'){
      const newTab={id:mkId(),type:'tab',name:url.replace(/^https?:\/\//,'').slice(0,30),url,memoryTier:'hot',memoryMB:Math.floor(80+Math.random()*200),persisted:false};
      setRoot(r=>{
        const ws=r.children[0];
        return deepUpdate(r,ws.id,n=>({...n,children:[...(n.children||[]),newTab]}));
      });
      setActiveTabs(t=>[...t,newTab.id]);
      setFocusedTabId(newTab.id);
      setToast({msg:`Navigating to ${url}`,type:'info'});
    } else {
      setPendingSearch(query);
      setActivePanel('chat');
      setToast({msg:`Searching: ${query}`,type:'info'});
    }
    setOmnibar('');
  }

  function renderPanel(){
    if(activePanel==='workspaces')return<WorkspacesPanel workspaces={workspaces} activeWsId={activeWsId} setActiveWsId={setActiveWsId} root={root} setRoot={setRoot} activeTabs={activeTabs} setActiveTabs={setActiveTabs} cursorId={cursorId} setCursorId={setCursorId} selectedIds={selectedIds} setSelectedIds={setSelectedIds}/>;
    if(activePanel==='chat')return<ChatInterface ws={workspaces.find(w=>w.id===activeWsId)} providers={providers} onTabCreate={tab=>{setRoot(r=>deepUpdate(r,r.children[0].id,n=>({...n,children:[...(n.children||[]),tab]})));setActiveTabs(t=>[...t,tab.id]);setFocusedTabId(tab.id);}}/>;
    if(activePanel==='history')return<HistoryPanel/>;
    if(activePanel==='extensions')return<ExtensionsPanel/>;
    if(activePanel==='settings')return<SettingsPanel providers={providers} setProviders={setProviders}/>;
    if(activePanel==='account')return<div style={{padding:16}}><div style={{fontSize:12,color:'#6b7280'}}>Account features coming soon</div></div>;
    return null;
  }

  return<div style={{display:'flex',height:'100vh',overflow:'hidden',background:'#09090b'}}>
    <ActivityBar activePanel={activePanel} setActivePanel={setActivePanel} collapsed={collapsed} setCollapsed={setCollapsed}/>
    {/* Sidebar */}
    {!collapsed&&<div style={{width:260,display:'flex',flexDirection:'column',background:'#0c0c0f',borderRight:'1px solid rgba(255,255,255,.06)',flexShrink:0,overflow:'hidden'}}>
      {/* Sidebar header */}
      <div style={{padding:'10px 10px 6px',borderBottom:'1px solid rgba(255,255,255,.06)',flexShrink:0}}>
        <form onSubmit={handleOmniSubmit} style={{display:'flex',gap:6,alignItems:'center',background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.08)',borderRadius:6,padding:'5px 8px'}}>
          <I d={ic.search} size={12} color="#6b7280"/>
          <input ref={omniRef} value={omnibar} onChange={e=>setOmnibar(e.target.value)} placeholder="Search or navigate…"
            style={{flex:1,background:'none',border:'none',color:'#d4d4d8',fontSize:12,outline:'none'}}/>
        </form>
        {/* Workspace pills */}
        <div style={{display:'flex',gap:4,marginTop:6,flexWrap:'wrap'}}>
          {workspaces.map(ws=><button key={ws.id} onClick={()=>setActiveWsId(ws.id)}
            style={{fontSize:9,padding:'2px 6px',borderRadius:3,border:`1px solid ${ws.id===activeWsId?ws.color+'80':'rgba(255,255,255,.08)'}`,background:ws.id===activeWsId?ws.color+'15':'transparent',color:ws.id===activeWsId?ws.color:'#6b7280',cursor:'pointer'}}>
            {ws.name}
          </button>)}
          <button onClick={()=>setShowWsOverlay(true)} style={{fontSize:9,padding:'2px 6px',borderRadius:3,border:'1px dashed rgba(255,255,255,.08)',background:'transparent',color:'#52525b',cursor:'pointer'}}>
            <I d={ic.plus} size={9} color="#52525b"/>
          </button>
        </div>
      </div>
      {/* Panel content */}
      <div style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column'}}>
        {renderPanel()}
      </div>
    </div>}
    {/* Main content */}
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',position:'relative'}}>
      {activeTab
        ?<PageOverlay tab={activeTab} onClose={()=>setFocusedTabId(null)}/>
        :<ChatInterface ws={workspaces.find(w=>w.id===activeWsId)} providers={providers} onTabCreate={tab=>{setRoot(r=>deepUpdate(r,r.children[0].id,n=>({...n,children:[...(n.children||[]),tab]})));setActiveTabs(t=>[...t,tab.id]);setFocusedTabId(tab.id);}}/>}
    </div>
    {/* Overlays */}
    {showWsOverlay&&<WorkspaceOverlay workspaces={workspaces} activeWsId={activeWsId} onSwitch={setActiveWsId} onCreate={()=>{const colors=['#60a5fa','#34d399','#a78bfa','#fbbf24','#f87171'];setWorkspaces(ws=>[...ws,{id:mkId(),name:`Workspace ${ws.length+1}`,color:colors[ws.length%colors.length],expanded:false,type:'workspace',children:[]}]);}} onDelete={()=>{}} onClose={()=>setShowWsOverlay(false)}/>}
    {showShortcuts&&<ShortcutOverlay onClose={()=>setShowShortcuts(false)}/>}
    <Toast toast={toast} onDismiss={()=>setToast(null)}/>
  </div>;
}

// ── Mount ───────────────────────────────────────────────────────────────────

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
